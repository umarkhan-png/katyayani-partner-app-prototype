<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <linearGradient id="aSaffron" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE5BC"/>
      <stop offset="1" stop-color="#FDD79A"/>
    </linearGradient>
  </defs>
  <!-- Card background -->
  <rect width="320" height="200" rx="12" fill="#FEFBF3" stroke="#D5C3A3" stroke-width="1.5"/>

  <!-- Top saffron band -->
  <path d="M 12 0 L 308 0 Q 320 0 320 12 L 320 26 L 0 26 L 0 12 Q 0 0 12 0 Z" fill="url(#aSaffron)"/>
  <!-- Ashoka emblem -->
  <circle cx="14" cy="13" r="7" fill="#8B5A1E"/>
  <circle cx="14" cy="13" r="4.5" fill="none" stroke="#FDD79A" stroke-width="0.6"/>
  <circle cx="14" cy="13" r="1.2" fill="#FDD79A"/>
  <text x="28" y="17" font-family="Arial, sans-serif" font-weight="800" font-size="9" fill="#5A3B15" letter-spacing="0.2">UNIQUE IDENTIFICATION AUTHORITY OF INDIA</text>

  <!-- Green sub-band "FOR DEMO ONLY" -->
  <rect x="0" y="26" width="320" height="14" fill="#D6F0D8"/>
  <text x="160" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="8" fill="#2E7C3C" letter-spacing="2">— FOR DEMO ONLY —</text>

  <!-- Photo (suited male figure) -->
  <rect x="14" y="52" width="64" height="82" rx="4" fill="#F2E6CF" stroke="#D5C3A3" stroke-width="0.8"/>
  <!-- Head -->
  <circle cx="46" cy="77" r="13" fill="#E8C8A0"/>
  <!-- Hair -->
  <path d="M 33 72 Q 46 60 59 72 Q 56 66 46 65 Q 36 66 33 72 Z" fill="#4A3020"/>
  <!-- Neck -->
  <rect x="42" y="89" width="8" height="7" fill="#D4A87A"/>
  <!-- Suit shoulders -->
  <path d="M 22 130 Q 25 102 46 100 Q 67 102 70 130 Z" fill="#3B4A5E"/>
  <!-- Shirt V -->
  <path d="M 40 101 L 46 115 L 52 101 Z" fill="white"/>
  <!-- Tie -->
  <path d="M 44 102 L 48 102 L 50 125 L 46 128 L 42 125 Z" fill="#B02B2B"/>

  <!-- Right details -->
  <text x="86" y="63" font-family="Arial, sans-serif" font-weight="800" font-size="9" fill="#1C1C1C" letter-spacing="0.5">FRONT</text>
  <text x="86" y="78" font-family="Arial, sans-serif" font-weight="600" font-size="7.5" fill="#606060">NAME:</text>
  <text x="118" y="78" font-family="Arial, sans-serif" font-weight="800" font-size="8.5" fill="#1C1C1C" letter-spacing="0.3">RAJ KUMAR</text>
  <text x="86" y="92" font-family="Arial, sans-serif" font-weight="600" font-size="7.5" fill="#606060">BIRTH YEAR -</text>
  <text x="149" y="92" font-family="Arial, sans-serif" font-weight="800" font-size="8" fill="#1C1C1C">1997</text>
  <text x="86" y="106" font-family="Arial, sans-serif" font-weight="600" font-size="7.5" fill="#606060">GENDER:</text>
  <text x="130" y="106" font-family="Arial, sans-serif" font-weight="800" font-size="8" fill="#1C1C1C">DUMMY</text>

  <!-- QR code -->
  <rect x="230" y="54" width="44" height="44" rx="3" fill="white" stroke="#8B5A1E" stroke-width="1"/>
  <g fill="#1C1C1C">
    <rect x="234" y="58" width="10" height="10"/><rect x="236" y="60" width="6" height="6" fill="white"/><rect x="238" y="62" width="2" height="2" fill="#1C1C1C"/>
    <rect x="260" y="58" width="10" height="10"/><rect x="262" y="60" width="6" height="6" fill="white"/><rect x="264" y="62" width="2" height="2" fill="#1C1C1C"/>
    <rect x="234" y="84" width="10" height="10"/><rect x="236" y="86" width="6" height="6" fill="white"/><rect x="238" y="88" width="2" height="2" fill="#1C1C1C"/>
    <rect x="246" y="62" width="2" height="2"/><rect x="250" y="66" width="2" height="2"/><rect x="254" y="62" width="2" height="2"/>
    <rect x="248" y="72" width="2" height="2"/><rect x="252" y="76" width="2" height="2"/><rect x="256" y="72" width="2" height="2"/>
    <rect x="248" y="84" width="2" height="2"/><rect x="258" y="88" width="2" height="2"/><rect x="262" y="90" width="2" height="2"/>
    <rect x="266" y="84" width="2" height="2"/><rect x="264" y="92" width="2" height="2"/>
  </g>
  <text x="252" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="7" fill="#8B5A1E" letter-spacing="0.5">DUMMY</text>

  <!-- HIGHLIGHTED AADHAAR NUMBER -->
  <rect x="78" y="142" width="190" height="28" rx="6" fill="#FFF4CC" stroke="#D4A537" stroke-width="1.5"/>
  <text x="173" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="18" fill="#1A1308" letter-spacing="4">1234 5678 9012</text>

  <!-- Bottom Hindi strip -->
  <path d="M 0 178 L 320 178 L 320 188 Q 320 200 308 200 L 12 200 Q 0 200 0 188 Z" fill="#D6F0D8"/>
  <text x="160" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="7.5" fill="#2E7C3C">आधार · आम आदमी का अधिकार</text>
</svg>
