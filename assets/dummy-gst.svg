  <text x="22" y="162" font-family="Arial, sans-serif" font-weight="700" font-size="8" fill="#606060">Date of Liability:</text>
  <text x="115" y="162" font-family="Arial, sans-serif" font-weight="700" font-size="9" fill="#1C1C1C">15-02-2020</text>

  <text x="22" y="176" font-family="Arial, sans-serif" font-weight="700" font-size="8" fill="#606060">Registration Date:</text>
  <text x="115" y="176" font-family="Arial, sans-serif" font-weight="700" font-size="9" fill="#1C1C1C">20-06-2020</text>

  <!-- Diagonal watermark -->
  <g transform="rotate(-18 210 160)">
    <text x="210" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="22" fill="#9E9E9E" opacity="0.35" letter-spacing="3">DUMMY / FOR DEMO</text>
