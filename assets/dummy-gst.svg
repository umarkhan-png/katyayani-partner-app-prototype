  <rect x="56" y="60" width="140" height="18" rx="4" fill="#FFF4CC" stroke="#D4A537" stroke-width="1.2"/>
  <text x="64" y="72" font-family="Consolas, monospace" font-weight="900" font-size="11.5" fill="#0A1835" letter-spacing="1.2">27AABCM1234F1Z1</text>

