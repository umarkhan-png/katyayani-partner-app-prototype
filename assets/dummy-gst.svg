<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <!-- Paper document effect with shadow -->
  <rect x="14" y="14" width="292" height="178" rx="3" fill="#E0D8C4" opacity="0.35"/>
  <rect x="10" y="10" width="292" height="178" rx="3" fill="white" stroke="#C9C0A8" stroke-width="1"/>

  <!-- Title -->
  <text x="156" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="11" fill="#0A1835" letter-spacing="0.4">GOODS AND SERVICES TAX - REGISTRATION CERTIFICATE</text>
  <text x="156" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="8.5" fill="#606060" font-style="italic">(FOR ILLUSTRATION ONLY)</text>

  <line x1="22" y1="54" x2="290" y2="54" stroke="#D0D7E5" stroke-width="0.8"/>

  <!-- HIGHLIGHTED GSTIN -->
