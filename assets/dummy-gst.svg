  <text x="22" y="113" font-family="Arial, sans-serif" font-weight="700" font-size="8" fill="#606060">Address:</text>
  <text x="100" y="113" font-family="Arial, sans-serif" font-weight="600" font-size="8" fill="#1C1C1C">SPECIMEN COMPANY PVT. LTD. BRATH IMAER, TRESO,</text>
  <text x="100" y="125" font-family="Arial, sans-serif" font-weight="600" font-size="8" fill="#1C1C1C">BREAK, DIMAN PVT 2201</text>

  <!-- Trade name -->
  <text x="22" y="145" font-family="Arial, sans-serif" font-weight="700" font-size="8" fill="#606060">Trade Name:</text>
  <text x="100" y="145" font-family="Arial, sans-serif" font-weight="800" font-size="9" fill="#1C1C1C">SPECIMEN COMPANY</text>

