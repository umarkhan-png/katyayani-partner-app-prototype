<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <linearGradient id="gTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1E4FAD"/>
      <stop offset="1" stop-color="#2B6FD6"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" rx="12" fill="white" stroke="#D0D7E5" stroke-width="1.5"/>

  <!-- Header band -->
  <path d="M 0 12 L 320 12 L 320 60 L 0 60 Z" fill="url(#gTop)"/>
  <path d="M 0 0 L 320 0 L 320 12 L 0 12 Z" fill="white"/>
  <rect x="0" y="0" width="320" height="60" rx="12" fill="url(#gTop)"/>

  <!-- GST emblem circle -->
  <circle cx="30" cy="30" r="14" fill="white" opacity="0.15"/>
  <circle cx="30" cy="30" r="10" fill="none" stroke="white" stroke-width="1.5"/>
  <text x="30" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="10" fill="white">GST</text>

  <text x="160" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="12" fill="white" letter-spacing="0.5">CERTIFICATE OF REGISTRATION</text>
  <text x="160" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-weight="500" font-size="8.5" fill="white" opacity="0.9">Goods and Services Tax · Govt. of India</text>

  <!-- Body -->
  <text x="14" y="78" font-family="Arial, sans-serif" font-weight="600" font-size="7.5" fill="#909090" letter-spacing="0.5">GSTIN / UIN</text>
  <text x="14" y="97" font-family="Consolas, monospace" font-weight="800" font-size="15" fill="#1E4FAD" letter-spacing="2">22 ABCDE 1234F 1Z5</text>

  <line x1="14" y1="108" x2="306" y2="108" stroke="#E6ECF5" stroke-width="1"/>

  <text x="14" y="123" font-family="Arial, sans-serif" font-weight="600" font-size="7" fill="#909090" letter-spacing="0.5">LEGAL NAME OF BUSINESS</text>
  <text x="14" y="139" font-family="Arial, sans-serif" font-weight="700" font-size="12" fill="#1C1C1C">Sharma Krishi Kendra</text>

  <text x="14" y="157" font-family="Arial, sans-serif" font-weight="600" font-size="7" fill="#909090" letter-spacing="0.5">PRINCIPAL PLACE</text>
  <text x="14" y="171" font-family="Arial, sans-serif" font-weight="500" font-size="9.5" fill="#1C1C1C">Shop 12, Market Road, Indore, MP 452001</text>

  <text x="14" y="187" font-family="Arial, sans-serif" font-weight="600" font-size="7" fill="#909090">Date of Registration: 12/04/2018</text>

  <!-- Seal -->
  <circle cx="280" cy="165" r="24" fill="none" stroke="#1E4FAD" stroke-width="1" opacity="0.3"/>
  <circle cx="280" cy="165" r="18" fill="none" stroke="#1E4FAD" stroke-width="0.8" opacity="0.3"/>
  <text x="280" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="5" fill="#1E4FAD" opacity="0.5">GOVT OF</text>
  <text x="280" y="169" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="5" fill="#1E4FAD" opacity="0.5">INDIA</text>

  <!-- Watermark -->
  <text x="160" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="900" fill="#000" opacity="0.06" transform="rotate(-14 160 130)" letter-spacing="3">DUMMY · FOR REFERENCE</text>
</svg>
