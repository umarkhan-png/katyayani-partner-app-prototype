<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <!-- Card -->
  <rect width="320" height="200" rx="12" fill="#FDF8E8" stroke="#D5C3A3" stroke-width="1.5"/>

  <!-- Top header with ECI -->
  <rect x="0" y="0" width="320" height="26" rx="12 12 0 0" fill="#FFF4DB"/>
  <path d="M 0 26 L 320 26 L 320 12 Q 320 0 308 0 L 12 0 Q 0 0 0 12 Z" fill="#FFF4DB"/>

  <!-- Ashoka emblem -->
  <circle cx="20" cy="13" r="8" fill="none" stroke="#B91C1C" stroke-width="1.2"/>
  <circle cx="20" cy="13" r="4.5" fill="none" stroke="#B91C1C" stroke-width="0.8"/>
  <circle cx="20" cy="13" r="1.2" fill="#B91C1C"/>

  <text x="34" y="17" font-family="Arial, sans-serif" font-weight="800" font-size="10.5" fill="#0A1835" letter-spacing="0.4">ELECTION COMMISSION OF INDIA</text>

  <!-- Small flag colors on right -->
  <g>
    <rect x="270" y="8" width="16" height="3" fill="#FF9933"/>
    <rect x="270" y="11" width="16" height="3" fill="white" stroke="#D0D0D0" stroke-width="0.3"/>
    <rect x="270" y="14" width="16" height="3" fill="#138808"/>
    <circle cx="278" cy="12.5" r="1.2" fill="none" stroke="#0A1835" stroke-width="0.3"/>
  </g>
  <text x="302" y="17" text-anchor="end" font-family="Arial, sans-serif" font-weight="700" font-size="7" fill="#138808">ECI</text>

  <!-- Sub-header -->
  <text x="160" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="7.5" fill="#606060" font-style="italic">ELECTOR'S PHOTO IDENTITY CARD - FICTITIOUS DATA</text>

  <!-- HIGHLIGHTED EPIC -->
  <text x="96" y="60" font-family="Arial, sans-serif" font-weight="800" font-size="10" fill="#0A1835">EPIC:</text>
  <rect x="128" y="48" width="110" height="18" rx="4" fill="#FFF4CC" stroke="#D4A537" stroke-width="1.2"/>
  <text x="133" y="61" font-family="Consolas, monospace" font-weight="900" font-size="12" fill="#0A1835" letter-spacing="2">XYZ1234567</text>

  <!-- Photo (girl figure - matching reference) -->
  <rect x="14" y="72" width="72" height="92" rx="4" fill="#EFE2C5" stroke="#D5C3A3" stroke-width="0.8"/>
  <!-- Head -->
  <circle cx="50" cy="100" r="14" fill="#E8C8A0"/>
  <!-- Long hair -->
  <path d="M 34 94 Q 36 82 50 80 Q 64 82 66 94 L 68 118 Q 66 120 64 118 L 64 103 Q 60 96 50 96 Q 40 96 36 103 L 36 118 Q 34 120 32 118 Z" fill="#4A3020"/>
  <!-- Neck -->
  <rect x="46" y="113" width="8" height="8" fill="#D4A87A"/>
  <!-- Blouse (red-ish) -->
  <path d="M 26 164 Q 30 132 50 130 Q 70 132 74 164 Z" fill="#B02B2B"/>
  <!-- Collar hint -->
  <path d="M 44 130 L 50 144 L 56 130 Z" fill="#8E1F1F"/>

  <!-- Details -->
  <text x="96" y="78" font-family="Arial, sans-serif" font-weight="700" font-size="7.5" fill="#606060">NAME:</text>
  <text x="132" y="78" font-family="Arial, sans-serif" font-weight="800" font-size="9" fill="#1C1C1C">SNEHA SHARMA</text>

  <text x="96" y="92" font-family="Arial, sans-serif" font-weight="700" font-size="7.5" fill="#606060">FATHER'S NAME:</text>
  <text x="96" y="103" font-family="Arial, sans-serif" font-weight="800" font-size="9" fill="#1C1C1C">FATHER' KUMAR</text>

  <text x="96" y="118" font-family="Arial, sans-serif" font-weight="700" font-size="7.5" fill="#606060">GENDER:</text>
  <text x="146" y="118" font-family="Arial, sans-serif" font-weight="800" font-size="9" fill="#1C1C1C">SUHA</text>

  <text x="96" y="132" font-family="Arial, sans-serif" font-weight="700" font-size="7.5" fill="#606060">DATE OF BIRTH:</text>
  <text x="179" y="132" font-family="Arial, sans-serif" font-weight="800" font-size="9" fill="#1C1C1C">12/07/1967</text>

  <text x="14" y="178" font-family="Arial, sans-serif" font-weight="700" font-size="7" fill="#606060">ASSEMBLY CONSTITUENCY:</text>
  <text x="135" y="178" font-family="Arial, sans-serif" font-weight="800" font-size="8" fill="#1C1C1C">SNEHARA SHARMA</text>

  <text x="14" y="192" font-family="Arial, sans-serif" font-weight="700" font-size="7" fill="#606060">POLLING STATION:</text>
  <text x="105" y="192" font-family="Arial, sans-serif" font-weight="800" font-size="8" fill="#1C1C1C">FLICTRLIOUS</text>

  <!-- SPECIMEN stamp -->
  <g transform="rotate(-12 252 110)">
    <rect x="230" y="100" width="74" height="24" rx="2" fill="none" stroke="#B91C1C" stroke-width="2.2" opacity="0.75"/>
    <text x="267" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="13" fill="#B91C1C" opacity="0.75" letter-spacing="2">SPECIMEN</text>
  </g>
</svg>
