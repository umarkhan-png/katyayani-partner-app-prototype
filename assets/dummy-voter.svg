<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <linearGradient id="vTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF9933"/>
      <stop offset="1" stop-color="#EC8A0B"/>
    </linearGradient>
    <linearGradient id="vPhoto" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E8D5B5"/>
      <stop offset="1" stop-color="#C8AE84"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" rx="12" fill="white" stroke="#D5C3A3" stroke-width="1.5"/>

  <!-- Saffron top band -->
  <path d="M 12 0 L 308 0 Q 320 0 320 12 L 320 34 L 0 34 L 0 12 Q 0 0 12 0 Z" fill="url(#vTop)"/>

  <!-- Ashoka wheel in top band -->
  <circle cx="28" cy="17" r="9" fill="none" stroke="white" stroke-width="1.4"/>
  <circle cx="28" cy="17" r="1.5" fill="white"/>
  <g stroke="white" stroke-width="0.8">
    <line x1="28" y1="10" x2="28" y2="24"/>
    <line x1="21" y1="17" x2="35" y2="17"/>
    <line x1="23" y1="12" x2="33" y2="22"/>
    <line x1="33" y1="12" x2="23" y2="22"/>
  </g>

  <text x="160" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="9" fill="white" letter-spacing="0.6">ELECTION COMMISSION OF INDIA</text>
  <text x="160" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-weight="500" font-size="7.5" fill="white" opacity="0.95">भारत निर्वाचन आयोग</text>

  <!-- Green band (identity card) -->
  <rect x="0" y="34" width="320" height="20" fill="#138808"/>
  <text x="160" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="9" fill="white" letter-spacing="0.5">IDENTITY CARD · पहचान पत्र</text>

  <!-- Body -->
  <rect x="14" y="68" width="64" height="80" rx="3" fill="url(#vPhoto)"/>
  <circle cx="46" cy="96" r="13" fill="#8B6F3E"/>
  <path d="M 26 118 Q 46 104, 66 118 L 66 140 L 26 140 Z" fill="#8B6F3E"/>

  <text x="90" y="78" font-family="Arial, sans-serif" font-weight="600" font-size="7" fill="#909090">Elector's Name / नाम</text>
  <text x="90" y="91" font-family="Arial, sans-serif" font-weight="700" font-size="11.5" fill="#1C1C1C">Raman Kumar Sharma</text>

  <text x="90" y="107" font-family="Arial, sans-serif" font-weight="600" font-size="7" fill="#909090">Father's / Husband's</text>
  <text x="90" y="119" font-family="Arial, sans-serif" font-weight="600" font-size="10" fill="#1C1C1C">Shyam Kumar Sharma</text>

  <text x="90" y="135" font-family="Arial, sans-serif" font-weight="600" font-size="7" fill="#909090">Date of Birth</text>
  <text x="90" y="146" font-family="Arial, sans-serif" font-weight="600" font-size="10" fill="#1C1C1C">15 / 06 / 1985</text>

  <!-- EPIC strip -->
  <rect x="0" y="162" width="320" height="38" fill="#FFF4DB"/>
  <line x1="0" y1="162" x2="320" y2="162" stroke="#D5C3A3" stroke-dasharray="3 2"/>
  <text x="14" y="180" font-family="Arial, sans-serif" font-weight="600" font-size="7.5" fill="#7A5A18" letter-spacing="0.3">EPIC NUMBER</text>
  <text x="14" y="196" font-family="Consolas, monospace" font-weight="900" font-size="16" fill="#7A5A18" letter-spacing="3">XYZ 1234 567</text>

  <!-- Seal / hologram -->
  <circle cx="286" cy="100" r="18" fill="none" stroke="#138808" stroke-width="1" opacity="0.35"/>
  <circle cx="286" cy="100" r="13" fill="none" stroke="#138808" stroke-width="0.7" opacity="0.35"/>
  <text x="286" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="4.5" fill="#138808" opacity="0.5">ECI</text>
  <text x="286" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="3.5" fill="#138808" opacity="0.5">INDIA</text>

  <!-- Watermark -->
  <text x="160" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="900" fill="#000" opacity="0.06" transform="rotate(-14 160 115)" letter-spacing="3">DUMMY · FOR REFERENCE</text>
</svg>
