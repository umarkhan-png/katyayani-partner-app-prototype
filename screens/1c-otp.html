<script>
document.querySelectorAll('.otp-box').forEach(function(box,i,boxes){
  box.addEventListener('input',function(){
    if(this.value&&i<boxes.length-1)boxes[i+1].focus();
    if(Array.from(boxes).every(function(b){return b.value}))setTimeout(function(){window.location.href='1c-tell-us.html'},500);
  });
  box.addEventListener('keydown',function(e){if(e.key==='Backspace'&&!this.value&&i>0)boxes[i-1].focus()});
});
var sec=28,t=document.getElementById('timer');
var iv=setInterval(function(){sec--;if(sec<=0){clearInterval(iv);t.textContent='00:00';t.style.color='#E23744';return}t.textContent='00:'+String(sec).padStart(2,'0')},1000);
</script>
<script>(function(){if(window.innerWidth>=768)return;document.body.style.cssText="background:#fff;margin:0;padding:0;overflow:hidden";var d=document.querySelector(".device");if(d)d.style.cssText="width:100vw;height:100vh;margin:0;border-radius:0;border:none;box-shadow:none;background:#fff;overflow:hidden;position:relative"})();</script>
