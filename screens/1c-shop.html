<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="manifest" href="/katyayani-partner-app-prototype/manifest.json">
<meta name="theme-color" content="#0E7A4E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KT Partner">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>1C · Shop Details</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{font-family:'Poppins',sans-serif;-webkit-font-smoothing:antialiased}
html,body{background:#fff;margin:0;padding:0;overflow:hidden}
.device{width:100%;background:#fff;overflow:hidden;position:relative;height:100vh}
.scroll-area{height:100vh;overflow-y:auto;padding-bottom:100px}
.scroll-area::-webkit-scrollbar{display:none}
.brand-font{font-family:'Poppins';font-weight:700;letter-spacing:-0.02em}
.input{width:100%;border:1.5px solid #EDEDED;border-radius:10px;padding:12px 14px;font-size:14px;font-weight:500;color:#1C1C1C;outline:none;background:#fff;font-family:'Poppins',sans-serif}
.input:focus{border-color:#0E7A4E;box-shadow:0 0 0 3px rgba(14,122,78,0.12)}
.input::placeholder{color:#9E9E9E;font-weight:400}
.label{font-size:10px;font-weight:600;color:#606060;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.opt-badge{font-size:9px;font-weight:500;color:#9E9E9E;text-transform:none;letter-spacing:0;background:#F5F5F5;border-radius:10px;padding:1px 6px}
.slide-in{animation:slideIn .25s ease-out both}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.progress-dot{width:24px;height:3px;border-radius:99px;background:#EDEDED}
.progress-dot.active{background:#0E7A4E}
@media (max-width:499px){.device{width:100vw!important;height:100vh!important;margin:0!important;border-radius:0!important;border:none!important}.scroll-area{height:100vh!important;padding-top:env(safe-area-inset-top,24px)!important}}
@media (min-width:500px){html,body{background:#1a1a1a;overflow:auto}.device{width:390px;height:780px;margin:24px auto;border-radius:36px;border:8px solid #111;box-shadow:0 30px 80px rgba(0,0,0,.4)}.scroll-area{height:780px}}
</style></head>
<body><div class="device bg-white"><div class="scroll-area">

<div class="px-4 pt-7 pb-3 flex items-center justify-between">
  <a href="1c-tell-us.html" class="w-9 h-9 rounded-full border border-[#EDEDED] flex items-center justify-center">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </a>
  <div class="flex items-center gap-1">
    <div class="progress-dot active"></div>
    <div class="progress-dot active"></div>
    <div class="progress-dot active"></div>
    <div class="progress-dot active"></div>
  </div>
  <div class="text-[11px] font-semibold text-[#606060]">4 of 4</div>
</div>
<div class="h-px bg-[#F0F0F0]"></div>

<div class="px-5 pt-5">
  <div class="brand-font text-[22px] text-[#1C1C1C] leading-tight">Shop Details</div>
  <div class="text-[13px] text-[#707070] mt-1 mb-5 leading-relaxed">We use this to deliver your orders and recommend products that work best for your area.</div>

  <div class="mb-3">
    <div class="label">Shop Name <span style="color:#E53935">*</span></div>
    <input class="input" placeholder="e.g. Maheshwari Krishi Kendra" value="Maheshwari Krishi Kendra"/>
  </div>

  <div class="text-[14px] font-bold text-[#1C1C1C] mb-3 mt-5">Shop Address</div>

  <button id="locBtn" onclick="detectLocation()" class="w-full flex items-center gap-3 rounded-[10px] px-4 py-3 mb-3 text-left" style="background:white;border:1.5px solid #0E7A4E">
    <div style="width:34px;height:34px;background:#F0FDF5;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
    </div>
    <div style="flex:1">
      <div style="font-size:13px;font-weight:700;color:#0E7A4E;line-height:1.2">Use my current location</div>
      <div style="font-size:11px;color:#909090;margin-top:2px">Auto-fills your shop address</div>
    </div>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#0E7A4E" stroke-width="2.5" stroke-linecap="round"/></svg>
  </button>

  <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
    <div style="flex:1;height:1px;background:#EDEDED"></div>
    <span style="font-size:11px;color:#BDBDBD">or enter manually</span>
    <div style="flex:1;height:1px;background:#EDEDED"></div>
  </div>

  <div class="mb-3">
    <div class="label">Pincode <span style="color:#E53935">*</span></div>
    <div class="relative">
      <input id="f-pincode" class="input" placeholder="Enter 6-digit pincode" maxlength="6" type="tel" oninput="handlePin(this)" style="padding-right:40px"/>
      <div id="pinLoader" class="hidden absolute right-3 top-1/2 -translate-y-1/2">
        <svg class="animate-spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2.5"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
      </div>
      <div id="pinCheck" class="hidden absolute right-3 top-1/2 -translate-y-1/2">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="#0C831F"/><path d="M8 12l3 3 5-5" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>
  </div>

  <div id="afterPin" style="display:none">
    <div class="mb-3 slide-in">
      <div class="label">City / Tehsil <span style="color:#E53935">*</span></div>
      <input id="f-city" class="input" placeholder="City or tehsil"/>
    </div>
    <div class="grid grid-cols-2 gap-3 mb-3 slide-in">
      <div>
        <div class="label">District</div>
        <input id="f-district" class="input" readonly style="background:#F8F8F8;color:#606060"/>
      </div>
      <div>
        <div class="label">State</div>
        <input id="f-state" class="input" readonly style="background:#F8F8F8;color:#606060"/>
      </div>
    </div>
    <div class="mb-3 slide-in">
      <div class="label">Shop / Building <span class="opt-badge">Optional</span></div>
      <input class="input" placeholder="e.g. Shop 12, Krishna Complex"/>
    </div>
    <div class="mb-3 slide-in">
      <div class="label">Landmark <span class="opt-badge">Optional</span></div>
      <input class="input" placeholder="e.g. Near Geeta Bhawan"/>
    </div>
  </div>
</div>

</div>
<div class="absolute bottom-0 left-0 right-0 bg-white px-5 py-3 border-t border-[#EDEDED]" style="padding-bottom:calc(env(safe-area-inset-bottom,0px) + 20px)">
  <a href="1c-home.html" class="block bg-[#0C831F] text-white text-center py-3.5 rounded-[10px] text-[15px] font-bold uppercase tracking-wider">Save &amp; Continue</a>
</div>
</div>
<div class="text-center text-white/60 text-xs pb-6">1C · Shop · <a href="1c-tell-us.html" class="underline">Prev</a> · <a href="1c-home.html" class="underline">Next</a> · <a href="../index.html" class="underline">All</a></div>
<script>
var PINDB={'452001':['Indore','Indore','Madhya Pradesh'],'411001':['Pune','Pune','Maharashtra'],'400001':['Mumbai','Mumbai','Maharashtra'],'110001':['New Delhi','Central Delhi','Delhi'],'380001':['Ahmedabad','Ahmedabad','Gujarat']};
function reveal(pin){
  var d=PINDB[pin]||['','',''];
  document.getElementById('f-city').value=d[0];
  document.getElementById('f-district').value=d[1];
  document.getElementById('f-state').value=d[2];
  document.getElementById('afterPin').style.display='block';
  document.getElementById('pinLoader').classList.add('hidden');
  document.getElementById('pinCheck').classList.remove('hidden');
}
function handlePin(el){
  var v=el.value.replace(/\D/g,'').slice(0,6);el.value=v;
  if(v.length===6){
    document.getElementById('pinLoader').classList.remove('hidden');
    document.getElementById('pinCheck').classList.add('hidden');
    setTimeout(function(){reveal(v)},500);
  }else{
    document.getElementById('pinLoader').classList.add('hidden');
    document.getElementById('pinCheck').classList.add('hidden');
    document.getElementById('afterPin').style.display='none';
  }
}
function detectLocation(){
  var btn=document.getElementById('locBtn');
  btn.innerHTML='<div style="width:34px;height:34px;background:#F0FDF5;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg class="animate-spin" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg></div><div style="flex:1"><div style="font-size:13px;font-weight:700;color:#0E7A4E">Detecting location…</div><div style="font-size:11px;color:#909090">Please wait</div></div>';
  setTimeout(function(){
    document.getElementById('f-pincode').value='452001';
    reveal('452001');
    btn.innerHTML='<div style="width:34px;height:34px;background:#F0FDF5;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2.5" stroke-linecap="round"><path d="M5 12l5 5L20 7"/></svg></div><div style="flex:1"><div style="font-size:13px;font-weight:700;color:#0E7A4E">Location detected</div><div style="font-size:11px;color:#909090">Indore, Madhya Pradesh · 452001</div></div>';
  },1100);
}
</script>
<script>(function(){if(window.innerWidth>=768)return;document.body.style.cssText="background:#fff;margin:0;padding:0;overflow:hidden";var d=document.querySelector(".device");if(d)d.style.cssText="width:100vw;height:100vh;margin:0;border-radius:0;border:none;box-shadow:none;background:#fff;overflow:hidden;position:relative"})();</script>
</body></html>
