<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="manifest" href="/katyayani-partner-app-prototype/manifest.json">
<meta name="theme-color" content="#0E7A4E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KT Partner">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>1C · Splash</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{font-family:'Poppins',sans-serif;-webkit-font-smoothing:antialiased}
html,body{background:#fff;margin:0;padding:0;overflow:hidden}
.device{width:100%;overflow:hidden;position:relative;height:100vh}
.brand-font{font-family:'Poppins';font-weight:700;letter-spacing:-0.02em}
.splash-bg{background:radial-gradient(ellipse at center,#094030 0%,#083D28 25%,#062A1B 55%,#042118 80%,#021710 100%)}
.fade-in{animation:fadeIn 1s ease-out forwards;opacity:0}
@keyframes fadeIn{to{opacity:1}}
.fade-in.d1{animation-delay:.15s}
.fade-in.d2{animation-delay:.4s}
.loading-bar{position:relative;height:2px;background:rgba(255,255,255,.12);border-radius:999px;overflow:hidden}
.loading-bar::after{content:'';position:absolute;left:-40%;top:0;bottom:0;width:40%;background:linear-gradient(90deg,transparent,#D4A537,transparent);animation:loading 1.8s ease-in-out infinite}
@keyframes loading{0%{left:-40%}100%{left:100%}}
@media (max-width:499px){.device{width:100vw!important;height:100vh!important;margin:0!important;border-radius:0!important;border:none!important}}
@media (min-width:500px){html,body{background:#1a1a1a;overflow:auto}.device{width:390px;height:780px;margin:24px auto;border-radius:36px;border:8px solid #111;box-shadow:0 30px 80px rgba(0,0,0,.4)}}
</style></head>
<body><div class="device splash-bg">
<div class="absolute inset-0 opacity-[0.04]" style="background-image:radial-gradient(#fff 1.2px,transparent 1.2px);background-size:26px 26px"></div>
<div class="relative z-10 pt-10 text-center fade-in">
  <span class="inline-flex items-center gap-1.5 bg-white/10 border border-white/20 text-white text-[12px] font-semibold px-3 py-1.5 rounded-full uppercase tracking-[1.5px]">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.77 5.82 22 7 14.14l-5-4.87 6.91-1.01z" fill="#D4A537"/></svg>
    India's Trusted Agri Partner
  </span>
</div>
<div class="relative z-10 h-full flex flex-col items-center justify-center -mt-8 px-8">
  <div class="fade-in d1 text-center">
    <img src="../assets/katyayani-logo.webp" alt="Katyayani" class="w-56 mx-auto" style="filter:drop-shadow(0 0 24px rgba(255,255,255,.22))">
  </div>
  <div class="fade-in d2 mt-4 text-center">
    <div class="text-[18px] font-medium text-white/90">Partner App</div>
    <div class="text-[10px] text-[#D4A537] tracking-[2px] uppercase mt-2">1C Onboarding</div>
  </div>
</div>
<div class="absolute bottom-8 left-0 right-0 px-10 text-center">
  <div class="loading-bar mb-3"></div>
  <div class="text-[12px] text-white/70 font-medium">50,000+ Krishi Partners · 22 states</div>
  <div class="text-[9px] text-white/45 mt-2">Version 2.4.1 · 1C Flow</div>
</div>
<a href="1c-welcome.html" class="absolute inset-0 z-20"></a>
</div>
<div class="text-center text-white/60 text-xs pb-6">1C · Splash · <a href="1c-welcome.html" class="underline">Next</a> · <a href="../index.html" class="underline">All</a></div>
<script>setTimeout(function(){window.location.href='1c-welcome.html'},2200);</script>
<script>(function(){if(window.innerWidth>=768)return;document.body.style.cssText="background:#042919;margin:0;padding:0;overflow:hidden";var d=document.querySelector(".device");if(d)d.style.cssText="width:100vw;height:100vh;margin:0;border-radius:0;border:none;box-shadow:none;overflow:hidden;position:relative"})();</script>
</body></html>
