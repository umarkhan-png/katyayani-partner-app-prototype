<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Add Address</title><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"><script src="https://cdn.tailwindcss.com"></script><style>*{font-family:'Manrope',sans-serif}body{background:#1a1a1a}.device{width:390px;margin:24px auto;background:#fff;border-radius:36px;box-shadow:0 30px 80px rgba(0,0,0,.4);overflow:hidden;position:relative;border:8px solid #111;height:780px}.scroll-area{height:100%;overflow-y:auto;padding-bottom:90px}.scroll-area::-webkit-scrollbar{display:none}.input{width:100%;border:1.5px solid #D4D5D9;border-radius:12px;padding:14px;font-size:14px;font-weight:600;color:#1C1C1C}.input:focus{border-color:#0E7A4E;outline:none}.label{font-size:11px;font-weight:800;color:#1C1C1C;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}</style></head><body><div class="device bg-white"><div class="scroll-area">

<div class="px-4 pt-7 pb-3 flex items-center gap-4">
<a href="addresses.html" class="w-9 h-9 rounded-full border border-[#EDEDED] flex items-center justify-center">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
</a>
<div class="text-[18px] font-extrabold">Add New Address</div>
</div>

<!-- Map -->
<div class="mx-4 h-[160px] bg-gradient-to-br from-[#D8F3E3] to-[#A8E0C0] rounded-2xl relative overflow-hidden">
<div class="absolute inset-0 opacity-20" style="background-image:linear-gradient(45deg,transparent 48%,#fff 49%,#fff 51%,transparent 52%);background-size:30px 30px"></div>
<div class="absolute inset-0 flex items-center justify-center text-5xl">📍</div>
<button class="absolute bottom-3 right-3 bg-white text-[#0E7A4E] text-[11px] font-medium px-3 py-1.5 rounded-lg shadow">📍 Use Current</button>
</div>

<div class="px-4 pt-4 space-y-4">

<div>
<div class="label">Address Type</div>
<div class="grid grid-cols-3 gap-2">
<button class="text-center py-2.5 border-2 border-[#0E7A4E] bg-[#F0FDF5] text-[#0E7A4E] text-[12px] font-medium rounded-xl">🏪 Shop</button>
<button class="text-center py-2.5 border border-[#D4D5D9] text-[12px] font-medium rounded-xl">🏠 Home</button>
<button class="text-center py-2.5 border border-[#D4D5D9] text-[12px] font-medium rounded-xl">📦 Other</button>
</div>
</div>

<div><div class="label">Shop / Business Name</div><input class="input" value="Maheshwari Krishi Kendra"/></div>

<div><div class="label">Mobile Number</div>
<div class="flex">
<div class="border border-[#D4D5D9] rounded-l-xl px-4 py-3.5 text-[14px] font-bold bg-[#F8F8F8]">+91</div>
<input class="input rounded-l-none border-l-0" value="98XXXXX234"/>
</div>
</div>

<div><div class="label">Pincode</div><input class="input" value="452001"/><div class="text-[10px] text-[#0C831F] font-bold mt-1">✓ Indore, Madhya Pradesh</div></div>

<div><div class="label">Full Address</div><textarea class="input" rows="3">Sapna Sangeeta Road, Near Geeta Bhawan, Indore</textarea></div>

<div><div class="label">Landmark (Optional)</div><input class="input" placeholder="Nearby landmark"/></div>

<div class="flex items-center gap-2 mt-2"><input type="checkbox" checked class="accent-[#0E7A4E] w-4 h-4"/><span class="text-[12px] font-medium">Make this default address</span></div>
</div>

<div class="h-4"></div>
</div>
<div class="absolute bottom-0 left-0 right-0 bg-white border-t border-[#EDEDED] p-3"><a href="addresses.html" class="block bg-[#0C831F] text-white text-center py-4 rounded-xl text-[14px] font-bold uppercase tracking-wide">Save Address</a></div>
</div><div class="text-center text-white/60 text-xs pb-6">Add Address • <a href="addresses.html" class="underline">Addresses</a> • <a href="../index.html" class="underline">All</a></div></body></html>
