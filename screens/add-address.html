<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="manifest" href="/katyayani-partner-app-prototype/manifest.json">
  <meta name="theme-color" content="#0E7A4E">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KT Partner">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Add New Address</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif !important; -webkit-font-smoothing: antialiased; }
  html, body { background: #fff; margin: 0; padding: 0; overflow: hidden; }
  .device { width: 100%; background: #fff; overflow: hidden; position: relative; height: 100vh; }
  .scroll-area { height: 100vh; overflow-y: auto; padding-bottom: calc(92px + env(safe-area-inset-bottom, 20px)); }
  .scroll-area::-webkit-scrollbar { display: none; }
  .brand-font { font-family:'Poppins',sans-serif; font-weight:700; letter-spacing:-.02em; }
  .input { width:100%; border:1.5px solid #EDEDED; border-radius:10px; padding:12px 14px; font-size:14px; font-weight:500; color:#1C1C1C; outline:none; background:#fff; }
  .input::placeholder { color:#9E9E9E; font-weight:400; }
  .input:focus { border-color:#0E7A4E; box-shadow:0 0 0 3px rgba(14,122,78,.12); }
  .input.readonly { background:#F8F8F8; color:#606060; }
  .label { font-size:10px; font-weight:600; color:#606060; text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; display:block; }
  /* Address type tile */
  .addr-type { border:1.5px solid #EDEDED; border-radius:10px; padding:12px 8px; display:flex; flex-direction:column; align-items:center; gap:4px; background:#fff; cursor:pointer; transition:all .15s ease; }
  .addr-type svg { stroke:#606060; transition: stroke .15s ease; }
  .addr-type .at-label { font-size:11px; font-weight:600; color:#1C1C1C; transition:color .15s ease; }
  .addr-type.sel { border-color:#0C831F; background:#F0FDF5; }
  .addr-type.sel svg { stroke:#0C831F; }
  .addr-type.sel .at-label { color:#0C831F; font-weight:700; }
  /* Map mini */
  .map-mini { background-image: url('https://tile.openstreetmap.org/14/11643/7128.png'); background-size: cover; background-position: center; }
  .pin-ripple { animation: ripple 2s ease-out infinite; }
  @keyframes ripple { 0% { transform: scale(0.6); opacity:.6; } 100% { transform: scale(2); opacity:0; } }
  @media screen and (max-width: 499px) {
    .device { width: 100vw !important; height: 100vh !important; margin: 0 !important;
              border-radius: 0 !important; border: none !important; }
    .scroll-area { height: 100vh !important; }
  }

  @media screen and (min-width: 500px) {
    html, body { background: #1a1a1a; overflow: auto; }
    .device { width: 390px; height: 780px; margin: 24px auto; border-radius: 36px; border: 8px solid #111; box-shadow: 0 30px 80px rgba(0,0,0,.4); }
    .scroll-area { height: 780px; }
  }
</style>
<style>
@media screen and (max-width: 499px) {
  .scroll-area { padding-top: env(safe-area-inset-top, 24px) !important; }
  .device { box-sizing: border-box; }
}
</style>
</head>
<body>
<div class="device bg-white">
<div class="scroll-area">

  <!-- HEADER -->
  <div class="px-4 pt-7 pb-3 flex items-center gap-3 bg-white border-b border-[#EDEDED] sticky top-0 z-10">
    <a href="addresses.html" class="w-9 h-9 rounded-full border border-[#EDEDED] flex items-center justify-center">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <div class="flex-1">
      <div class="brand-font text-[20px] text-[#1C1C1C]">Add New Address</div>
      <div class="text-[12px] text-[#606060]">Used for order delivery</div>
    </div>
  </div>

  <!-- FORM -->
  <div class="px-4 pt-5 space-y-3.5">

    <!-- Address Type -->
    <div>
      <div class="label">Address Type</div>
      <div class="grid grid-cols-4 gap-2">
        <button class="addr-type sel" data-type="Shop">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M5 21V11l7-5 7 5v10"/><path d="M9 21v-6h6v6"/></svg>
          <span class="at-label">Shop</span>
        </button>
        <button class="addr-type" data-type="Home">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2h-4v-7h-6v7H5a2 2 0 01-2-2z"/></svg>
          <span class="at-label">Home</span>
        </button>
        <button class="addr-type" data-type="Warehouse">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-5 9 5v12H3z"/><path d="M9 21v-7h6v7M3 14h18"/></svg>
          <span class="at-label">Warehouse</span>
        </button>
        <button class="addr-type" data-type="Other">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg>
          <span class="at-label">Other</span>
        </button>
      </div>
    </div>

    <!-- Other type name (only when Other selected) -->
    <div id="otherTypeWrap" class="hidden">
      <div class="label">Save address as</div>
      <input id="otherTypeInput" class="input" placeholder="e.g. Farm office, Godown 2"/>
    </div>

    <!-- Shop Number -->
    <div>
      <div class="label">Shop Number / Building Name</div>
      <input class="input" placeholder="Shop 12, Krishna Complex"/>
    </div>

    <!-- Village / Area -->
    <div>
      <div class="label">Village / Area</div>
      <input class="input" placeholder="e.g. Sapna Sangeeta"/>
    </div>

    <!-- Landmark -->
    <div>
      <div class="label">Landmark / Nearby Place <span class="text-[#9E9E9E] normal-case tracking-normal font-normal">(optional)</span></div>
      <input class="input" placeholder="Near Geeta Bhawan"/>
    </div>

    <!-- City / Tehsil / PO -->
    <div>
      <div class="label">City / Tehsil / Post Office</div>
      <input class="input" placeholder="Enter your city, tehsil or PO"/>
    </div>

    <!-- Pincode -->
    <div>
      <div class="flex items-center justify-between mb-1.5">
        <span class="label" style="margin-bottom:0">Pincode</span>
        <button class="flex items-center gap-1 text-[12px] font-semibold text-[#0E7A4E]">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/></svg>
          Use my location
        </button>
      </div>
      <input class="input" value="452001" maxlength="6"/>
    </div>

    <!-- District / State -->
    <div class="grid grid-cols-2 gap-3">
      <div>
        <div class="label">District</div>
        <input class="input readonly" value="Indore" readonly/>
      </div>
      <div>
        <div class="label">State</div>
        <input class="input readonly" value="Madhya Pradesh" readonly/>
      </div>
    </div>

    <!-- Default toggle -->
    <label class="flex items-center gap-2.5 mt-1 bg-[#F8F8F8] border border-[#EDEDED] rounded-[10px] px-3 py-2.5 cursor-pointer">
      <input type="checkbox" checked class="w-4 h-4 accent-[#0C831F]"/>
      <div class="flex-1 leading-tight">
        <div class="text-[14px] font-semibold text-[#1C1C1C]">Make this my default address</div>
        <div class="text-[12px] text-[#606060] mt-0.5">New orders will ship here unless changed</div>
      </div>
    </label>
  </div>

  <div class="h-4"></div>
</div>

<!-- STICKY CTA -->
<div class="absolute bottom-0 left-0 right-0 bg-white border-t border-[#EDEDED] px-3 py-3" style="box-shadow:0 -4px 12px rgba(0,0,0,.04)">
  <a href="addresses.html" class="block bg-[#0C831F] text-white text-center py-3.5 rounded-[10px] text-[15px] font-black uppercase tracking-wider flex items-center justify-center gap-2" style="box-shadow:0 6px 18px -4px rgba(12,131,31,.45)">
    Save Address
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </a>
</div>

</div>

<div class="text-center text-white/60 text-xs pb-6">Add Address · <a href="addresses.html" class="underline">Addresses</a> · <a href="../index.html" class="underline">All</a></div>
<script>
  document.querySelectorAll('.addr-type').forEach(function(btn){
    btn.addEventListener('click', function(){
      document.querySelectorAll('.addr-type').forEach(b => b.classList.remove('sel'));
      btn.classList.add('sel');
      var wrap = document.getElementById('otherTypeWrap');
      if(btn.dataset.type === 'Other'){
        wrap.classList.remove('hidden');
        document.getElementById('otherTypeInput').focus();
      } else {
        wrap.classList.add('hidden');
      }
    });
  });
</script>
  <script>if("serviceWorker"in navigator){navigator.serviceWorker.register("/katyayani-partner-app-prototype/sw.js")}</script>
<script>(function(){if(window.innerWidth>=768)return;document.body.style.cssText="background:#fff;margin:0;padding:0;overflow:hidden";var d=document.querySelector(".device");if(d)d.style.cssText="width:100vw;height:100vh;margin:0;border-radius:0;border:none;box-shadow:none;background:#fff;overflow:hidden;position:relative";var s=document.querySelector(".scroll-area");if(s){s.style.height="100vh";s.style.paddingTop="env(safe-area-inset-top,24px)";}})();</script>
</body>
</html>
