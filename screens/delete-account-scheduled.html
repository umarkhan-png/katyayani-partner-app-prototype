<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="manifest" href="/katyayani-partner-app-prototype/manifest.json">
  <meta name="theme-color" content="#0E7A4E">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KT Partner">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Account Scheduled for Deletion · Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #fff; margin: 0; padding: 0; overflow: hidden; }
  .device { width: 100%; background: #fff; overflow: hidden; position: relative; height: 100vh; }
  .scroll-area { height: 100vh; overflow-y: auto; }
  .scroll-area::-webkit-scrollbar { display: none; }
  .brand-font { font-family: 'Poppins', sans-serif; font-weight: 700; letter-spacing: -0.02em; }
  .pop { animation: pop .45s cubic-bezier(.18,.89,.32,1.28) both; }
  @keyframes pop { 0% { transform: scale(.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  .ring { animation: ring .6s ease-out both; }
  @keyframes ring { 0% { transform: scale(.6); opacity: .6; } 100% { transform: scale(1.5); opacity: 0; } }
  .fade-up { animation: fadeUp .5s ease-out .15s both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @media screen and (max-width: 499px) {
    .device { width: 100vw !important; height: 100vh !important; margin: 0 !important; border-radius: 0 !important; border: none !important; }
    .scroll-area { height: 100vh !important; }
  }
  @media screen and (min-width: 500px) {
    html, body { background: #1a1a1a; overflow: auto; }
    .device { width: 390px; height: 780px; margin: 24px auto; border-radius: 36px; border: 8px solid #111; box-shadow: 0 30px 80px rgba(0,0,0,.4); }
    .scroll-area { height: 780px; }
  }
</style>
<style>
@media screen and (max-width: 499px) {
  .scroll-area { padding-top: env(safe-area-inset-top, 24px) !important; }
  .device { box-sizing: border-box; }
}
</style>
</head>
<body>
<div class="device bg-white">
<div class="scroll-area">

  <div class="px-6 flex flex-col items-center justify-center text-center" style="min-height:100%">

    <!-- success tick -->
    <div class="relative w-24 h-24 flex items-center justify-center">
      <div class="absolute inset-0 rounded-full bg-[#0E7A4E]/15 ring"></div>
      <div class="w-20 h-20 rounded-full bg-[#0E7A4E] flex items-center justify-center pop">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
      </div>
    </div>

    <div class="text-[22px] font-bold text-[#1C1C1C] mt-5 leading-tight fade-up">Account deleted</div>
    <div class="text-[14px] text-[#707070] mt-2.5 leading-relaxed fade-up px-4">Log in within <b class="text-[#0E7A4E]">30 days</b> to get it back.</div>

    <!-- redirect note -->
    <div class="flex items-center gap-2 mt-9 fade-up">
      <svg class="animate-spin" width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#E0E0E0" stroke-width="2.5"/><path d="M21 12a9 9 0 00-9-9" stroke="#0E7A4E" stroke-width="2.5" stroke-linecap="round"/></svg>
      <span class="text-[12px] text-[#909090] font-medium">Logging you out…</span>
    </div>

  </div>

</div>
</div>
<script>
  // Account is scheduled — log the user out and send them to the enter-mobile screen.
  setTimeout(function(){ window.location.href = 'rapido-phone.html'; }, 3000);
</script>
<script>if("serviceWorker"in navigator){navigator.serviceWorker.register("/katyayani-partner-app-prototype/sw.js")}</script>
</body>
</html>
