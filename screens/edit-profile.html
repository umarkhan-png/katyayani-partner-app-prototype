<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="manifest" href="/katyayani-partner-app-prototype/manifest.json">
  <meta name="theme-color" content="#0E7A4E">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KT Partner">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Edit Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif !important; -webkit-font-smoothing: antialiased; }
  html, body { background: #fff; margin: 0; padding: 0; overflow: hidden; }
  .device { width: 100%; background: #fff; overflow: hidden; position: relative; height: 100vh; }
  .scroll-area { height: 100vh; overflow-y: auto; padding-bottom: calc(92px + env(safe-area-inset-bottom, 20px)); }
  .scroll-area::-webkit-scrollbar { display: none; }
  .brand-font { font-family:'Poppins',sans-serif; font-weight:700; letter-spacing:-.02em; }
  .input { width:100%; border:1.5px solid #EDEDED; border-radius:10px; padding:12px 14px; font-size:14px; font-weight:500; color:#1C1C1C; outline:none; background:#fff; }
  .input::placeholder { color:#9E9E9E; font-weight:400; }
  .input:focus { border-color:#0E7A4E; box-shadow:0 0 0 3px rgba(14,122,78,.12); }
  .input.readonly { background:#F8F8F8; color:#606060; }
  .label { font-size:10px; font-weight:600; color:#606060; text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; display:block; }
  .role-card { border:1.5px solid #EDEDED; border-radius:10px; padding:12px 8px; display:flex; flex-direction:column; align-items:center; gap:4px; background:#fff; cursor:pointer; transition:all .15s ease; }
  .role-card svg { stroke:#606060; transition: stroke .15s ease; }
  .role-card .rc-label { font-size:11px; font-weight:600; color:#1C1C1C; transition:color .15s ease; }
  .role-card.sel { border-color:#0C831F; background:#F0FDF5; }
  .role-card.sel svg { stroke:#0C831F; }
  .role-card.sel .rc-label { color:#0C831F; font-weight:700; }
  @media screen and (max-width: 499px) {
    .device { width: 100vw !important; height: 100vh !important; margin: 0 !important;
              border-radius: 0 !important; border: none !important; }
    .scroll-area { height: 100vh !important; }
  }
  @media screen and (min-width: 500px) {
    html, body { background: #1a1a1a; overflow: auto; }
    .device { width: 390px; height: 780px; margin: 24px auto; border-radius: 36px; border: 8px solid #111; box-shadow: 0 30px 80px rgba(0,0,0,.4); }
    .scroll-area { height: 780px; }
  }
</style>
<style>
@media screen and (max-width: 499px) {
  .scroll-area { padding-top: env(safe-area-inset-top, 24px) !important; }
  .device { box-sizing: border-box; }
}
</style>
</head>
<body>
<div class="device bg-white">
<div class="scroll-area">

  <!-- HEADER -->
  <div class="px-4 pt-7 pb-3 flex items-center gap-3 bg-white border-b border-[#EDEDED] sticky top-0 z-10">
    <a href="profile.html" class="w-9 h-9 rounded-full border border-[#EDEDED] flex items-center justify-center">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <div class="flex-1">
      <div class="brand-font text-[20px] text-[#1C1C1C]">Edit Profile</div>
      <div class="text-[12px] text-[#606060]">Keep your details up to date</div>
    </div>
  </div>

  <!-- AVATAR -->
  <div class="flex flex-col items-center pt-5 pb-1">
    <div class="relative">
      <div class="w-[84px] h-[84px] rounded-full flex items-center justify-center text-white text-[30px] font-bold" style="background:linear-gradient(135deg,#0E7A4E,#083D28)">UK</div>
      <button class="absolute -bottom-0.5 -right-0.5 w-8 h-8 rounded-full bg-[#0C831F] border-[3px] border-white flex items-center justify-center" style="box-shadow:0 2px 8px rgba(12,131,31,.4)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
      </button>
    </div>
    <button class="mt-2 text-[12px] font-semibold text-[#0E7A4E]">Change photo</button>
  </div>

  <!-- FORM -->
  <div class="px-4 pt-3 space-y-3.5">

    <!-- Name -->
    <div class="grid grid-cols-2 gap-3">
      <div>
        <div class="label">First Name</div>
        <input class="input" value="Umar"/>
      </div>
      <div>
        <div class="label">Last Name</div>
        <input class="input" value="Khan"/>
      </div>
    </div>

    <!-- Mobile (verified, read-only) -->
    <div>
      <div class="label">Mobile Number</div>
      <div class="flex">
        <div class="border border-[#EDEDED] border-r-0 rounded-l-xl px-3 py-3 text-[14px] font-semibold bg-[#F8F8F8] text-[#606060] flex items-center">+91</div>
        <div class="input readonly rounded-l-none flex items-center justify-between">
          <span>98260 12345</span>
          <span class="inline-flex items-center gap-0.5 bg-[#F0FDF5] border border-[#0E7A4E]/30 text-[#0C831F] text-[9px] font-semibold px-1.5 py-0.5 rounded uppercase tracking-wider">
            <svg width="8" height="8" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="#0C831F" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Verified
          </span>
        </div>
      </div>
    </div>

    <!-- Email -->
    <div>
      <div class="label">Email <span class="text-[#9E9E9E] normal-case tracking-normal font-normal">(optional)</span></div>
      <input class="input" type="email" placeholder="you@example.com" value=""/>
    </div>

    <!-- Business Entity Type -->
    <div>
      <div class="label">Business Entity Type</div>
      <div class="grid grid-cols-3 gap-2">
        <button class="role-card sel" data-role="Proprietor">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0112 0v1"/></svg>
          <span class="rc-label">Proprietor</span>
        </button>
        <button class="role-card" data-role="Pvt Limited">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="1.5"/><path d="M8 7h2M14 7h2M8 11h2M14 11h2M8 15h2M14 15h2M10 21v-3h4v3"/></svg>
          <span class="rc-label">Pvt Limited</span>
        </button>
        <button class="role-card" data-role="Partnership">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="9" r="3"/><circle cx="17" cy="9" r="3"/><path d="M2 20v-1a5 5 0 016-4.9M22 20v-1a5 5 0 00-6-4.9"/></svg>
          <span class="rc-label">Partnership</span>
        </button>
      </div>
    </div>
  </div>

  <div class="h-4"></div>
</div>

<!-- STICKY CTA -->
<div class="absolute bottom-0 left-0 right-0 bg-white border-t border-[#EDEDED] px-3 py-3" style="box-shadow:0 -4px 12px rgba(0,0,0,.04)">
  <a href="profile.html" class="block bg-[#0C831F] text-white text-center py-3.5 rounded-[10px] text-[15px] font-black uppercase tracking-wider flex items-center justify-center gap-2" style="box-shadow:0 6px 18px -4px rgba(12,131,31,.45)">
    Save Changes
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </a>
</div>

</div>

<div class="text-center text-white/60 text-xs pb-6">Edit Profile · <a href="profile.html" class="underline">Account</a> · <a href="../index.html" class="underline">All</a></div>
<script>
  document.querySelectorAll('.role-card').forEach(function(btn){
    btn.addEventListener('click', function(){
      document.querySelectorAll('.role-card').forEach(b => b.classList.remove('sel'));
      btn.classList.add('sel');
    });
  });
</script>
  <script>if("serviceWorker"in navigator){navigator.serviceWorker.register("/katyayani-partner-app-prototype/sw.js")}</script>
<script>(function(){if(window.innerWidth>=768)return;document.body.style.cssText="background:#fff;margin:0;padding:0;overflow:hidden";var d=document.querySelector(".device");if(d)d.style.cssText="width:100vw;height:100vh;margin:0;border-radius:0;border:none;box-shadow:none;background:#fff;overflow:hidden;position:relative";var s=document.querySelector(".scroll-area");if(s){s.style.height="100vh";s.style.paddingTop="env(safe-area-inset-top,24px)";}})();</script>
</body>
</html>
