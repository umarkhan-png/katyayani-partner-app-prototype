<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Verify Aadhaar &middot; Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #1a1a1a; }
  .device { width: 390px; margin: 24px auto; background: #fff; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; }
  .scroll-area { height: 100%; overflow-y: auto; padding-bottom: 90px; }
  .scroll-area::-webkit-scrollbar { display: none; }
  .brand-font { font-family: 'Poppins', sans-serif; font-weight: 700; letter-spacing: -0.02em; }
  .input { width: 100%; border: 1.5px solid #EDEDED; border-radius: 12px; padding: 12px 14px; font-size: 14px; font-weight: 500; color: #1C1C1C; outline: none; background: #fff; }
  .input::placeholder { color: #9E9E9E; font-weight: 400; }
  .input:focus { border-color: #0E7A4E; box-shadow: 0 0 0 3px rgba(14,122,78,0.12); }
  .label { font-size: 10px; font-weight: 600; color: #606060; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
  .method-tab { transition: all .15s; }
  .method-tab.active { background: #F0FDF5; border-color: #0E7A4E; }
  .method-tab.active .check { display: flex; }
  .method-tab .check { display: none; }
  .method-pane { display: none; }
  .method-pane.active { display: block; }
</style>
</head>
<body>
<div class="device bg-[#F8F8F8]">
<div class="scroll-area">

  <!-- HEADER -->
  <div class="px-4 pt-7 pb-3 flex items-center gap-3 bg-white border-b border-[#EDEDED] sticky top-0 z-20">
    <a href="kyc.html" class="w-9 h-9 rounded-full border border-[#EDEDED] flex items-center justify-center">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <div class="flex-1">
      <div class="brand-font text-[18px] text-[#1C1C1C]">Verify Aadhaar</div>
      <div class="text-[10px] text-[#606060]">Choose how to verify</div>
    </div>
  </div>

  <!-- BODY -->
  <div class="px-4 pt-4">

    <!-- METHOD CHOICE -->
    <div class="space-y-2.5">
      <button class="method-tab active w-full bg-white border-2 border-[#EDEDED] rounded-2xl p-3.5 flex items-center gap-3 text-left relative" data-pane="otp-pane">
        <div class="w-11 h-11 rounded-xl bg-[#F0FDF5] border border-[#0E7A4E]/30 flex items-center justify-center flex-shrink-0">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9z"/></svg>
        </div>
        <div class="flex-1 leading-tight">
          <div class="text-[13px] font-semibold text-[#1C1C1C]">Instant via OTP</div>
          <div class="text-[10px] text-[#606060] mt-0.5">Verified in 30 seconds</div>
        </div>
        <span class="bg-[#FFF8E6] text-[#8B6914] text-[8px] font-semibold px-1.5 py-0.5 rounded uppercase tracking-wider">Recommended</span>
        <div class="check absolute top-2.5 right-2.5 w-5 h-5 rounded-full bg-[#0E7A4E] items-center justify-center">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </button>

      <button class="method-tab w-full bg-white border-2 border-[#EDEDED] rounded-2xl p-3.5 flex items-center gap-3 text-left relative" data-pane="upload-pane">
        <div class="w-11 h-11 rounded-xl bg-[#FFF8E6] border border-[#D4A537]/30 flex items-center justify-center flex-shrink-0">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8B6914" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
        </div>
        <div class="flex-1 leading-tight">
          <div class="text-[13px] font-semibold text-[#1C1C1C]">Upload Aadhaar card</div>
          <div class="text-[10px] text-[#606060] mt-0.5">Manual review &middot; takes 1-2 days</div>
        </div>
        <div class="check absolute top-2.5 right-2.5 w-5 h-5 rounded-full bg-[#0E7A4E] items-center justify-center">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </button>
    </div>

    <!-- OTP PANE -->
    <div id="otp-pane" class="method-pane active mt-4 bg-white rounded-2xl border border-[#EDEDED] p-4">
      <div class="label">Aadhaar Number</div>
      <input class="input text-center text-[16px] tracking-[3px]" placeholder="0000 0000 0000" maxlength="14" value="1234 5678 9012"/>

      <button class="w-full mt-3 bg-[#0E7A4E] text-white py-3 rounded-xl text-[12px] font-semibold uppercase tracking-wider">
        Send OTP to linked mobile
      </button>

      <div class="mt-3 flex items-start gap-2 bg-[#F0FDF5] border border-[#0E7A4E]/30 rounded-lg p-2.5">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#0C831F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="flex-shrink-0 mt-0.5"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h0"/></svg>
        <div class="text-[10px] text-[#1C1C1C] leading-snug">OTP will be sent to your mobile number registered with UIDAI. Verified instantly.</div>
      </div>
    </div>

    <!-- UPLOAD PANE -->
    <div id="upload-pane" class="method-pane mt-4 bg-white rounded-2xl border border-[#EDEDED] p-4">
      <div class="label">Aadhaar Number</div>
      <input class="input text-center text-[16px] tracking-[3px] mb-3" placeholder="0000 0000 0000" maxlength="14"/>

      <div class="label">Upload Aadhaar Card</div>
      <div class="grid grid-cols-2 gap-2.5">
        <button class="border-2 border-dashed border-[#EDEDED] rounded-xl p-3 flex flex-col items-center justify-center hover:border-[#0E7A4E]" style="min-height:96px">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="12" cy="12" r="3"/><path d="M7 5l1.5-2h7L17 5"/></svg>
          <div class="text-[10px] font-semibold text-[#1C1C1C] mt-1.5">Front side</div>
          <div class="text-[8px] text-[#606060]">Tap to capture</div>
        </button>
        <button class="border-2 border-dashed border-[#EDEDED] rounded-xl p-3 flex flex-col items-center justify-center hover:border-[#0E7A4E]" style="min-height:96px">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="12" cy="12" r="3"/><path d="M7 5l1.5-2h7L17 5"/></svg>
          <div class="text-[10px] font-semibold text-[#1C1C1C] mt-1.5">Back side</div>
          <div class="text-[8px] text-[#606060]">Tap to capture</div>
        </button>
      </div>

      <div class="mt-3 flex items-start gap-2 bg-[#FFF8E6] border border-[#D4A537]/40 rounded-lg p-2.5">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#8B6914" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="flex-shrink-0 mt-0.5"><circle cx="12" cy="12" r="10"/><path d="M12 7v5l3 2"/></svg>
        <div class="text-[10px] text-[#1C1C1C] leading-snug">
          <span class="font-semibold">Manual review takes 1-2 days.</span> You can browse the app meanwhile, prices unlock once verified.
        </div>
      </div>
    </div>

  </div>

  <div class="h-4"></div>
</div>

<!-- STICKY CTA -->
<div class="absolute bottom-0 left-0 right-0 bg-white border-t border-[#EDEDED] px-4 py-3">
  <a href="kyc.html" class="block bg-[#0C831F] text-white text-center py-3 rounded-xl text-[13px] font-semibold uppercase tracking-wider">
    Submit
  </a>
</div>

</div>

<script>
  document.querySelectorAll('.method-tab').forEach(tab => {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.method-tab').forEach(t => t.classList.remove('active'));
      this.classList.add('active');
      document.querySelectorAll('.method-pane').forEach(p => p.classList.remove('active'));
      document.getElementById(this.getAttribute('data-pane')).classList.add('active');
    });
  });
</script>

<div class="text-center text-white/60 text-xs pb-6">Verify Aadhaar &middot; <a href="kyc.html" class="underline">KYC</a> &middot; <a href="../index.html" class="underline">All</a></div>
</body>
</html>
