<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Verify Business &middot; Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #1a1a1a; }
  .device { width: 390px; margin: 24px auto; background: #fff; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; }
  .scroll-area { height: 100%; overflow-y: auto; padding-bottom: 90px; }
  .scroll-area::-webkit-scrollbar { display: none; }
  .brand-font { font-family: 'Poppins', sans-serif; font-weight: 700; letter-spacing: -0.02em; }
</style>
</head>
<body>
<div class="device bg-[#F8F8F8]">
<div class="scroll-area">

  <!-- HEADER -->
  <div class="px-4 pt-7 pb-3 flex items-center gap-3 bg-white border-b border-[#EDEDED] sticky top-0 z-20">
    <a href="shop-details.html" class="w-9 h-9 rounded-full border border-[#EDEDED] flex items-center justify-center">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <div class="flex-1">
      <div class="brand-font text-[18px] text-[#1C1C1C]">Verify Business</div>
      <div class="text-[10px] text-[#606060]">Step 2 of 2</div>
    </div>
    <a href="home.html" class="text-[11px] font-semibold text-[#0E7A4E]">Skip</a>
  </div>

  <!-- PROGRESS BAR -->
  <div class="h-1 bg-[#EDEDED]">
    <div class="h-full bg-[#0E7A4E]" style="width: 100%"></div>
  </div>

  <!-- INFO STRIP -->
  <div class="mx-4 mt-4 bg-[#F0FDF5] border border-[#0E7A4E]/30 rounded-xl px-3 py-2 flex items-center gap-2">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0C831F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>
    <div class="text-[10px] text-[#1C1C1C] font-medium leading-tight">Verify to unlock <span class="font-semibold text-[#0C831F]">dealer prices</span> &amp; place orders</div>
  </div>

  <!-- REQUIRED DOCS -->
  <div class="px-4 pt-4 flex items-center justify-between">
    <div class="text-[10px] font-semibold text-[#606060] uppercase tracking-wider">Required</div>
    <div class="text-[10px] text-[#0C831F] font-semibold">1 of 2 done</div>
  </div>
  <div class="mx-4 mt-2 bg-white rounded-2xl border border-[#EDEDED] divide-y divide-[#EDEDED] overflow-hidden">

    <!-- Aadhaar — verified -->
    <button class="w-full px-3.5 py-3 flex items-center gap-3 text-left">
      <div class="w-9 h-9 rounded-xl bg-[#F0FDF5] border border-[#0E7A4E]/20 flex items-center justify-center flex-shrink-0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="11" r="2"/><path d="M14 9h4M14 13h4M6 16h8"/></svg>
      </div>
      <div class="flex-1 leading-tight min-w-0">
        <div class="text-[12px] font-semibold text-[#1C1C1C]">Aadhaar</div>
        <div class="text-[10px] text-[#606060]">XXXX XXXX 9012</div>
      </div>
      <div class="flex items-center gap-1 bg-[#F0FDF5] border border-[#0E7A4E]/30 rounded-full px-2 py-0.5">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="#0C831F" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="text-[9px] font-semibold text-[#0C831F]">Verified</span>
      </div>
    </button>

    <!-- Pesticide License — required -->
    <button class="w-full px-3.5 py-3 flex items-center gap-3 text-left">
      <div class="w-9 h-9 rounded-xl bg-[#FFF8E6] border border-[#D4A537]/30 flex items-center justify-center flex-shrink-0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8B6914" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 13h6M9 17h4"/></svg>
      </div>
      <div class="flex-1 leading-tight min-w-0">
        <div class="text-[12px] font-semibold text-[#1C1C1C]">Pesticide License</div>
        <div class="text-[10px] text-[#606060]">License no. + expiry + photo</div>
      </div>
      <span class="bg-[#FFF0F0] text-[#E23744] text-[8px] font-semibold px-1.5 py-0.5 rounded uppercase tracking-wider">Required</span>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" class="ml-1"><path d="M9 6l6 6-6 6" stroke="#9E9E9E" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

  </div>

  <!-- OPTIONAL DOCS -->
  <div class="px-4 pt-5 flex items-center justify-between">
    <div class="text-[10px] font-semibold text-[#606060] uppercase tracking-wider">Optional <span class="text-[#9E9E9E] normal-case font-medium">· earn 5% extra coins</span></div>
  </div>
  <div class="mx-4 mt-2 bg-white rounded-2xl border border-[#EDEDED] divide-y divide-[#EDEDED] overflow-hidden">

    <button class="w-full px-3.5 py-3 flex items-center gap-3 text-left">
      <div class="w-9 h-9 rounded-xl bg-[#F0FDF5] border border-[#0E7A4E]/20 flex items-center justify-center flex-shrink-0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9h18M3 9V6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v3M3 9v9a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9M7 14h4"/></svg>
      </div>
      <div class="flex-1 leading-tight min-w-0">
        <div class="text-[12px] font-semibold text-[#1C1C1C]">PAN Card</div>
        <div class="text-[10px] text-[#606060]">For tax compliance</div>
      </div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="#9E9E9E" stroke-width="2" stroke-linecap="round"/></svg>
    </button>

    <button class="w-full px-3.5 py-3 flex items-center gap-3 text-left">
      <div class="w-9 h-9 rounded-xl bg-[#F0FDF5] border border-[#0E7A4E]/20 flex items-center justify-center flex-shrink-0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/></svg>
      </div>
      <div class="flex-1 leading-tight min-w-0">
        <div class="text-[12px] font-semibold text-[#1C1C1C]">GST Number</div>
        <div class="text-[10px] text-[#606060]">For GST invoice &amp; ITC</div>
      </div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="#9E9E9E" stroke-width="2" stroke-linecap="round"/></svg>
    </button>

    <button class="w-full px-3.5 py-3 flex items-center gap-3 text-left">
      <div class="w-9 h-9 rounded-xl bg-[#F0FDF5] border border-[#0E7A4E]/20 flex items-center justify-center flex-shrink-0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="12" cy="12" r="3"/><path d="M7 5l1.5-2h7L17 5"/></svg>
      </div>
      <div class="flex-1 leading-tight min-w-0">
        <div class="text-[12px] font-semibold text-[#1C1C1C]">Shop Photo</div>
        <div class="text-[10px] text-[#606060]">Outside &amp; inside view</div>
      </div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="#9E9E9E" stroke-width="2" stroke-linecap="round"/></svg>
    </button>

    <button class="w-full px-3.5 py-3 flex items-center gap-3 text-left">
      <div class="w-9 h-9 rounded-xl bg-[#F0FDF5] border border-[#0E7A4E]/20 flex items-center justify-center flex-shrink-0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M5 21V10l7-5 7 5v11M9 21v-6h6v6"/></svg>
      </div>
      <div class="flex-1 leading-tight min-w-0">
        <div class="text-[12px] font-semibold text-[#1C1C1C]">Bank Account</div>
        <div class="text-[10px] text-[#606060]">For refunds &amp; cashback</div>
      </div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="#9E9E9E" stroke-width="2" stroke-linecap="round"/></svg>
    </button>

  </div>

  <div class="px-5 pt-3 pb-3 text-[9px] text-[#9E9E9E] font-medium text-center flex items-center justify-center gap-1">
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#9E9E9E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="11" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
    Encrypted &amp; never shared
  </div>

</div>

<!-- STICKY CTA -->
<div class="absolute bottom-0 left-0 right-0 bg-white border-t border-[#EDEDED] px-4 py-3">
  <a href="verification-status.html" class="block bg-[#0C831F] text-white text-center py-3 rounded-xl text-[13px] font-semibold uppercase tracking-wider">
    Submit for Verification
  </a>
</div>

</div>
<div class="text-center text-white/60 text-xs pb-6">Verification &middot; <a href="shop-details.html" class="underline">Shop</a> &middot; <a href="verification-status.html" class="underline">Status</a> &middot; <a href="../index.html" class="underline">All</a></div>
</body>
</html>
