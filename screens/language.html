<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="manifest" href="/katyayani-partner-app-prototype/manifest.json">
  <meta name="theme-color" content="#0E7A4E">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KT Partner">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Choose Language &middot; Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #fff; margin: 0; padding: 0; overflow: hidden; }
  .device { width: 100%; background: #fff; overflow: hidden; position: relative; height: 100vh; }
  .brand-font { font-family: 'Poppins', sans-serif; font-weight: 700; letter-spacing: -0.02em; }
  .hide-scrollbar::-webkit-scrollbar { display: none; }
  .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  .lang-tile { transition: all .15s; }
  .lang-tile.selected { background: #F0FDF5; border-color: #0E7A4E; }
  .lang-tile.selected .check { display: flex; }
  .lang-tile .check { display: none; }
  @media screen and (max-width: 499px) {
    .device { width: 100vw !important; height: 100vh !important; margin: 0 !important;
              border-radius: 0 !important; border: none !important; }
    .scroll-area { height: 100vh !important; }
  }

  @media screen and (min-width: 500px) {
    html, body { background: #1a1a1a; overflow: auto; }
    .device { width: 390px; height: 780px; margin: 24px auto; border-radius: 36px; border: 8px solid #111; box-shadow: 0 30px 80px rgba(0,0,0,.4); }
    .scroll-area { height: 780px; }
  }
</style>
<style>
@media screen and (max-width: 499px) {
  .scroll-area { padding-top: env(safe-area-inset-top, 24px) !important; }
  .device { box-sizing: border-box; }
}
</style>
</head>
<body>
  <div class="device bg-white">
    <div class="h-full flex flex-col">

      <!-- HEADER (matches OTP/profile-setup style) -->
      <div class="px-4 pt-7 pb-3 flex items-center gap-3">
        <a href="splash.html" class="w-9 h-9 rounded-full border border-[#EDEDED] flex items-center justify-center">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
      </div>

      <!-- TITLE -->
      <div class="px-6 pt-2 pb-5">
        <div class="text-[28px] font-extrabold text-[#1C1C1C] leading-tight">Choose your<br>language</div>
      </div>

      <!-- LANGUAGE LIST -->
      <div class="flex-1 px-5 overflow-y-auto hide-scrollbar">
        <div class="grid grid-cols-2 gap-3 pb-6">

          <div onclick="selectLang(this)" class="lang-tile cursor-pointer bg-white border-2 border-[#EDEDED] rounded-2xl px-4 py-6 text-left relative block active:bg-[#F0FDF5] active:border-[#0E7A4E]"><svg class="absolute top-2.5 right-2.5 opacity-40" width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <div class="text-[20px] font-semibold text-[#1C1C1C]">English</div>
            <div class="text-[13px] text-[#606060] mt-0.5">English</div>
          </div>

          <div onclick="selectLang(this)" class="lang-tile cursor-pointer bg-white border-2 border-[#EDEDED] rounded-2xl px-4 py-6 text-left relative block active:bg-[#F0FDF5] active:border-[#0E7A4E]"><svg class="absolute top-2.5 right-2.5 opacity-40" width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <div class="text-[20px] font-semibold text-[#1C1C1C]">Hinglish</div>
            <div class="text-[13px] text-[#606060] mt-0.5">English + Hindi</div>
          </div>

          <div onclick="selectLang(this)" class="lang-tile cursor-pointer bg-white border-2 border-[#EDEDED] rounded-2xl px-4 py-6 text-left relative block active:bg-[#F0FDF5] active:border-[#0E7A4E]"><svg class="absolute top-2.5 right-2.5 opacity-40" width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <div class="text-[20px] font-semibold text-[#1C1C1C]">हिंदी</div>
            <div class="text-[13px] text-[#606060] mt-0.5">Hindi</div>
          </div>

          <div onclick="selectLang(this)" class="lang-tile cursor-pointer bg-white border-2 border-[#EDEDED] rounded-2xl px-4 py-6 text-left relative block active:bg-[#F0FDF5] active:border-[#0E7A4E]"><svg class="absolute top-2.5 right-2.5 opacity-40" width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <div class="text-[20px] font-semibold text-[#1C1C1C]">मराठी</div>
            <div class="text-[13px] text-[#606060] mt-0.5">Marathi</div>
          </div>

          <div onclick="selectLang(this)" class="lang-tile cursor-pointer bg-white border-2 border-[#EDEDED] rounded-2xl px-4 py-6 text-left relative block active:bg-[#F0FDF5] active:border-[#0E7A4E]"><svg class="absolute top-2.5 right-2.5 opacity-40" width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <div class="text-[20px] font-semibold text-[#1C1C1C]">ગુજરાતી</div>
            <div class="text-[13px] text-[#606060] mt-0.5">Gujarati</div>
          </div>

          <div onclick="selectLang(this)" class="lang-tile cursor-pointer bg-white border-2 border-[#EDEDED] rounded-2xl px-4 py-6 text-left relative block active:bg-[#F0FDF5] active:border-[#0E7A4E]"><svg class="absolute top-2.5 right-2.5 opacity-40" width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <div class="text-[20px] font-semibold text-[#1C1C1C]">ਪੰਜਾਬੀ</div>
            <div class="text-[13px] text-[#606060] mt-0.5">Punjabi</div>
          </div>

          <div onclick="selectLang(this)" class="lang-tile cursor-pointer bg-white border-2 border-[#EDEDED] rounded-2xl px-4 py-6 text-left relative block active:bg-[#F0FDF5] active:border-[#0E7A4E]"><svg class="absolute top-2.5 right-2.5 opacity-40" width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <div class="text-[20px] font-semibold text-[#1C1C1C]">తెలుగు</div>
            <div class="text-[13px] text-[#606060] mt-0.5">Telugu</div>
          </div>

          <div onclick="selectLang(this)" class="lang-tile cursor-pointer bg-white border-2 border-[#EDEDED] rounded-2xl px-4 py-6 text-left relative block active:bg-[#F0FDF5] active:border-[#0E7A4E]"><svg class="absolute top-2.5 right-2.5 opacity-40" width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <div class="text-[20px] font-semibold text-[#1C1C1C]">தமிழ்</div>
            <div class="text-[13px] text-[#606060] mt-0.5">Tamil</div>
          </div>

          <div onclick="selectLang(this)" class="lang-tile cursor-pointer bg-white border-2 border-[#EDEDED] rounded-2xl px-4 py-6 text-left relative block active:bg-[#F0FDF5] active:border-[#0E7A4E]"><svg class="absolute top-2.5 right-2.5 opacity-40" width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <div class="text-[20px] font-semibold text-[#1C1C1C]">ಕನ್ನಡ</div>
            <div class="text-[13px] text-[#606060] mt-0.5">Kannada</div>
          </div>

          <div onclick="selectLang(this)" class="lang-tile cursor-pointer bg-white border-2 border-[#EDEDED] rounded-2xl px-4 py-6 text-left relative block active:bg-[#F0FDF5] active:border-[#0E7A4E]"><svg class="absolute top-2.5 right-2.5 opacity-40" width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <div class="text-[20px] font-semibold text-[#1C1C1C]">മലയാളം</div>
            <div class="text-[13px] text-[#606060] mt-0.5">Malayalam</div>
          </div>

          <div onclick="selectLang(this)" class="lang-tile cursor-pointer bg-white border-2 border-[#EDEDED] rounded-2xl px-4 py-6 text-left relative block active:bg-[#F0FDF5] active:border-[#0E7A4E]"><svg class="absolute top-2.5 right-2.5 opacity-40" width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <div class="text-[20px] font-semibold text-[#1C1C1C]">ଓଡ଼ିଆ</div>
            <div class="text-[13px] text-[#606060] mt-0.5">Odia</div>
          </div>

          <div onclick="selectLang(this)" class="lang-tile cursor-pointer bg-white border-2 border-[#EDEDED] rounded-2xl px-4 py-6 text-left relative block active:bg-[#F0FDF5] active:border-[#0E7A4E]"><svg class="absolute top-2.5 right-2.5 opacity-40" width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <div class="text-[20px] font-semibold text-[#1C1C1C]">বাংলা</div>
            <div class="text-[13px] text-[#606060] mt-0.5">Bengali</div>
          </div>

        </div>
      </div>

    </div>
  </div>
  <script>
    document.querySelectorAll('.lang-tile').forEach(tile => {
      tile.addEventListener('click', function(e) {
        const name = this.querySelector('.text-\\[18px\\]')?.textContent?.trim();
        if (name) localStorage.setItem('kk-lang', name);
      });
    });
  </script>
  <div class="text-center text-white/60 text-xs pb-6">Language &middot; <a href="splash.html" class="underline">Splash</a> &middot; <a href="rapido-phone.html" class="underline">Login</a> &middot; <a href="../index.html" class="underline">All</a></div>

  <!-- Language confirmation modal -->
  <div id="langModalBd" class="hidden absolute inset-0 bg-black/40 z-50" style="backdrop-filter:blur(2px)"></div>
  <div id="langModal" class="hidden absolute bottom-0 left-0 right-0 z-50 bg-white rounded-t-[28px] px-5 pt-3 pb-8" style="box-shadow:0 -8px 32px rgba(0,0,0,.18)">
    <div class="mx-auto w-10 h-1 rounded-full bg-[#E8E8E8] mb-5"></div>
    <div class="flex flex-col items-center text-center mb-6">
      <div class="w-16 h-16 rounded-2xl bg-[#F0FDF5] border border-[#0E7A4E]/25 flex items-center justify-center mb-4">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
      </div>
      <div class="text-[13px] font-semibold text-[#606060] uppercase tracking-wider mb-1">App language set to</div>
      <div id="langModalName" class="text-[30px] font-extrabold text-[#1C1C1C] leading-tight mb-1"></div>
      <div id="langModalSub" class="text-[14px] text-[#9E9E9E]"></div>
    </div>
    <a id="langModalCta" href="rapido-phone.html" class="block w-full bg-[#0C831F] text-white text-center font-bold text-[16px] py-4 rounded-2xl uppercase tracking-wider mb-3">Continue</a>
    <button onclick="closeLangModal()" class="w-full text-[14px] font-medium text-[#606060] py-2">Change language</button>
  </div>

  <script>
  function selectLang(el) {
    var name = el.querySelector('.text-\[20px\]')?.textContent?.trim() || '';
    var sub  = el.querySelector('.text-\[13px\]')?.textContent?.trim() || '';
    document.getElementById('langModalName').textContent = name;
    document.getElementById('langModalSub').textContent  = sub;
    if (name) localStorage.setItem('kk-lang', name);
    document.getElementById('langModalBd').classList.remove('hidden');
    document.getElementById('langModal').classList.remove('hidden');
  }
  function closeLangModal() {
    document.getElementById('langModalBd').classList.add('hidden');
    document.getElementById('langModal').classList.add('hidden');
  }
  </script>

  <script>if("serviceWorker"in navigator){navigator.serviceWorker.register("/katyayani-partner-app-prototype/sw.js")}</script>
<script>(function(){if(window.innerWidth>=768)return;document.body.style.cssText="background:#fff;margin:0;padding:0;overflow:hidden";var d=document.querySelector(".device");if(d)d.style.cssText="width:100vw;height:100vh;margin:0;border-radius:0;border:none;box-shadow:none;background:#fff;overflow:hidden;position:relative";var s=document.querySelector(".scroll-area");if(s){s.style.height="100vh";s.style.paddingTop="env(safe-area-inset-top,24px)";}})();</script>
</body>
</html>
