<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Choose Language &middot; Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #1a1a1a; }
  .device { width: 390px; margin: 24px auto; background: #fff; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; }
  .brand-font { font-family: 'Poppins', sans-serif; font-weight: 700; letter-spacing: -0.02em; }
  .hide-scrollbar::-webkit-scrollbar { display: none; }
  .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  .lang-tile { transition: all .15s; }
  .lang-tile.selected { background: #F0FDF5; border-color: #0E7A4E; }
  .lang-tile.selected .check { display: flex; }
  .lang-tile .check { display: none; }
</style>
</head>
<body>
  <div class="device bg-white">
    <div class="h-full flex flex-col">

      <!-- HEADER -->

      </div>

            <div class="text-[11px] text-[#606060] mt-0.5">English</div>
            <div class="check absolute top-2.5 right-2.5 w-5 h-5 rounded-full bg-[#0E7A4E] items-center justify-center">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
          </button>

          <button class="lang-tile bg-white border-2 border-[#EDEDED] rounded-2xl p-3 text-left relative">
            <div class="text-[18px] font-semibold text-[#1C1C1C]">हिंदी</div>
            <div class="text-[11px] text-[#606060] mt-0.5">Hindi</div>
            <div class="check absolute top-2.5 right-2.5 w-5 h-5 rounded-full bg-[#0E7A4E] items-center justify-center">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>

            <div class="text-[11px] text-[#606060] mt-0.5">Marathi</div>

          <button class="lang-tile bg-white border-2 border-[#EDEDED] rounded-2xl p-3 text-left relative">

            <div class="text-[11px] text-[#606060] mt-0.5">Punjabi</div>

            </div>

          <button class="lang-tile bg-white border-2 border-[#EDEDED] rounded-2xl p-3 text-left relative">
            <div class="text-[18px] font-semibold text-[#1C1C1C]">தமிழ்</div>
            <div class="text-[11px] text-[#606060] mt-0.5">Tamil</div>

      <!-- CONTINUE BUTTON -->

    </div>
  </div>
  <div class="text-center text-white/60 text-xs pb-6">Language &middot; <a href="splash.html" class="underline">Splash</a> &middot; <a href="login.html" class="underline">Login</a> &middot; <a href="../index.html" class="underline">All</a></div>
</body>
</html>
