<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login &middot; Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #1a1a1a; }
  .device { width: 390px; margin: 24px auto; background: #fff; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; }
  .brand-font { font-family: 'Poppins', sans-serif; font-weight: 700; letter-spacing: -0.02em; }
  .hero-top { background: linear-gradient(180deg,#042919 0%,#083D28 35%,#0E7A4E 100%); }
</style>
</head>
<body>
  <div class="device bg-white">
    <div class="h-full flex flex-col overflow-hidden">

      <!-- TOP: deep emerald gradient -->
      <div class="hero-top text-white px-6 pt-5 pb-5 rounded-b-[28px] relative">
        <!-- Prominent Language Switcher -->
        <div class="flex items-center justify-end">
          <button class="flex items-center gap-2 bg-white text-[#083D28] rounded-full pl-2.5 pr-3 py-1.5 shadow-md">
            <div class="w-5 h-5 rounded-full bg-[#F0FDF5] border border-[#0E7A4E]/30 flex items-center justify-center">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#0E7A4E" stroke-width="2"/><path d="M3 12h18M12 3c3 3 3 15 0 18M12 3c-3 3-3 15 0 18" stroke="#0E7A4E" stroke-width="2"/></svg>
            </div>
            <div class="leading-none">
              <div class="text-[8px] font-medium text-[#606060] uppercase tracking-wider">Language</div>
              <div class="text-[11px] font-semibold text-[#1C1C1C] mt-0.5">English &middot; हिंदी</div>
            </div>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="#083D28" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>

        <!-- Wordmark: Katyayani + Partner (inline) -->
        <div class="mt-5 flex items-baseline gap-2">
          <div class="brand-font text-white text-[38px] leading-none" style="font-weight:800">Katyayani</div>
          <div class="text-[#D4A537] text-[18px] font-semibold leading-none">Partner</div>
        </div>

        <!-- Tagline -->
        <div class="mt-3 text-[12px] text-white/90 font-medium leading-snug max-w-[280px]">
          India ka sabse bada agri-input network
        </div>

        <!-- HAPPY RETAILERS STRIP (smiley avatars + caption) -->
        <div class="mt-4 flex items-center gap-3">
          <div class="flex -space-x-2">
            <div class="w-9 h-9 rounded-full bg-[#FFE08A] border-2 border-white flex items-center justify-center">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1C1C1C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 14c1 1.5 2.5 2 4 2s3-.5 4-2"/><circle cx="9" cy="10" r=".5" fill="#1C1C1C"/><circle cx="15" cy="10" r=".5" fill="#1C1C1C"/></svg>
            </div>
            <div class="w-9 h-9 rounded-full bg-[#B8E5CA] border-2 border-white flex items-center justify-center">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1C1C1C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 14c1 1.5 2.5 2 4 2s3-.5 4-2"/><circle cx="9" cy="10" r=".5" fill="#1C1C1C"/><circle cx="15" cy="10" r=".5" fill="#1C1C1C"/></svg>
            </div>
            <div class="w-9 h-9 rounded-full bg-[#FFD3B8] border-2 border-white flex items-center justify-center">

            </div>
            <div class="w-9 h-9 rounded-full bg-[#DBE9F9] border-2 border-white flex items-center justify-center">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1C1C1C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 14c1 1.5 2.5 2 4 2s3-.5 4-2"/><circle cx="9" cy="10" r=".5" fill="#1C1C1C"/><circle cx="15" cy="10" r=".5" fill="#1C1C1C"/></svg>
            </div>
            <div class="w-9 h-9 rounded-full bg-[#083D28] border-2 border-white flex items-center justify-center">
              <span class="text-[9px] font-semibold text-white">+50k</span>
            </div>
          </div>
          <div class="flex-1 leading-tight">
            <div class="text-[11px] font-semibold text-white">Dukaan owners love us</div>
            <div class="text-[9px] text-white/75 mt-0.5">1,200+ retailers joined this week</div>
          </div>
        </div>
      </div>

      <!-- White card: auth -->
      <div class="flex-1 px-6 pt-4 flex flex-col">
        <div class="text-[15px] font-semibold text-[#1C1C1C]">Login / Register</div>
        <div class="text-[10px] text-[#606060] font-medium mt-0.5">Enter your mobile number to continue</div>

        <!-- Mobile input -->
        <div class="mt-3">
          <div class="text-[9px] font-semibold text-[#606060] uppercase tracking-wider mb-1.5">Mobile number</div>
          <div class="flex items-center border border-[#EDEDED] rounded-xl overflow-hidden focus-within:border-[#0E7A4E] focus-within:ring-2 focus-within:ring-[#0E7A4E]/20">
            <div class="px-3 py-3 bg-[#F8F8F8] flex items-center gap-1.5 border-r border-[#EDEDED]">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#1C1C1C" stroke-width="1.8"/><path d="M3 12h18M12 3c3 3 3 15 0 18M12 3c-3 3-3 15 0 18" stroke="#1C1C1C" stroke-width="1.8"/></svg>
              <span class="text-[13px] font-semibold text-[#1C1C1C]">+91</span>
            </div>
            <input type="tel" maxlength="10" placeholder="98XXXXXXXX" class="flex-1 outline-none px-3 py-3 text-[14px] font-semibold text-[#1C1C1C] placeholder:text-[#9E9E9E] placeholder:font-normal" value="98765 43210"/>

            </div>

        </div>

        <!-- Get OTP -->
        <a href="otp.html" class="block mt-3 bg-[#0C831F] text-white text-center py-3 rounded-xl text-[12px] font-semibold uppercase tracking-wider">
          Get OTP
        </a>

        <!-- OR divider -->
        <div class="flex items-center gap-3 my-3">
          <div class="flex-1 h-px bg-[#EDEDED]"></div>
          <div class="text-[9px] font-medium text-[#9E9E9E] uppercase tracking-wider">or</div>
          <div class="flex-1 h-px bg-[#EDEDED]"></div>
        </div>

        <!-- Login with Google -->
        <button class="w-full flex items-center justify-center gap-2.5 bg-white border border-[#EDEDED] py-2.5 rounded-xl text-[12px] font-semibold text-[#1C1C1C] hover:border-[#0E7A4E]">
          <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>

        <!-- Referral code -->
        <button class="mt-2.5 w-full flex items-center justify-between border border-dashed border-[#D4A537] bg-[#FFF8E6] rounded-xl px-3 py-2.5">
          <div class="flex items-center gap-2">
            <div class="w-6 h-6 rounded-full bg-white border border-[#D4A537]/40 flex items-center justify-center">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#8B6914" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12v9H4v-9M2 7h20v5H2zM12 22V7M12 7H8a2 2 0 0 1 0-4c3 0 4 4 4 4zM12 7h4a2 2 0 0 0 0-4c-3 0-4 4-4 4z"/></svg>
            </div>
            <div class="leading-tight text-left">
              <div class="text-[11px] font-semibold text-[#1C1C1C]">Have a referral code?</div>
              <div class="text-[9px] text-[#8B6914] font-medium">Get ₹500 welcome bonus</div>
            </div>
          </div>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#8B6914" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>

        <!-- Terms -->
        <div class="mt-auto pb-2 text-center">
          <div class="text-[9px] text-[#9E9E9E] font-medium leading-relaxed">
            By continuing you agree to
            <a href="#" class="text-[#0E7A4E] font-semibold">Terms</a> &amp; <a href="#" class="text-[#0E7A4E] font-semibold">Privacy</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="text-center text-white/60 text-xs pb-6">Login &middot; <a href="splash.html" class="underline">Splash</a> &middot; <a href="otp.html" class="underline">OTP</a> &middot; <a href="../index.html" class="underline">All</a></div>
</body>
</html>
