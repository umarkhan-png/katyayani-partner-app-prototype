<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login &middot; Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #1a1a1a; }
  .device { width: 390px; margin: 24px auto; background: #fff; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; }
  .brand-font { font-family: 'Poppins', sans-serif; font-weight: 700; letter-spacing: -0.02em; }
  .hero-top { background: linear-gradient(180deg,#042919 0%,#083D28 35%,#0E7A4E 100%); }
</style>
</head>
<body>
  <div class="device bg-white">
    <div class="h-full flex flex-col overflow-hidden">

      <!-- TOP: deep emerald gradient -->
      <div class="hero-top text-white px-6 pt-5 pb-5 rounded-b-[28px] relative">
        <!-- Language Switcher -->
        <div class="flex items-center justify-end">
          <button class="flex items-center gap-1.5 bg-white/12 backdrop-blur border border-white/25 rounded-full pl-2.5 pr-2 py-1.5">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c3 3 3 15 0 18M12 3c-3 3-3 15 0 18"/></svg>
            <span class="text-[11px] font-semibold text-white">English</span>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>

        <!-- Logo (splash-style) -->
        <div class="mt-5 flex flex-col items-center">
          <div class="bg-white rounded-2xl px-5 py-2.5 shadow-[0_8px_24px_rgba(0,0,0,0.25)]">
            <img src="https://www.katyayaniorganics.com/wp-content/uploads/2022/06/cropped-logo-3.webp" alt="Katyayani" class="h-11"/>
          </div>
          <div class="mt-2 text-[11px] font-extrabold text-white uppercase tracking-[6px]">Partner App</div>
        </div>

        <!-- Tagline -->
        <div class="mt-3 text-center text-[12px] text-white/90 font-medium leading-snug">
          India's most trusted B2B agri product network
        </div>

        <!-- TRUST STRIP: India presence + credibility -->
        <div class="mt-4 bg-white/8 backdrop-blur border border-white/20 rounded-2xl px-3 py-2.5 flex items-center gap-3">
          <!-- India map outline with state pins -->
          <div class="relative w-14 h-14 flex-shrink-0">
            <svg width="56" height="56" viewBox="0 0 100 110" fill="none" stroke="#FFE08A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M30 8 L52 6 L68 14 L78 10 L82 22 L90 30 L86 42 L78 48 L82 58 L72 62 L66 74 L58 82 L50 96 L42 90 L34 78 L24 68 L18 56 L14 42 L18 28 L24 16 Z"/>
            </svg>
            <!-- State pins -->
            <span class="absolute w-1.5 h-1.5 rounded-full bg-[#FFE08A]" style="top: 28%; left: 35%;"></span>
            <span class="absolute w-1.5 h-1.5 rounded-full bg-[#FFE08A]" style="top: 40%; left: 52%;"></span>
            <span class="absolute w-1.5 h-1.5 rounded-full bg-[#FFE08A]" style="top: 48%; left: 30%;"></span>
            <span class="absolute w-1.5 h-1.5 rounded-full bg-[#FFE08A]" style="top: 58%; left: 58%;"></span>
            <span class="absolute w-1.5 h-1.5 rounded-full bg-[#FFE08A]" style="top: 68%; left: 42%;"></span>
            <span class="absolute w-1.5 h-1.5 rounded-full bg-[#FFE08A]" style="top: 78%; left: 48%;"></span>
          </div>

          <!-- Stats -->
          <div class="flex-1 leading-tight">
            <div class="flex items-center gap-2">
              <div>
                <div class="text-[15px] font-bold text-white leading-none">50,000+</div>
                <div class="text-[8px] text-white/70 font-medium uppercase tracking-wider mt-0.5">Retailers</div>
              </div>
              <div class="w-px h-7 bg-white/20"></div>
              <div>
                <div class="text-[15px] font-bold text-white leading-none">12</div>
                <div class="text-[8px] text-white/70 font-medium uppercase tracking-wider mt-0.5">States</div>
              </div>
              <div class="w-px h-7 bg-white/20"></div>
              <div>
                <div class="text-[15px] font-bold text-white leading-none">240+</div>
                <div class="text-[8px] text-white/70 font-medium uppercase tracking-wider mt-0.5">Districts</div>
              </div>
            </div>
            <div class="flex items-center gap-1 mt-1.5">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#FFE08A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>
              <span class="text-[9px] font-semibold text-[#FFE08A]">Verified &middot; GST, FSSAI &amp; CIB registered</span>
            </div>
          </div>
        </div>
      </div>

      <!-- White card: auth -->
      <div class="flex-1 px-6 pt-4 flex flex-col">
        <div class="text-[15px] font-semibold text-[#1C1C1C]">Login / Register</div>
        <div class="text-[10px] text-[#606060] font-medium mt-0.5">Enter your mobile number to continue</div>

        <!-- Mobile input -->
        <div class="mt-3">
          <div class="text-[9px] font-semibold text-[#606060] uppercase tracking-wider mb-1.5">Mobile number</div>
          <div class="flex items-center border border-[#EDEDED] rounded-xl overflow-hidden focus-within:border-[#0E7A4E] focus-within:ring-2 focus-within:ring-[#0E7A4E]/20">
            <div class="px-3 py-3 bg-[#F8F8F8] flex items-center border-r border-[#EDEDED]">
              <span class="text-[13px] font-semibold text-[#1C1C1C]">+91</span>
            </div>
            <input type="tel" maxlength="10" placeholder="98XXXXXXXX" class="flex-1 outline-none px-3 py-3 text-[14px] font-semibold text-[#1C1C1C] placeholder:text-[#9E9E9E] placeholder:font-normal" value="98765 43210"/>
            <div class="pr-3">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#0C831F" stroke-width="2"/><path d="M8 12l3 3 5-6" stroke="#0C831F" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
          </div>
        </div>

        <!-- Get OTP -->
        <a href="otp.html" class="block mt-3 bg-[#0C831F] text-white text-center py-3 rounded-xl text-[12px] font-semibold uppercase tracking-wider">
          Get OTP
        </a>

        <!-- OR divider -->
        <div class="flex items-center gap-3 my-3">
          <div class="flex-1 h-px bg-[#EDEDED]"></div>
          <div class="text-[9px] font-medium text-[#9E9E9E] uppercase tracking-wider">or</div>
          <div class="flex-1 h-px bg-[#EDEDED]"></div>
        </div>

        <!-- Login with Google -->
        <button class="w-full flex items-center justify-center gap-2.5 bg-white border border-[#EDEDED] py-2.5 rounded-xl text-[12px] font-semibold text-[#1C1C1C] hover:border-[#0E7A4E]">
          <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>

        <!-- Referral code (light) -->
        <button class="mt-3 text-center text-[10px] text-[#606060] font-medium">
          Have a referral code? <span class="text-[#0E7A4E] font-semibold">Apply</span>
        </button>

        <!-- Terms -->
        <div class="mt-auto pb-2 text-center">
          <div class="text-[9px] text-[#9E9E9E] font-medium leading-relaxed">
            By continuing you agree to
            <a href="#" class="text-[#0E7A4E] font-semibold">Terms</a> &amp; <a href="#" class="text-[#0E7A4E] font-semibold">Privacy</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="text-center text-white/60 text-xs pb-6">Login &middot; <a href="splash.html" class="underline">Splash</a> &middot; <a href="otp.html" class="underline">OTP</a> &middot; <a href="../index.html" class="underline">All</a></div>
</body>
</html>
