<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login &middot; Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #1a1a1a; }
  .device { width: 390px; margin: 24px auto; background: #fff; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; }
  .brand-font { font-family: 'Poppins', sans-serif; font-weight: 700; letter-spacing: -0.02em; }
  .hero-top { background: linear-gradient(180deg,#042919 0%,#083D28 35%,#0E7A4E 100%); }
  .hero-image-band { background: linear-gradient(180deg,#0E7A4E 0%,#3BA86C 20%,#B8E5CA 65%,#F5FBF7 100%); }
  .product-hero { filter: drop-shadow(0 16px 28px rgba(0,0,0,.35)); }
</style>
</head>
<body>
  <div class="device bg-white">
    <div class="h-full flex flex-col overflow-hidden">

      <!-- TOP: deep emerald hero -->
      <div class="hero-top text-white px-6 pt-5 pb-4 relative">
        <!-- Language switcher (clean, prominent) -->
        <div class="flex items-center justify-end">
          <button class="flex items-center gap-2 bg-white rounded-full pl-3 pr-2.5 py-2 shadow-lg">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c3 3 3 15 0 18M12 3c-3 3-3 15 0 18"/></svg>
            <span class="text-[12px] font-semibold text-[#1C1C1C]">English</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>

        <!-- Logo (same style as splash) -->
        <div class="mt-4 text-center">
          <img src="https://www.katyayaniorganics.com/wp-content/uploads/2022/06/cropped-logo-3.webp" alt="Katyayani" class="h-14 mx-auto brightness-0 invert"/>
          <div class="mt-2 text-[11px] font-extrabold text-white/90 uppercase tracking-[6px]">Partner App</div>
        </div>

        <!-- Tagline -->
        <div class="mt-3 text-center text-[11px] text-white/85 font-medium">
          India ka sabse bada agri product network
        </div>
      </div>

      <!-- HERO IMAGE BAND: product showcase -->
      <div class="hero-image-band relative" style="height: 170px;">
        <!-- Soft sun glow -->
        <div class="absolute top-3 right-8 w-14 h-14 rounded-full" style="background: radial-gradient(circle, rgba(255,224,138,.6), transparent 70%);"></div>

        <!-- Crop field outline at bottom -->
        <svg class="absolute inset-x-0 bottom-0 w-full opacity-20" height="40" viewBox="0 0 390 40" preserveAspectRatio="none">
          <path d="M0 30 Q 50 18 100 25 T 200 22 T 300 26 T 390 20" stroke="#0E7A4E" stroke-width="1.2" fill="none"/>
          <path d="M0 35 Q 60 28 120 32 T 250 30 T 390 28" stroke="#0E7A4E" stroke-width="1" fill="none"/>
        </svg>

        <!-- Product trio -->
        <div class="absolute inset-0 flex items-end justify-center pb-2">
          <div class="relative w-[320px] h-[160px]">
            <img src="https://katyayanikrishidirect.com/cdn/shop/files/ChakraveerNewMockup.webp" class="product-hero absolute left-2 bottom-0 h-[135px] object-contain" style="transform: rotate(-7deg);">
            <img src="https://katyayanikrishidirect.com/cdn/shop/files/IMIDA_4.webp" class="product-hero absolute left-1/2 -translate-x-1/2 bottom-2 h-[155px] object-contain z-10">
            <img src="https://katyayanikrishidirect.com/cdn/shop/files/Triple_attack_1_2.webp" class="product-hero absolute right-2 bottom-0 h-[135px] object-contain" style="transform: rotate(7deg);">
          </div>
        </div>

        <!-- Floating value chips -->
        <div class="absolute top-3 left-4 bg-white border border-[#EDEDED] rounded-full px-2.5 py-1 flex items-center gap-1.5 shadow">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#0C831F" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l4 4 14-14"/></svg>
          <span class="text-[9px] font-semibold text-[#1C1C1C]">200+ authentic SKUs</span>
        </div>
        <div class="absolute top-14 right-4 bg-white border border-[#D4A537]/40 rounded-full px-2.5 py-1 shadow">
          <span class="text-[9px] font-semibold text-[#8B6914]">Up to 35% margin</span>
        </div>
      </div>

      <!-- WHITE FORM -->
      <div class="flex-1 px-6 pt-4 flex flex-col bg-white">
        <div class="text-[15px] font-semibold text-[#1C1C1C]">Login / Register</div>
        <div class="text-[10px] text-[#606060] font-medium mt-0.5">Enter your mobile number to continue</div>

        <!-- Mobile input -->
        <div class="mt-3">
          <div class="flex items-center border border-[#EDEDED] rounded-xl overflow-hidden focus-within:border-[#0E7A4E] focus-within:ring-2 focus-within:ring-[#0E7A4E]/20">
            <div class="px-3 py-2.5 bg-[#F8F8F8] flex items-center gap-1.5 border-r border-[#EDEDED]">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#1C1C1C" stroke-width="1.8"/><path d="M3 12h18M12 3c3 3 3 15 0 18M12 3c-3 3-3 15 0 18" stroke="#1C1C1C" stroke-width="1.8"/></svg>
              <span class="text-[13px] font-semibold text-[#1C1C1C]">+91</span>
            </div>
            <input type="tel" maxlength="10" placeholder="98XXXXXXXX" class="flex-1 outline-none px-3 py-2.5 text-[14px] font-semibold text-[#1C1C1C] placeholder:text-[#9E9E9E] placeholder:font-normal" value="98765 43210"/>
            <div class="pr-3">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#0C831F" stroke-width="2"/><path d="M8 12l3 3 5-6" stroke="#0C831F" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
          </div>
        </div>

        <!-- Get OTP -->
        <a href="otp.html" class="block mt-2.5 bg-[#0C831F] text-white text-center py-2.5 rounded-xl text-[12px] font-semibold uppercase tracking-wider">
          Get OTP
        </a>

        <!-- OR divider -->
        <div class="flex items-center gap-3 my-2.5">
          <div class="flex-1 h-px bg-[#EDEDED]"></div>
          <div class="text-[9px] font-medium text-[#9E9E9E] uppercase tracking-wider">or</div>
          <div class="flex-1 h-px bg-[#EDEDED]"></div>
        </div>

        <!-- Google login -->
        <button class="w-full flex items-center justify-center gap-2.5 bg-white border border-[#EDEDED] py-2.5 rounded-xl text-[12px] font-semibold text-[#1C1C1C]">
          <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>

        <!-- Referral code — subtle text link -->
        <button class="mt-2 text-center text-[10px] text-[#606060] font-medium">
          Have a referral code? <span class="text-[#0E7A4E] font-semibold underline">Apply</span>
        </button>

        <!-- Terms -->
        <div class="mt-auto pb-2 text-center">
          <div class="text-[9px] text-[#9E9E9E] font-medium leading-relaxed">
            By continuing you agree to
            <a href="#" class="text-[#0E7A4E] font-semibold">Terms</a> &amp; <a href="#" class="text-[#0E7A4E] font-semibold">Privacy</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="text-center text-white/60 text-xs pb-6">Login &middot; <a href="splash.html" class="underline">Splash</a> &middot; <a href="otp.html" class="underline">OTP</a> &middot; <a href="../index.html" class="underline">All</a></div>
</body>
</html>
