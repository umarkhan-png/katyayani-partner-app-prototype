<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>OTP</title><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"><script src="https://cdn.tailwindcss.com"></script><style>*{font-family:'Manrope',sans-serif}body{background:#1a1a1a}.device{width:390px;margin:24px auto;background:#fff;border-radius:36px;box-shadow:0 30px 80px rgba(0,0,0,.4);overflow:hidden;position:relative;border:8px solid #111;height:780px}.otp-box{width:48px;height:56px;border:1.5px solid #D4D5D9;border-radius:12px;text-align:center;font-size:22px;font-weight:800;color:#1C1C1C}.otp-box.filled{border-color:#0E7A4E;background:#F0FDF5}</style></head><body><div class="device flex flex-col bg-white">

<!-- Modern header -->
<div class="px-4 py-4 flex items-center gap-4">
<a href="login.html" class="text-[24px] text-[#1C1C1C] font-light leading-none">‹</a>
</div>

<div class="px-6 pt-2 flex-1">
<div class="text-[26px] font-extrabold text-[#1C1C1C] leading-tight">Enter verification<br>code</div>
<div class="text-[13px] text-[#606060] mt-2">We sent it to <span class="font-extrabold text-[#1C1C1C]">+91 98XXXXX234</span> <button class="text-[#0E7A4E] font-extrabold">Edit</button></div>

<div class="flex justify-between gap-2 mt-7">
<input class="otp-box filled" value="9"/><input class="otp-box filled" value="8"/><input class="otp-box filled" value="7"/><input class="otp-box filled" value="6"/><input class="otp-box"/><input class="otp-box"/>
</div>

<div class="text-center text-[12px] text-[#606060] mt-5">OTP sent via SMS &middot; Resend in <span class="font-bold text-[#1C1C1C]">00:32</span></div>

<a href="role-selection.html" class="block mt-7 bg-[#0C831F] text-white text-center py-4 rounded-xl text-[14px] font-bold uppercase tracking-wide">Verify & Continue</a>

<!-- Resend channels — 2x2 grid of horizontal pill cards -->
<div class="mt-6">
<div class="text-[11px] font-medium text-[#606060] uppercase text-center mb-3">Didn't receive? Resend via</div>
<div class="grid grid-cols-2 gap-2.5 opacity-50">

<button class="bg-white border border-[#EDEDED] rounded-xl px-3 py-2.5 flex items-center gap-2.5">
<div class="w-9 h-9 rounded-lg bg-[#F0F4FB] flex items-center justify-center flex-shrink-0">
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3D6FD1" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><path d="M8 10h8M8 13h5"/></svg>
</div>
<div class="text-[12px] font-semibold text-[#1C1C1C] text-left">SMS</div>
</button>

<button class="bg-white border border-[#EDEDED] rounded-xl px-3 py-2.5 flex items-center gap-2.5">
<div class="w-9 h-9 rounded-lg bg-[#F0FBF4] flex items-center justify-center flex-shrink-0">
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#16A34A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
</div>
<div class="text-[12px] font-semibold text-[#1C1C1C] text-left">WhatsApp</div>
</button>

<button class="bg-white border border-[#EDEDED] rounded-xl px-3 py-2.5 flex items-center gap-2.5">
<div class="w-9 h-9 rounded-lg bg-[#FBF3EE] flex items-center justify-center flex-shrink-0">
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#EA580C" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
</div>
<div class="text-[12px] font-semibold text-[#1C1C1C] text-left">Voice call</div>
</button>

<button class="bg-white border border-[#EDEDED] rounded-xl px-3 py-2.5 flex items-center gap-2.5">
<div class="w-9 h-9 rounded-lg bg-[#FBF8EE] flex items-center justify-center flex-shrink-0">
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8B6914" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
</div>
<div class="text-[12px] font-semibold text-[#1C1C1C] text-left">Email</div>
</button>

</div>
</div>

</div></div>
<div class="text-center text-white/60 text-xs pb-6">OTP • <a href="login.html" class="underline">Login</a> • <a href="role-selection.html" class="underline">Role</a> • <a href="../index.html" class="underline">All</a></div></body></html>
