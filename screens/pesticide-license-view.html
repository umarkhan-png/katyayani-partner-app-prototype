<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="manifest" href="/katyayani-partner-app-prototype/manifest.json">
  <meta name="theme-color" content="#0E7A4E">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KT Partner">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Pesticide License</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif !important; -webkit-font-smoothing: antialiased; }
  html, body { background: #fff; margin: 0; padding: 0; overflow: hidden; }
  .device { width: 100%; background: #fff; overflow: hidden; position: relative; height: 100vh; }
  .scroll-area { height: 100vh; overflow-y: auto; padding-bottom: calc(24px + env(safe-area-inset-bottom, 20px)); }
  .scroll-area::-webkit-scrollbar { display: none; }
  .brand-font { font-family:'Poppins',sans-serif; font-weight:700; letter-spacing:-.02em; }
  @media screen and (max-width: 499px) {
    .device { width: 100vw !important; height: 100vh !important; margin: 0 !important; border-radius: 0 !important; border: none !important; }
    .scroll-area { height: 100vh !important; }
  }
  @media screen and (min-width: 500px) {
    html, body { background: #1a1a1a; overflow: auto; }
    .device { width: 390px; height: 780px; margin: 24px auto; border-radius: 36px; border: 8px solid #111; box-shadow: 0 30px 80px rgba(0,0,0,.4); }
    .scroll-area { height: 780px; }
  }
  @media screen and (max-width: 499px) {
    .scroll-area { padding-top: env(safe-area-inset-top, 24px) !important; }
    .device { box-sizing: border-box; }
  }
</style>
</head>
<body>
<div class="device bg-white">
<div class="scroll-area">

  <!-- HEADER -->
  <div class="px-4 pt-7 pb-3 flex items-center gap-3 bg-white border-b border-[#EDEDED] sticky top-0 z-10">
    <a href="profile.html" class="w-9 h-9 rounded-full border border-[#EDEDED] flex items-center justify-center">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <div class="flex-1 brand-font text-[20px] text-[#1C1C1C]">Pesticide License</div>
    <span class="inline-flex items-center gap-1 bg-[#F0FDF5] border border-[#0E7A4E]/30 text-[#0C831F] text-[10px] font-bold px-2 py-1 rounded-full uppercase tracking-wider">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="#0C831F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Verified
    </span>
  </div>

  <!-- UPLOADED LICENSE PHOTO -->
  <div class="px-4 pt-4">
    <div class="text-[10px] font-semibold text-[#606060] uppercase tracking-wider mb-2">Uploaded Licence Photo</div>
    <div class="rounded-[12px] border border-[#EDEDED] bg-[#F8F8F8] overflow-hidden">
      <img src="../assets/license-pesticide-form3.png" class="w-full object-contain" style="max-height:340px" onerror="this.style.display='none';this.insertAdjacentHTML('afterend','<div class=\'h-48 flex items-center justify-center text-[#9E9E9E] text-[13px]\'>Licence photo</div>')">
    </div>
  </div>

  <!-- DETAILS (view only) -->
  <div class="px-4 pt-5">
    <div class="bg-white border border-[#EDEDED] rounded-[12px] overflow-hidden">
      <div class="flex items-center justify-between px-4 py-3.5 border-b border-[#EDEDED]">
        <span class="text-[13px] text-[#606060]">Shop Name</span>
        <span class="text-[14px] font-semibold text-[#1C1C1C]">Katyayani Organics</span>
      </div>
      <div class="flex items-center justify-between px-4 py-3.5 border-b border-[#EDEDED]">
        <span class="text-[13px] text-[#606060]">Issue Date</span>
        <span class="text-[14px] font-semibold text-[#1C1C1C]">13 Jun 2023</span>
      </div>
      <div class="flex items-center justify-between px-4 py-3.5">
        <span class="text-[13px] text-[#606060]">Expiry Date</span>
        <span class="text-[14px] font-semibold text-[#D4A537]">12 Jun 2026</span>
      </div>
    </div>
  </div>

  <div class="h-4"></div>
</div>
</div>

<div class="text-center text-white/60 text-xs pb-6">Pesticide License · <a href="profile.html" class="underline">Account</a> · <a href="../index.html" class="underline">All</a></div>
  <script>if("serviceWorker"in navigator){navigator.serviceWorker.register("/katyayani-partner-app-prototype/sw.js")}</script>
<script>(function(){if(window.innerWidth>=768)return;document.body.style.cssText="background:#fff;margin:0;padding:0;overflow:hidden";var d=document.querySelector(".device");if(d)d.style.cssText="width:100vw;height:100vh;margin:0;border-radius:0;border:none;box-shadow:none;background:#fff;overflow:hidden;position:relative";var s=document.querySelector(".scroll-area");if(s){s.style.height="100vh";s.style.paddingTop="env(safe-area-inset-top,24px)";}})();</script>
</body>
</html>
