<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Profile Setup &middot; Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #1a1a1a; }
  .device { width: 390px; margin: 24px auto; background: #fff; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; }
  .scroll-area { height: 100%; overflow-y: auto; padding-bottom: 90px; }
  .scroll-area::-webkit-scrollbar { display: none; }
  .brand-font { font-family: 'Poppins', sans-serif; font-weight: 700; letter-spacing: -0.02em; }
  .form-input { width: 100%; padding: 12px 14px; border: 1.5px solid #EDEDED; border-radius: 12px; font-size: 14px; font-weight: 500; color: #1C1C1C; outline: none; background: #fff; }
  .form-input::placeholder { color: #9E9E9E; font-weight: 400; }
  .form-input:focus { border-color: #0E7A4E; box-shadow: 0 0 0 3px rgba(14,122,78,0.12); }
  .role-card { transition: all .15s; cursor: pointer; }
  .role-card.selected { border-color: #0E7A4E; background: linear-gradient(135deg, #F0FDF5 0%, #DCFCE7 100%); transform: translateY(-1px); box-shadow: 0 6px 18px -6px rgba(14,122,78,.35); }
  .role-card.selected .check { display: flex; }
  .role-card .check { display: none; }
</style>
</head>
<body>
<div class="device bg-white">
<div class="scroll-area">

  <!-- HEADER (matches OTP style — back button only) -->
  <div class="px-4 pt-7 pb-3 flex items-center gap-3">
    <a href="otp.html" class="w-9 h-9 rounded-full border border-[#EDEDED] flex items-center justify-center">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
  </div>

  <!-- BODY -->
  <div class="px-6 pt-2">
    <div class="text-[26px] font-extrabold text-[#1C1C1C] leading-tight">Tell us about<br>yourself</div>
    <div class="text-[13px] text-[#606060] mt-2">Your name &amp; how you'll use Katyayani</div>

    <!-- NAME ROW -->
    <div class="mt-5 grid grid-cols-2 gap-3">
      <div>
        <label class="text-[10px] font-semibold text-[#606060] uppercase tracking-wider">First name</label>
        <input type="text" class="form-input mt-1.5" placeholder="First name" value="Umar"/>
      </div>
      <div>
        <label class="text-[10px] font-semibold text-[#606060] uppercase tracking-wider">Last name</label>
        <input type="text" class="form-input mt-1.5" placeholder="Surname" value="Khan"/>
      </div>
    </div>

    <!-- ROLE -->
    <div class="mt-5">
      <label class="text-[10px] font-semibold text-[#606060] uppercase tracking-wider">I am a</label>

      <div class="mt-2 grid grid-cols-3 gap-2">

        <!-- Retailer -->
        <button class="role-card selected border-2 border-[#EDEDED] rounded-2xl p-3 text-center relative" data-next="shop-details.html">
          <div class="w-12 h-12 mx-auto rounded-2xl bg-white border border-[#EDEDED] flex items-center justify-center">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-6 9 6v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
          </div>
          <div class="text-[12px] font-semibold text-[#1C1C1C] mt-2 leading-tight">Retailer</div>
          <div class="text-[8px] text-[#606060] font-medium mt-0.5 leading-tight">Run a dukaan</div>
          <div class="check absolute top-1.5 right-1.5 w-4 h-4 rounded-full bg-[#0E7A4E] items-center justify-center">
            <svg width="9" height="9" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </button>

        <!-- Distributor -->
        <button class="role-card border-2 border-[#EDEDED] rounded-2xl p-3 text-center relative" data-next="shop-details.html">
          <div class="w-12 h-12 mx-auto rounded-2xl bg-white border border-[#EDEDED] flex items-center justify-center">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="1"/><path d="M5 11V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v6M9 21v-4h6v4M9 7h6"/></svg>
          </div>
          <div class="text-[12px] font-semibold text-[#1C1C1C] mt-2 leading-tight">Distributor</div>
          <div class="text-[8px] text-[#606060] font-medium mt-0.5 leading-tight">Supply to retailers</div>
          <div class="check absolute top-1.5 right-1.5 w-4 h-4 rounded-full bg-[#0E7A4E] items-center justify-center">
            <svg width="9" height="9" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </button>

        <!-- Farmer -->
        <button class="role-card border-2 border-[#EDEDED] rounded-2xl p-3 text-center relative" data-next="farmer-redirect.html">
          <div class="w-12 h-12 mx-auto rounded-2xl bg-white border border-[#EDEDED] flex items-center justify-center">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M8 6c0 2 2 4 4 4M16 6c0 2-2 4-4 4M6 10c0 2 3 4 6 4M18 10c0 2-3 4-6 4"/></svg>
          </div>
          <div class="text-[12px] font-semibold text-[#1C1C1C] mt-2 leading-tight">Farmer</div>
          <div class="text-[8px] text-[#606060] font-medium mt-0.5 leading-tight">Grow crops</div>
          <div class="check absolute top-1.5 right-1.5 w-4 h-4 rounded-full bg-[#0E7A4E] items-center justify-center">
            <svg width="9" height="9" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </button>

      </div>
    </div>

    <div class="h-4"></div>
  </div>

  <!-- STICKY CTA -->
  <div class="absolute bottom-0 left-0 right-0 bg-white border-t border-[#EDEDED] px-5 py-3">
    <a id="cta" href="shop-details.html" class="block bg-[#0C831F] text-white text-center py-3 rounded-xl text-[13px] font-semibold uppercase tracking-wider">
      Save &amp; Continue
    </a>
  </div>

</div>
</div>

<script>
  document.querySelectorAll('.role-card').forEach(card => {
    card.addEventListener('click', function() {
      document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
      this.classList.add('selected');
      const next = this.getAttribute('data-next');
      document.getElementById('cta').setAttribute('href', next);
    });
  });
</script>

<div class="text-center text-white/60 text-xs pb-6">Profile Setup &middot; <a href="otp.html" class="underline">OTP</a> &middot; <a href="shop-details.html" class="underline">Shop</a> &middot; <a href="../index.html" class="underline">All</a></div>
</body>
</html>
