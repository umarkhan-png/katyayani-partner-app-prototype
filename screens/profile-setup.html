<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Profile Setup &middot; Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #1a1a1a; }
  .device { width: 390px; margin: 24px auto; background: #fff; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; }
  .scroll-area { height: 100%; overflow-y: auto; padding-bottom: 90px; }
  .scroll-area::-webkit-scrollbar { display: none; }
  .brand-font { font-family: 'Poppins', sans-serif; font-weight: 700; letter-spacing: -0.02em; }
  .form-input { width: 100%; padding: 12px 14px; border: 1.5px solid #EDEDED; border-radius: 12px; font-size: 14px; font-weight: 500; color: #1C1C1C; outline: none; background: #fff; }
  .form-input::placeholder { color: #9E9E9E; font-weight: 400; }
  .form-input:focus { border-color: #0E7A4E; box-shadow: 0 0 0 3px rgba(14,122,78,0.12); }
</style>
</head>
<body>
<div class="device bg-white">
<div class="scroll-area">

  <!-- HEADER -->
  <div class="px-4 pt-7 pb-3 flex items-center gap-3 bg-white border-b border-[#EDEDED]">
    <a href="otp.html" class="w-9 h-9 rounded-full border border-[#EDEDED] flex items-center justify-center">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <div class="flex-1">
      <div class="brand-font text-[18px] text-[#1C1C1C]">Profile Setup</div>
      <div class="text-[10px] text-[#606060]">Step 1 of 4</div>
    </div>
  </div>

  <!-- PROGRESS BAR -->
  <div class="h-1 bg-[#EDEDED]">
    <div class="h-full bg-[#0E7A4E]" style="width: 25%"></div>
  </div>

  <!-- BODY -->
  <div class="px-5 pt-5">
    <div class="text-[20px] font-semibold text-[#1C1C1C] leading-tight">Tell us about you</div>
    <div class="text-[11px] text-[#606060] font-medium mt-1">Your name &amp; how you'll use Katyayani</div>

    <!-- FIRST NAME -->
    <div class="mt-5">
      <label class="text-[10px] font-semibold text-[#606060] uppercase tracking-wider">First name</label>
      <input type="text" class="form-input mt-1.5" placeholder="As per Aadhaar" value="Umar"/>
    </div>

    <!-- LAST NAME -->
    <div class="mt-3.5">
      <label class="text-[10px] font-semibold text-[#606060] uppercase tracking-wider">Last name</label>
      <input type="text" class="form-input mt-1.5" placeholder="Surname" value="Khan"/>
    </div>

    <!-- ROLE -->
    <div class="mt-5">
      <label class="text-[10px] font-semibold text-[#606060] uppercase tracking-wider">I am a</label>

      <div class="mt-1.5 space-y-2">
        <button class="w-full border-2 border-[#0E7A4E] bg-[#F0FDF5] rounded-2xl p-3 flex items-center gap-3 text-left">
          <div class="w-11 h-11 rounded-xl bg-white border border-[#EDEDED] flex items-center justify-center flex-shrink-0">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-6 9 6v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
          </div>
          <div class="flex-1 leading-tight">
            <div class="text-[14px] font-semibold text-[#1C1C1C]">Retailer</div>
            <div class="text-[10px] text-[#606060] mt-0.5">I run a shop / dukaan</div>
          </div>
          <div class="w-5 h-5 rounded-full bg-[#0E7A4E] flex items-center justify-center flex-shrink-0">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </button>

        <button class="w-full border border-[#EDEDED] bg-white rounded-2xl p-3 flex items-center gap-3 text-left">
          <div class="w-11 h-11 rounded-xl bg-[#F8F8F8] flex items-center justify-center flex-shrink-0">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1C1C1C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="1"/><path d="M5 11V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v6M9 21v-4h6v4M9 7h6"/></svg>
          </div>
          <div class="flex-1 leading-tight">
            <div class="text-[14px] font-semibold text-[#1C1C1C]">Distributor</div>
            <div class="text-[10px] text-[#606060] mt-0.5">I supply to retailers in my area</div>
          </div>
        </button>

        <button class="w-full border border-[#EDEDED] bg-white rounded-2xl p-3 flex items-center gap-3 text-left">
          <div class="w-11 h-11 rounded-xl bg-[#F8F8F8] flex items-center justify-center flex-shrink-0">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1C1C1C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M8 6c0 2 2 4 4 4M16 6c0 2-2 4-4 4M6 10c0 2 3 4 6 4M18 10c0 2-3 4-6 4"/></svg>
          </div>
          <div class="flex-1 leading-tight">
            <div class="text-[14px] font-semibold text-[#1C1C1C]">Farmer</div>
            <div class="text-[10px] text-[#606060] mt-0.5">I grow crops &amp; need products</div>
          </div>
        </button>
      </div>
    </div>

    <div class="h-4"></div>
  </div>

  <!-- STICKY CTA -->
  <div class="absolute bottom-0 left-0 right-0 bg-white border-t border-[#EDEDED] px-5 py-3">
    <a href="shop-details.html" class="block bg-[#0C831F] text-white text-center py-3 rounded-xl text-[13px] font-semibold uppercase tracking-wider">
      Save &amp; Continue
    </a>
  </div>

</div>
</div>
<div class="text-center text-white/60 text-xs pb-6">Profile Setup &middot; <a href="otp.html" class="underline">OTP</a> &middot; <a href="shop-details.html" class="underline">Shop</a> &middot; <a href="../index.html" class="underline">All</a></div>
</body>
</html>
