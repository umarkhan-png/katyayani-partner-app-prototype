<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aadhaar · Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #1a1a1a; }
  .device { width: 390px; margin: 24px auto; background: #fff; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; }
  .scroll-area { height: 100%; overflow-y: auto; padding-bottom: 90px; }
  .scroll-area::-webkit-scrollbar { display: none; }
  .input { width: 100%; border: 2px solid #EDEDED; border-radius: 12px; padding: 14px 16px; font-size: 16px; font-weight: 600; color: #1C1C1C; outline: none; background: #fff; font-family: 'Poppins', sans-serif; }
  .input:focus { border-color: #0E7A4E; }
  .input::placeholder { color: #BDBDBD; font-weight: 400; }
  .id-tab { transition: all .15s; cursor: pointer; }
  .id-tab.active { border-color: #0E7A4E; background: #F0FDF5; }
  .id-tab.active .radio-outer { border-color: #0E7A4E; }
  .id-tab.active .radio-inner { display: block; }
  .radio-outer { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #D4D4D4; display: flex; align-items: center; justify-content: center; }
  .radio-inner { width: 10px; height: 10px; border-radius: 50%; background: #0E7A4E; display: none; }
  .upload-box { border: 2px dashed #D4D4D4; border-radius: 16px; padding: 20px; text-align: center; cursor: pointer; transition: all .15s; }
  .upload-box:hover { border-color: #0E7A4E; background: #F0FDF5; }
</style>
</head>
<body>
<div class="device bg-white">
<div class="scroll-area">

  <!-- HEADER — Rapido pattern -->
  <div class="px-4 pt-7 pb-3 flex items-center justify-between">
    <a href="rapido-license-number.html" class="p-1">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M5 12l6-6M5 12l6 6" stroke="#1C1C1C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <div class="text-[16px] font-bold text-[#1C1C1C]">Aadhaar</div>
    <button class="flex items-center gap-1 border border-[#EDEDED] rounded-full px-3 py-1.5">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1C1C1C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
      <span class="text-[11px] font-semibold">Help</span>
    </button>
  </div>
  <div class="h-px bg-[#F0F0F0]"></div>

  <div class="px-5 pt-5">

    <!-- ID TYPE SELECTION — Rapido pattern: radio tabs -->
    <div class="text-[13px] font-medium text-[#606060] mb-2">Select ID to upload</div>
    <div class="grid grid-cols-2 gap-2.5 mb-5">
      <button class="id-tab active border-2 border-[#0E7A4E] bg-[#F0FDF5] rounded-xl p-3 flex items-center justify-between" onclick="selectTab(this,'aadhaar')">
        <span class="text-[14px] font-semibold text-[#1C1C1C]">Aadhaar</span>
        <div class="radio-outer" style="border-color:#0E7A4E"><div class="radio-inner" style="display:block"></div></div>
      </button>
      <button class="id-tab border-2 border-[#EDEDED] rounded-xl p-3 flex items-center justify-between" onclick="selectTab(this,'pan')">
        <span class="text-[14px] font-semibold text-[#1C1C1C]">PAN Card</span>
        <div class="radio-outer"><div class="radio-inner"></div></div>
      </button>
    </div>

    <!-- UPLOAD AREA — Rapido dashed box -->
    <div class="upload-box mb-4">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#9E9E9E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mx-auto"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      <div class="text-[12px] text-[#606060] mt-2">Front side of your Aadhaar</div>
    </div>

    <!-- AADHAAR NUMBER INPUT — Rapido pattern -->
    <div class="text-[13px] font-medium text-[#606060] mb-1.5">Enter Aadhaar number</div>
    <div class="relative mb-1">
      <input class="input tracking-[2px]" placeholder="0000 0000 0000" maxlength="14"/>
      <button class="absolute right-3 top-1/2 -translate-y-1/2 w-6 h-6 rounded-full border border-[#BDBDBD] flex items-center justify-center">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#9E9E9E" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h0"/></svg>
      </button>
    </div>
    <div class="text-[11px] text-[#9E9E9E] mb-4">1234 5677 8990</div>

    <!-- REFERENCE IMAGE — Rapido pattern: shows where to find the number -->
    <div class="bg-[#EBF5FF] rounded-2xl p-4 relative overflow-hidden">
      <div class="flex items-start gap-3">
        <div class="flex-1">
          <div class="bg-white rounded-lg p-2 border border-[#D4E5F7] inline-block">
            <div class="flex items-center gap-2 mb-1">
              <div class="w-5 h-5 bg-[#F0F0F0] rounded"></div>
              <div class="text-[8px] font-bold text-[#606060] uppercase">Government of India</div>
              <div class="w-5 h-5 bg-[#F0F0F0] rounded"></div>
            </div>
            <div class="flex items-center gap-2">
              <div class="w-8 h-10 bg-[#E0E0E0] rounded"></div>
              <div class="flex-1">
                <div class="h-1.5 w-16 bg-[#E0E0E0] rounded mb-1"></div>
                <div class="h-1.5 w-12 bg-[#E0E0E0] rounded mb-1"></div>
                <div class="h-1.5 w-14 bg-[#E0E0E0] rounded"></div>
              </div>
              <div class="w-6 h-6 bg-[#E0E0E0] rounded"></div>
            </div>
            <div class="mt-2 text-center">
              <div class="text-[10px] font-bold text-[#0E7A4E] tracking-[2px]">4444 3333 6666</div>
            </div>
          </div>
        </div>
      </div>
      <!-- Arrow pointing to number -->
      <div class="mt-2 flex items-center gap-1">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17l-5-5 5-5"/><path d="M2 12h20"/></svg>
        <span class="text-[11px] font-bold text-[#0E7A4E] tracking-[2px]">4444 3333 6666</span>
      </div>
    </div>

  </div>
</div>

<!-- STICKY CTA -->
<div class="absolute bottom-0 left-0 right-0 bg-white px-5 py-3 border-t border-[#EDEDED]">
  <a href="rapido-shop-photo.html" class="block bg-[#0C831F] text-white text-center py-3.5 rounded-full text-[14px] font-bold">
    Submit
  </a>
</div>
</div>

<script>
function selectTab(el, type) {
  document.querySelectorAll('.id-tab').forEach(t => { t.classList.remove('active'); t.style.borderColor='#EDEDED'; t.style.background='#fff'; t.querySelector('.radio-outer').style.borderColor='#D4D4D4'; t.querySelector('.radio-inner').style.display='none'; });
  el.classList.add('active'); el.style.borderColor='#0E7A4E'; el.style.background='#F0FDF5'; el.querySelector('.radio-outer').style.borderColor='#0E7A4E'; el.querySelector('.radio-inner').style.display='block';
}
</script>
<div class="text-center text-white/60 text-xs pb-6">Rapido Flow · <a href="rapido-license-number.html" class="underline">Prev</a> · <a href="rapido-shop-photo.html" class="underline">Next</a> · <a href="../index.html" class="underline">All</a></div>
</body>
</html>
