<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Take Photo · Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #000; }
  .device { width: 390px; margin: 24px auto; background: #000; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; }
  /* Rapido exact: document-sized white border frame with rounded corners */
  .doc-frame { position: relative; width: 300px; height: 190px; }
  .doc-frame::before { content: ''; position: absolute; inset: 0; border: 3px solid rgba(255,255,255,0.7); border-radius: 12px; animation: framePulse 2s ease-in-out infinite; }
  @keyframes framePulse { 0%,100% { border-color: rgba(255,255,255,0.7); } 50% { border-color: rgba(14,122,78,0.9); } }
  /* Corner highlights — exactly like Rapido camera */
  .corner { position: absolute; width: 28px; height: 28px; }
  .corner::before, .corner::after { content: ''; position: absolute; background: #fff; }
  .tl { top: -2px; left: -2px; }
  .tl::before { top: 0; left: 0; width: 28px; height: 4px; border-radius: 4px 0 0 0; }
  .tl::after { top: 0; left: 0; width: 4px; height: 28px; border-radius: 4px 0 0 0; }
  .tr { top: -2px; right: -2px; }
  .tr::before { top: 0; right: 0; width: 28px; height: 4px; border-radius: 0 4px 0 0; }
  .tr::after { top: 0; right: 0; width: 4px; height: 28px; border-radius: 0 4px 0 0; }
  .bl { bottom: -2px; left: -2px; }
  .bl::before { bottom: 0; left: 0; width: 28px; height: 4px; border-radius: 0 0 0 4px; }
  .bl::after { bottom: 0; left: 0; width: 4px; height: 28px; border-radius: 0 0 0 4px; }
  .br { bottom: -2px; right: -2px; }
  .br::before { bottom: 0; right: 0; width: 28px; height: 4px; border-radius: 0 0 4px 0; }
  .br::after { bottom: 0; right: 0; width: 4px; height: 28px; border-radius: 0 0 4px 0; }
  /* Scan line */
  .scan-line { position: absolute; left: 10px; right: 10px; height: 2px; background: linear-gradient(90deg, transparent, #0E7A4E, transparent); border-radius: 2px; animation: scanMove 2.5s ease-in-out infinite; }
  @keyframes scanMove { 0% { top: 20px; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: calc(100% - 20px); opacity: 0; } }
</style>
</head>
<body>
<div class="device">

  <!-- HEADER — Rapido camera style: back arrow + title on dark bg -->
  <div class="px-4 pt-7 pb-3 flex items-center gap-3 relative z-20">
    <a href="rapido-license-upload.html" class="w-9 h-9 rounded-full border border-white/20 flex items-center justify-center">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <div class="text-[15px] font-bold text-white">Pesticide License</div>
  </div>

  <!-- CAMERA VIEWFINDER — simulated dark background -->
  <div id="cViewfinder" class="relative flex-1 flex items-center justify-center" style="height: 440px; background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);">

    <!-- Vignette overlay -->
    <div class="absolute inset-0" style="background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);"></div>

    <!-- Document-sized frame — EXACT Rapido pattern -->
    <div id="cDocFrame" class="doc-frame relative z-10">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <!-- Scanning green line -->
      <div class="scan-line"></div>
      <!-- Center crosshair -->
      <div class="absolute inset-0 flex items-center justify-center">
        <div class="w-6 h-6">
          <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-4 h-px bg-white/30"></div>
          <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-px h-4 bg-white/30"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- BOTTOM BAR — Rapido exact: instructions + shutter -->
  <div id="cBottomBar" class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black via-black/95 to-transparent px-5 pt-8 pb-6">
    <!-- Instructions — Rapido exact text pattern -->
    <div class="text-center mb-5">
      <div id="cTitle" class="text-white text-[14px] font-semibold">Pesticide License</div>
      <div id="cSubtitle" class="text-white/50 text-[11px] mt-0.5">Please ensure all details are clearly visible</div>
    </div>

    <!-- Capture row — Rapido exact: gallery icon + shutter + empty -->
    <div class="flex items-center justify-between px-4">
      <!-- Open from phone -->
      <button id="cGalleryBtn" class="w-11 h-11 rounded-xl bg-white/15 backdrop-blur flex items-center justify-center border border-white/10">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      </button>

      <!-- Shutter button — Rapido exact: white ring + white circle -->
      <a id="cShutterOuter" href="rapido-aadhaar-upload.html" class="w-[68px] h-[68px] rounded-full border-[4px] border-white flex items-center justify-center">
        <div id="cShutterInner" class="w-[54px] h-[54px] rounded-full bg-white"></div>
      </a>

      <!-- Empty for symmetry -->
      <div class="w-11 h-11"></div>
    </div>
  </div>

</div>
<div class="text-center text-white/60 text-xs pb-6"><a href="rapido-license-upload.html" class="underline">Back</a> · <a href="rapido-aadhaar-upload.html" class="underline">Next</a> · <a href="../index.html" class="underline">All</a></div>

<!-- ==================== DESIGN CUSTOMIZER ==================== -->
<button id="custToggle" onclick="document.getElementById('custPanel').classList.toggle('hidden')" style="position:fixed;bottom:24px;right:24px;z-index:9999;width:48px;height:48px;border-radius:50%;background:#0E7A4E;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;">
  <svg width="22" height="22" fill="none" viewBox="0 0 24 24"><path d="M12 15.5A3.5 3.5 0 1 0 12 8.5a3.5 3.5 0 0 0 0 7z" stroke="#fff" stroke-width="1.8"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke="#fff" stroke-width="1.8"/></svg>
</button>

<div id="custPanel" class="hidden" style="position:fixed;bottom:80px;right:24px;z-index:9998;width:320px;max-height:70vh;overflow-y:auto;background:#111;border-radius:16px;padding:16px;box-shadow:0 8px 32px rgba(0,0,0,.6);border:1px solid #333;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <span style="color:#fff;font-size:14px;font-weight:700;">Design Customizer</span>
    <button onclick="copyCustValues()" style="background:#0E7A4E;color:#fff;border:none;border-radius:8px;padding:4px 12px;font-size:11px;cursor:pointer;font-weight:600;">Copy Final Values</button>
  </div>
  <div id="custControls"></div>
</div>

<style>
  #custPanel::-webkit-scrollbar { width: 6px; }
  #custPanel::-webkit-scrollbar-track { background: transparent; }
  #custPanel::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  .cust-section { color: #8BC9A5; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin: 12px 0 6px; }
  .cust-section:first-child { margin-top: 0; }
  .cust-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .cust-row label { color: #aaa; font-size: 11px; flex-shrink: 0; }
  .cust-row input[type=range] { width: 120px; accent-color: #0E7A4E; margin: 0 8px; }
  .cust-row .cust-val { color: #fff; font-size: 11px; min-width: 36px; text-align: right; font-variant-numeric: tabular-nums; }
</style>

<script>
(function(){
  const STORAGE_KEY = 'cameraCustom';

  const controls = [
    { section: 'Viewfinder Area' },
    { id: 'viewfinderHeight', label: 'Height', min: 300, max: 600, def: 440, unit: 'px', apply: v => { document.getElementById('cViewfinder').style.height = v + 'px'; } },

    { section: 'Document Frame' },
    { id: 'docFrameW', label: 'Width', min: 200, max: 370, def: 300, unit: 'px', apply: v => { document.getElementById('cDocFrame').style.width = v + 'px'; } },
    { id: 'docFrameH', label: 'Height', min: 120, max: 350, def: 190, unit: 'px', apply: v => { document.getElementById('cDocFrame').style.height = v + 'px'; } },

    { section: 'Corner Brackets' },
    { id: 'cornerSize', label: 'Size', min: 16, max: 52, def: 28, unit: 'px', apply: v => {
      document.querySelectorAll('.corner').forEach(c => { c.style.width = v + 'px'; c.style.height = v + 'px'; });
      document.querySelectorAll('.corner::before, .corner::after').forEach(() => {});
      // Update the CSS rule for corner pseudo-element widths
      let sheet = document.getElementById('custCornerStyle');
      if (!sheet) { sheet = document.createElement('style'); sheet.id = 'custCornerStyle'; document.head.appendChild(sheet); }
      sheet.textContent = `.corner::before { width: ${v}px !important; } .corner::after { height: ${v}px !important; }`;
    }},

    { section: 'Title Text' },
    { id: 'titleSize', label: 'Font size', min: 10, max: 24, def: 14, unit: 'px', apply: v => { document.getElementById('cTitle').style.fontSize = v + 'px'; } },

    { section: 'Subtitle' },
    { id: 'subtitleSize', label: 'Font size', min: 8, max: 20, def: 11, unit: 'px', apply: v => { document.getElementById('cSubtitle').style.fontSize = v + 'px'; } },
    { id: 'subtitleOpacity', label: 'Opacity', min: 10, max: 100, def: 50, unit: '%', apply: v => { document.getElementById('cSubtitle').style.opacity = v / 100; } },

    { section: 'Shutter Button' },
    { id: 'shutterOuter', label: 'Outer size', min: 48, max: 96, def: 68, unit: 'px', apply: v => { const el = document.getElementById('cShutterOuter'); el.style.width = v + 'px'; el.style.height = v + 'px'; } },
    { id: 'shutterInner', label: 'Inner size', min: 36, max: 80, def: 54, unit: 'px', apply: v => { const el = document.getElementById('cShutterInner'); el.style.width = v + 'px'; el.style.height = v + 'px'; } },
    { id: 'shutterBorder', label: 'Border width', min: 1, max: 8, def: 4, unit: 'px', apply: v => { document.getElementById('cShutterOuter').style.borderWidth = v + 'px'; } },

    { section: 'Gallery Button' },
    { id: 'gallerySize', label: 'Size', min: 28, max: 64, def: 44, unit: 'px', apply: v => { const el = document.getElementById('cGalleryBtn'); el.style.width = v + 'px'; el.style.height = v + 'px'; } },

    { section: 'Bottom Bar' },
    { id: 'bottomPadB', label: 'Padding bottom', min: 8, max: 48, def: 24, unit: 'px', apply: v => { document.getElementById('cBottomBar').style.paddingBottom = v + 'px'; } },
  ];

  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  const container = document.getElementById('custControls');
  const sliders = {};

  controls.forEach(c => {
    if (c.section) {
      const h = document.createElement('div');
      h.className = 'cust-section';
      h.textContent = c.section;
      container.appendChild(h);
      return;
    }
    const val = saved[c.id] !== undefined ? saved[c.id] : c.def;
    const row = document.createElement('div');
    row.className = 'cust-row';
    row.innerHTML = `<label>${c.label}</label><input type="range" min="${c.min}" max="${c.max}" value="${val}" data-id="${c.id}"><span class="cust-val">${val}${c.unit}</span>`;
    container.appendChild(row);
    const slider = row.querySelector('input');
    const display = row.querySelector('.cust-val');
    sliders[c.id] = { slider, display, control: c };
    slider.addEventListener('input', () => {
      const v = parseInt(slider.value);
      display.textContent = v + c.unit;
      c.apply(v);
      save();
    });
    c.apply(val);
  });

  function save() {
    const data = {};
    Object.keys(sliders).forEach(id => { data[id] = parseInt(sliders[id].slider.value); });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  window.copyCustValues = function() {
    const lines = [];
    controls.forEach(c => {
      if (c.section) { lines.push('\n' + c.section); return; }
      const v = parseInt(sliders[c.id].slider.value);
      lines.push('  ' + c.label + ': ' + v + c.unit);
    });
    navigator.clipboard.writeText(lines.join('\n').trim()).then(() => {
      const btn = document.querySelector('#custPanel button');
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = orig, 1500);
    });
  };
})();
</script>
<!-- ==================== /DESIGN CUSTOMIZER ==================== -->

</body>
</html>
