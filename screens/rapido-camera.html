<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Take Photo · Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #000; }
  .device { width: 390px; margin: 24px auto; background: #000; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; }

  /* A4 ratio frame (1:1.414) */
  .doc-frame { position: relative; width: 280px; height: 396px; }
  .doc-frame::before { content: ''; position: absolute; inset: 0; border: 2px solid rgba(255,255,255,0.5); border-radius: 8px; animation: framePulse 2.5s ease-in-out infinite; }
  @keyframes framePulse { 0%,100% { border-color: rgba(255,255,255,0.5); } 50% { border-color: rgba(14,122,78,0.8); } }

  .corner { position: absolute; width: 24px; height: 24px; }
  .corner::before, .corner::after { content: ''; position: absolute; background: #fff; }
  .tl { top: -1px; left: -1px; }
  .tl::before { top: 0; left: 0; width: 24px; height: 3px; border-radius: 3px 0 0 0; }
  .tl::after { top: 0; left: 0; width: 3px; height: 24px; border-radius: 3px 0 0 0; }
  .tr { top: -1px; right: -1px; }
  .tr::before { top: 0; right: 0; width: 24px; height: 3px; border-radius: 0 3px 0 0; }
  .tr::after { top: 0; right: 0; width: 3px; height: 24px; border-radius: 0 3px 0 0; }
  .bl { bottom: -1px; left: -1px; }
  .bl::before { bottom: 0; left: 0; width: 24px; height: 3px; border-radius: 0 0 0 3px; }
  .bl::after { bottom: 0; left: 0; width: 3px; height: 24px; border-radius: 0 0 0 3px; }
  .br { bottom: -1px; right: -1px; }
  .br::before { bottom: 0; right: 0; width: 24px; height: 3px; border-radius: 0 0 3px 0; }
  .br::after { bottom: 0; right: 0; width: 3px; height: 24px; border-radius: 0 0 3px 0; }

  .scan-line { position: absolute; left: 8px; right: 8px; height: 2px; background: linear-gradient(90deg, transparent, #0E7A4E, transparent); border-radius: 2px; animation: scanMove 3s ease-in-out infinite; }
  @keyframes scanMove { 0% { top: 15px; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: calc(100% - 15px); opacity: 0; } }
</style>
</head>
<body>
<div class="device">

  <!-- HEADER -->
  <div class="px-4 pt-7 pb-2 flex items-center gap-3 relative z-20">
    <a href="rapido-license-upload.html" class="w-9 h-9 rounded-full border border-white/20 flex items-center justify-center">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <div class="text-[14px] font-semibold text-white">Scan License</div>
  </div>

  <!-- CAMERA VIEWFINDER -->
  <div class="relative flex-1 flex items-center justify-center" style="height: 480px; background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);">
    <div class="absolute inset-0" style="background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);"></div>

    <!-- A4 frame -->
    <div class="doc-frame relative z-10">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="scan-line"></div>

      <!-- Center hint -->
      <div class="absolute inset-0 flex items-center justify-center">
        <div class="text-white/20 text-[11px] text-center">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1" class="mx-auto mb-1 opacity-20"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>
          Place license here
        </div>
      </div>
    </div>
  </div>

  <!-- BOTTOM BAR -->
  <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black via-black/95 to-transparent px-5 pt-6 pb-6">
    <div class="text-center mb-4">
      <div class="text-white text-[13px] font-semibold">Align license within the frame</div>
      <div class="text-white/40 text-[10px] mt-0.5">Ensure all text is clearly visible</div>
    </div>

    <div class="flex items-center justify-between px-6">
      <div class="w-11 h-11"></div>

      <!-- Shutter -->
      <a href="rapido-camera-preview.html" class="w-[68px] h-[68px] rounded-full border-[4px] border-white flex items-center justify-center">
        <div class="w-[54px] h-[54px] rounded-full bg-white"></div>
      </a>

      <div class="w-11 h-11"></div>
    </div>
  </div>

</div>
<div class="text-center text-white/60 text-xs pb-6"><a href="rapido-license-upload.html" class="underline">Back</a> · <a href="rapido-camera-preview.html" class="underline">Next</a> · <a href="../index.html" class="underline">All</a></div>
</body>
</html>
