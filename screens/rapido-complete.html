<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Verification Complete · Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #1a1a1a; }
  .device { width: 390px; margin: 24px auto; background: #fff; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; display: flex; flex-direction: column; }

  .hero-bg { background: radial-gradient(ellipse at 50% -10%, #C9F1D8 0%, #E8FAEE 30%, #F8FFFE 60%, #FFFFFF 100%); }

  /* Animated glow + halo ring */
  .glow-halo { position: absolute; inset: -24px; border-radius: 50%; background: radial-gradient(circle, rgba(14,122,78,0.18) 0%, transparent 65%); animation: halo 2.4s ease-in-out infinite; }
  @keyframes halo { 0%,100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.12); opacity: 1; } }

  .check-circle { position: relative; width: 108px; height: 108px; margin: 0 auto; }
  .check-circle svg.ring { transform: rotate(-90deg); }
  .check-circle .ring-bg { stroke: rgba(14,122,78,0.12); stroke-width: 5; fill: none; }
  .check-circle .ring-fg { stroke: #0E7A4E; stroke-width: 5.5; fill: none; stroke-linecap: round; stroke-dasharray: 320; stroke-dashoffset: 320; animation: drawRing 0.9s 0.15s ease-out forwards; }
  .check-circle .check-inner { position: absolute; inset: 10px; border-radius: 50%; background: linear-gradient(145deg, #0E7A4E, #0C6A42); display: flex; align-items: center; justify-content: center; opacity: 0; transform: scale(0.3); animation: popIn 0.45s 0.95s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; box-shadow: inset 0 2px 10px rgba(255,255,255,0.18), 0 10px 24px -6px rgba(14,122,78,0.45); }
  @keyframes drawRing { to { stroke-dashoffset: 0; } }
  @keyframes popIn { 0% { opacity: 0; transform: scale(0.3); } 60% { opacity: 1; transform: scale(1.12); } 100% { opacity: 1; transform: scale(1); } }

  /* Confetti burst — emerald + gold palette only */
  .confetti { position: absolute; opacity: 0; pointer-events: none; border-radius: 1px; }
  .confetti.c1 { animation: cf1 1.6s 1.1s ease-out forwards; }
  .confetti.c2 { animation: cf2 1.6s 1.15s ease-out forwards; }
  .confetti.c3 { animation: cf3 1.6s 1.2s ease-out forwards; }
  .confetti.c5 { animation: cf5 1.6s 1.2s ease-out forwards; }
  .confetti.c6 { animation: cf6 1.6s 1.25s ease-out forwards; }
  @keyframes cf1 { 0% { opacity: 0; transform: translate(0,0) rotate(0); } 15% { opacity: 1; } 100% { opacity: 0; transform: translate(-70px,-50px) rotate(-180deg); } }
  @keyframes cf2 { 0% { opacity: 0; transform: translate(0,0) rotate(0); } 15% { opacity: 1; } 100% { opacity: 0; transform: translate(75px,-55px) rotate(200deg); } }
  @keyframes cf3 { 0% { opacity: 0; transform: translate(0,0) rotate(0); } 15% { opacity: 1; } 100% { opacity: 0; transform: translate(-85px,20px) rotate(-240deg); } }
  @keyframes cf5 { 0% { opacity: 0; transform: translate(0,0) rotate(0); } 15% { opacity: 1; } 100% { opacity: 0; transform: translate(-55px,-70px) rotate(160deg); } }
  @keyframes cf6 { 0% { opacity: 0; transform: translate(0,0) rotate(0); } 15% { opacity: 1; } 100% { opacity: 0; transform: translate(60px,-75px) rotate(-200deg); } }

  /* Sparkles around hero */
  .sparkle { position: absolute; opacity: 0; animation: sparkFloat 1.8s ease-out forwards; }
  @keyframes sparkFloat { 0% { opacity: 0; transform: scale(0.3) translateY(8px); } 30% { opacity: 1; } 100% { opacity: 0; transform: scale(1.3) translateY(-16px); } }

  .fade-up { opacity: 0; animation: fadeUp 0.55s ease-out forwards; }
  @keyframes fadeUp { 0% { opacity: 0; transform: translateY(14px); } 100% { opacity: 1; transform: translateY(0); } }

  .feat-row { transition: transform .15s, border-color .15s; cursor: pointer; }
  .feat-row:active { transform: scale(0.98); }
  .feat-row:hover { border-color: #0E7A4E; }

  .cta-pulse { position: relative; overflow: hidden; box-shadow: 0 10px 28px -10px rgba(14,122,78,0.55); }
  .cta-pulse::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent); transform: translateX(-100%); animation: shimmer 2.6s ease-in-out infinite; }
  @keyframes shimmer { 50% { transform: translateX(100%); } 100% { transform: translateX(100%); } }
</style>
</head>
<body>
<div class="device hero-bg">

  <!-- HEADER -->
  <div class="px-4 pt-7 pb-3 flex items-center justify-end flex-shrink-0">
    <a href="rapido-help.html" class="flex items-center gap-1.5 border border-[#EDEDED] rounded-full px-3 py-1.5 bg-white">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1C1C1C" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
      <span class="text-[12px] font-semibold text-[#1C1C1C]">Help</span>
    </a>
  </div>
  <div class="h-px bg-[#EDEDED] flex-shrink-0"></div>

  <!-- CONTENT -->
  <div class="flex-1 overflow-y-auto px-5 pb-2" style="scrollbar-width:none;">

    <!-- HERO -->
    <div class="relative flex flex-col items-center pt-6 pb-2">
      <div class="relative">
        <div class="glow-halo"></div>
        <div class="check-circle relative">
          <svg class="ring" width="108" height="108" viewBox="0 0 108 108">
            <circle cx="54" cy="54" r="51" class="ring-bg"/>
            <circle cx="54" cy="54" r="51" class="ring-fg"/>
          </svg>
          <div class="check-inner">
            <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg>
          </div>
        </div>
        <!-- Confetti burst (emerald + gold only) -->
        <div class="absolute left-1/2 top-1/2 w-2 h-3 bg-[#D4A537] confetti c1"></div>
        <div class="absolute left-1/2 top-1/2 w-2 h-3 bg-[#0E7A4E] confetti c2"></div>
        <div class="absolute left-1/2 top-1/2 w-2.5 h-2 bg-[#FFD96B] confetti c3"></div>
        <div class="absolute left-1/2 top-1/2 w-2 h-3 bg-[#D4A537] confetti c5"></div>
        <div class="absolute left-1/2 top-1/2 w-2 h-2 bg-[#0E7A4E] confetti c6"></div>
      </div>
      <!-- Sparkles -->
      <div class="sparkle" style="top:-4px;left:30px;animation-delay:1.3s;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#D4A537"><path d="M12 2l2 7h7l-5.5 4 2 7-5.5-4-5.5 4 2-7L3 9h7z"/></svg>
      </div>
      <div class="sparkle" style="top:20px;right:30px;animation-delay:1.45s;">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="#0E7A4E"><path d="M12 2l2 7h7l-5.5 4 2 7-5.5-4-5.5 4 2-7L3 9h7z"/></svg>
      </div>
      <div class="sparkle" style="bottom:10px;left:52px;animation-delay:1.55s;">
        <svg width="9" height="9" viewBox="0 0 24 24" fill="#D4A537"><circle cx="12" cy="12" r="10"/></svg>
      </div>
    </div>

    <!-- Heading -->
    <div class="text-center fade-up" style="animation-delay:1.1s;">
      <div class="text-[26px] font-extrabold text-[#1C1C1C] leading-tight tracking-tight">Verified, Raman! 🎉</div>
      <div class="text-[12.5px] text-[#606060] mt-1.5 px-2">All set — here's what's unlocked.</div>
    </div>

    <!-- STAT TILES — visual, minimal text -->
    <div class="mt-6 grid grid-cols-3 gap-2.5">
      <!-- Credit -->
      <div class="feat-row relative overflow-hidden rounded-2xl p-3 text-center fade-up" style="animation-delay:1.3s; background: linear-gradient(160deg, #F0FDF5 0%, #D6F0D8 100%); border: 1px solid rgba(14,122,78,0.15);">
        <div class="absolute -top-3 -right-3 w-14 h-14 rounded-full bg-white/50"></div>
        <div class="relative z-10">
          <div class="w-9 h-9 rounded-xl bg-white flex items-center justify-center mx-auto mb-2" style="box-shadow: 0 4px 10px -3px rgba(14,122,78,0.25);">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
          </div>
          <div class="text-[16px] font-black text-[#0A4F30] leading-none">₹50K</div>
          <div class="text-[9.5px] font-bold text-[#2E7C3C] mt-1">Credit line</div>
        </div>
      </div>

      <!-- Discount -->
      <div class="feat-row relative overflow-hidden rounded-2xl p-3 text-center fade-up" style="animation-delay:1.45s; background: linear-gradient(160deg, #FFF8E6 0%, #FCE8A3 100%); border: 1px solid rgba(212,165,55,0.25);">
        <div class="absolute -top-3 -right-3 w-14 h-14 rounded-full bg-white/50"></div>
        <div class="relative z-10">
          <div class="w-9 h-9 rounded-xl bg-white flex items-center justify-center mx-auto mb-2" style="box-shadow: 0 4px 10px -3px rgba(212,165,55,0.3);">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8B6914" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12l-8-8H4v8l8 8z"/><circle cx="8.5" cy="8.5" r="1.5" fill="#8B6914"/></svg>
          </div>
          <div class="text-[16px] font-black text-[#6B4E12] leading-none">18%</div>
          <div class="text-[9.5px] font-bold text-[#8B6914] mt-1">Off MRP</div>
        </div>
      </div>

      <!-- Catalog -->
      <div class="feat-row relative overflow-hidden rounded-2xl p-3 text-center fade-up" style="animation-delay:1.6s; background: linear-gradient(160deg, #EEF4FF 0%, #D6E4FA 100%); border: 1px solid rgba(43,91,199,0.15);">
        <div class="absolute -top-3 -right-3 w-14 h-14 rounded-full bg-white/50"></div>
        <div class="relative z-10">
          <div class="w-9 h-9 rounded-xl bg-white flex items-center justify-center mx-auto mb-2" style="box-shadow: 0 4px 10px -3px rgba(43,91,199,0.25);">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2B5BC7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1.5"/><circle cx="18" cy="21" r="1.5"/><path d="M3 3h2l2.5 12h11L21 7H6"/></svg>
          </div>
          <div class="text-[16px] font-black text-[#1A3E8A] leading-none">500+</div>
          <div class="text-[9.5px] font-bold text-[#2B5BC7] mt-1">SKUs</div>
        </div>
      </div>
    </div>

    <!-- Tiny caption under tiles -->
    <div class="text-center text-[10px] text-[#909090] mt-3 fade-up" style="animation-delay:1.75s;">
      Buy now &middot; pay in 30 days &middot; 0% interest
    </div>

    <div class="h-3"></div>
  </div>

  <!-- STICKY CTA -->
  <div class="flex-shrink-0 bg-white px-5 pt-3 pb-4 border-t border-[#EDEDED] fade-up" style="animation-delay:1.85s;">
    <a href="home.html" class="cta-pulse block bg-[#0E7A4E] text-white text-center py-3.5 rounded-xl text-[13px] font-bold uppercase tracking-wider">
      Explore the App
    </a>
  </div>

</div>
<div class="text-center text-white/60 text-xs pb-6"><a href="rapido-aadhaar-upload.html" class="underline">Prev</a> · <a href="home.html" class="underline">Home</a> · <a href="../index.html" class="underline">All</a></div>
</body>
</html>
