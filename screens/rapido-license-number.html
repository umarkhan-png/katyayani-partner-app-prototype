<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>License Number · Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #1a1a1a; }
  .device { width: 390px; margin: 24px auto; background: #000; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; }
  .scroll-area { height: 100%; overflow-y: auto; }
  .scroll-area::-webkit-scrollbar { display: none; }
  .input { width: 100%; border: 2px solid #EDEDED; border-radius: 12px; padding: 14px 16px; font-size: 16px; font-weight: 600; color: #1C1C1C; outline: none; background: #fff; font-family: 'Poppins', sans-serif; }
  .input:focus { border-color: #0E7A4E; box-shadow: 0 0 0 3px rgba(14,122,78,0.12); }
  .input::placeholder { color: #BDBDBD; font-weight: 400; }
</style>
</head>
<body>
<div class="device">
<div class="scroll-area">

  <!-- HEADER -->
  <div class="px-4 pt-7 pb-3 flex items-center justify-between bg-white">
    <a href="rapido-license-upload.html" class="p-1">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M5 12l6-6M5 12l6 6" stroke="#1C1C1C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <div class="flex items-center gap-2">
      <button class="w-9 h-9 rounded-full border border-[#EDEDED] flex items-center justify-center">
        <span class="text-[11px] font-bold text-[#1C1C1C]">अ/A</span>
      </button>
      <button class="flex items-center gap-1 border border-[#EDEDED] rounded-full px-3 py-1.5">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1C1C1C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
        <span class="text-[11px] font-semibold">Help</span>
      </button>
    </div>
  </div>
  <div class="h-px bg-[#EDEDED]"></div>

  <!-- VIDEO STILL PLAYING — Rapido pattern: video continues in background -->
  <div id="cz-video-area" class="relative bg-gradient-to-b from-[#062A1B] to-[#0B3D28]" style="height: 380px;">
    <div class="absolute top-3 right-3 flex flex-col gap-2 z-10">
      <button class="w-9 h-9 rounded-full bg-black/50 backdrop-blur flex items-center justify-center">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg>
      </button>
      <button class="w-9 h-9 rounded-full bg-black/50 backdrop-blur flex items-center justify-center">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 015.64 5.64L1 10M3.51 15a9 9 0 0014.85 3.36L23 14"/></svg>
      </button>
    </div>

    <div class="h-full flex flex-col items-center justify-center px-8">
      <div id="cz-success-icon" class="w-20 h-20 rounded-full bg-[#0E7A4E]/30 border-2 border-[#0E7A4E]/50 flex items-center justify-center mb-3">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><path d="M5 12l5 5L20 7"/></svg>
      </div>
      <div id="cz-success-title" class="text-white/90 text-[13px] font-semibold text-center">Photo captured successfully</div>
      <div id="cz-subtitle" class="text-white/50 text-[11px] font-medium mt-1">Now enter your license number below</div>
    </div>
  </div>

  <!-- BOTTOM SHEET — License number input (Rapido pattern) -->
  <div id="cz-bottom-sheet" class="bg-white rounded-t-[28px] -mt-6 relative z-10 px-5 pt-5 pb-6">
    <div id="cz-license-title" class="text-[15px] font-bold text-[#1C1C1C] mb-3">Pesticide License Number</div>
    <input id="cz-input" class="input uppercase tracking-[1px]" placeholder="MP/IND/III/2024/1234"/>

    <a id="cz-cta-btn" href="rapido-aadhaar-upload.html" class="block mt-4 bg-[#0C831F] text-white text-center py-3.5 rounded-full text-[14px] font-bold">
      Continue
    </a>
  </div>

</div>
</div>
<div class="text-center text-white/60 text-xs pb-6">Rapido Flow · <a href="rapido-license-upload.html" class="underline">Prev</a> · <a href="rapido-aadhaar-upload.html" class="underline">Next</a> · <a href="../index.html" class="underline">All</a></div>

<!-- DESIGN CUSTOMIZER -->
<button id="cz-toggle" onclick="document.getElementById('cz-panel').classList.toggle('hidden')" style="position:fixed;bottom:24px;right:24px;width:48px;height:48px;border-radius:50%;background:#0E7A4E;border:none;cursor:pointer;z-index:9999;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.3);">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
</button>
<div id="cz-panel" class="hidden" style="position:fixed;bottom:80px;right:24px;width:320px;max-height:70vh;background:#111;border-radius:16px;z-index:9999;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.5);padding:20px;">
  <div style="color:#fff;font-size:14px;font-weight:700;margin-bottom:16px;font-family:Poppins,sans-serif;">Design Customizer</div>

  <div style="margin-bottom:14px;">
    <label style="color:#aaa;font-size:11px;font-family:Poppins,sans-serif;display:block;margin-bottom:4px;">Video Area Height: <span id="cz-v-videoH">380</span>px</label>
    <input type="range" min="280" max="480" value="380" id="cz-r-videoH" style="width:100%;accent-color:#0E7A4E;">
  </div>
  <div style="margin-bottom:14px;">
    <label style="color:#aaa;font-size:11px;font-family:Poppins,sans-serif;display:block;margin-bottom:4px;">Success Icon Size: <span id="cz-v-iconSize">80</span>px</label>
    <input type="range" min="48" max="120" value="80" id="cz-r-iconSize" style="width:100%;accent-color:#0E7A4E;">
  </div>
  <div style="margin-bottom:14px;">
    <label style="color:#aaa;font-size:11px;font-family:Poppins,sans-serif;display:block;margin-bottom:4px;">Title Font Size: <span id="cz-v-titleFs">13</span>px</label>
    <input type="range" min="10" max="20" value="13" id="cz-r-titleFs" style="width:100%;accent-color:#0E7A4E;">
  </div>
  <div style="margin-bottom:14px;">
    <label style="color:#aaa;font-size:11px;font-family:Poppins,sans-serif;display:block;margin-bottom:4px;">Subtitle Font Size: <span id="cz-v-subFs">11</span>px</label>
    <input type="range" min="8" max="18" value="11" id="cz-r-subFs" style="width:100%;accent-color:#0E7A4E;">
  </div>
  <div style="margin-bottom:14px;">
    <label style="color:#aaa;font-size:11px;font-family:Poppins,sans-serif;display:block;margin-bottom:4px;">Bottom Sheet Border Radius: <span id="cz-v-sheetBr">28</span>px</label>
    <input type="range" min="12" max="36" value="28" id="cz-r-sheetBr" style="width:100%;accent-color:#0E7A4E;">
  </div>
  <div style="margin-bottom:14px;">
    <label style="color:#aaa;font-size:11px;font-family:Poppins,sans-serif;display:block;margin-bottom:4px;">Bottom Sheet Padding Top: <span id="cz-v-sheetPt">20</span>px</label>
    <input type="range" min="12" max="32" value="20" id="cz-r-sheetPt" style="width:100%;accent-color:#0E7A4E;">
  </div>
  <div style="margin-bottom:14px;">
    <label style="color:#aaa;font-size:11px;font-family:Poppins,sans-serif;display:block;margin-bottom:4px;">Bottom Sheet Padding X: <span id="cz-v-sheetPx">20</span>px</label>
    <input type="range" min="12" max="32" value="20" id="cz-r-sheetPx" style="width:100%;accent-color:#0E7A4E;">
  </div>
  <div style="margin-bottom:14px;">
    <label style="color:#aaa;font-size:11px;font-family:Poppins,sans-serif;display:block;margin-bottom:4px;">Input Padding: <span id="cz-v-inputPad">14</span>px</label>
    <input type="range" min="8" max="24" value="14" id="cz-r-inputPad" style="width:100%;accent-color:#0E7A4E;">
  </div>
  <div style="margin-bottom:14px;">
    <label style="color:#aaa;font-size:11px;font-family:Poppins,sans-serif;display:block;margin-bottom:4px;">Input Border Radius: <span id="cz-v-inputBr">12</span>px</label>
    <input type="range" min="8" max="20" value="12" id="cz-r-inputBr" style="width:100%;accent-color:#0E7A4E;">
  </div>
  <div style="margin-bottom:14px;">
    <label style="color:#aaa;font-size:11px;font-family:Poppins,sans-serif;display:block;margin-bottom:4px;">Input Font Size: <span id="cz-v-inputFs">16</span>px</label>
    <input type="range" min="12" max="22" value="16" id="cz-r-inputFs" style="width:100%;accent-color:#0E7A4E;">
  </div>
  <div style="margin-bottom:14px;">
    <label style="color:#aaa;font-size:11px;font-family:Poppins,sans-serif;display:block;margin-bottom:4px;">CTA Padding Y: <span id="cz-v-ctaPy">14</span>px</label>
    <input type="range" min="8" max="24" value="14" id="cz-r-ctaPy" style="width:100%;accent-color:#0E7A4E;">
  </div>
  <div style="margin-bottom:14px;">
    <label style="color:#aaa;font-size:11px;font-family:Poppins,sans-serif;display:block;margin-bottom:4px;">CTA Border Radius: <span id="cz-v-ctaBr">24</span>px</label>
    <input type="range" min="8" max="24" value="24" id="cz-r-ctaBr" style="width:100%;accent-color:#0E7A4E;">
  </div>
  <div style="margin-bottom:16px;">
    <label style="color:#aaa;font-size:11px;font-family:Poppins,sans-serif;display:block;margin-bottom:4px;">CTA Font Size: <span id="cz-v-ctaFs">14</span>px</label>
    <input type="range" min="10" max="18" value="14" id="cz-r-ctaFs" style="width:100%;accent-color:#0E7A4E;">
  </div>

  <button id="cz-save" style="width:100%;padding:10px;background:#0E7A4E;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:Poppins,sans-serif;">Save</button>
</div>

<script>
(function(){
  const KEY='licenseNumCustom';
  const controls=[
    {id:'videoH',def:380,apply:v=>{document.getElementById('cz-video-area').style.height=v+'px';}},
    {id:'iconSize',def:80,apply:v=>{const e=document.getElementById('cz-success-icon');e.style.width=v+'px';e.style.height=v+'px';}},
    {id:'titleFs',def:13,apply:v=>{document.getElementById('cz-success-title').style.fontSize=v+'px';}},
    {id:'subFs',def:11,apply:v=>{document.getElementById('cz-subtitle').style.fontSize=v+'px';}},
    {id:'sheetBr',def:28,apply:v=>{document.getElementById('cz-bottom-sheet').style.borderRadius=v+'px '+v+'px 0 0';}},
    {id:'sheetPt',def:20,apply:v=>{document.getElementById('cz-bottom-sheet').style.paddingTop=v+'px';}},
    {id:'sheetPx',def:20,apply:v=>{const e=document.getElementById('cz-bottom-sheet');e.style.paddingLeft=v+'px';e.style.paddingRight=v+'px';}},
    {id:'inputPad',def:14,apply:v=>{document.getElementById('cz-input').style.padding=v+'px '+(parseInt(v)+2)+'px';}},
    {id:'inputBr',def:12,apply:v=>{document.getElementById('cz-input').style.borderRadius=v+'px';}},
    {id:'inputFs',def:16,apply:v=>{document.getElementById('cz-input').style.fontSize=v+'px';}},
    {id:'ctaPy',def:14,apply:v=>{document.getElementById('cz-cta-btn').style.paddingTop=v+'px';document.getElementById('cz-cta-btn').style.paddingBottom=v+'px';}},
    {id:'ctaBr',def:24,apply:v=>{document.getElementById('cz-cta-btn').style.borderRadius=v+'px';}},
    {id:'ctaFs',def:14,apply:v=>{document.getElementById('cz-cta-btn').style.fontSize=v+'px';}}
  ];

  // Restore saved values
  const saved=JSON.parse(localStorage.getItem(KEY)||'{}');
  controls.forEach(c=>{
    const val=saved[c.id]!==undefined?saved[c.id]:c.def;
    const r=document.getElementById('cz-r-'+c.id);
    const v=document.getElementById('cz-v-'+c.id);
    r.value=val;v.textContent=val;
    c.apply(val);
    r.addEventListener('input',()=>{v.textContent=r.value;c.apply(parseInt(r.value));});
  });

  // Save button
  document.getElementById('cz-save').addEventListener('click',function(){
    const data={};
    controls.forEach(c=>{data[c.id]=parseInt(document.getElementById('cz-r-'+c.id).value);});
    localStorage.setItem(KEY,JSON.stringify(data));
    const btn=this;btn.textContent='Saved!';
    setTimeout(()=>{btn.textContent='Save';},1200);
  });
})();
</script>

</body>
</html>
