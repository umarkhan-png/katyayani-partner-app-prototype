<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="manifest" href="/katyayani-partner-app-prototype/manifest.json">
  <meta name="theme-color" content="#0E7A4E">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KT Partner">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Upload License · Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #fff; margin: 0; padding: 0; overflow: hidden; }
  .device { width: 100%; background: #fff; overflow: hidden; position: relative; height: 100vh; display: flex; flex-direction: column; }
  .example-card { flex: 1; min-width: 0; cursor: pointer; transition: transform .15s; }
  .example-card:active { transform: scale(0.96); }
  .example-card img { width: 100%; height: auto; border-radius: 8px; }
  .upload-btn { transition: all .12s; }
  .upload-btn:active { transform: scale(0.96); }
  .preview-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.9); z-index: 100; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 20px; }
  .preview-overlay img { max-width: 100%; max-height: 70vh; border-radius: 12px; object-fit: contain; }
  @media screen and (max-width: 499px) {
    .device { width: 100vw !important; height: 100vh !important; margin: 0 !important;
              border-radius: 0 !important; border: none !important; }
    .scroll-area { height: 100vh !important; }
  }

  @media screen and (min-width: 500px) {
    html, body { background: #1a1a1a; overflow: auto; }
    .device { width: 390px; height: 780px; margin: 24px auto; border-radius: 36px; border: 8px solid #111; box-shadow: 0 30px 80px rgba(0,0,0,.4); }
    .scroll-area { height: 780px; }
  }
</style>
<style>
@media screen and (max-width: 499px) {
  .scroll-area { padding-top: env(safe-area-inset-top, 24px) !important; }
  .device { box-sizing: border-box; }
}
</style>
</head>
<body>
<div class="device bg-white">

  <!-- HEADER -->
  <div class="px-4 pt-7 pb-3 flex items-center justify-between flex-shrink-0">
    <a href="rapido-shop-photo.html" class="w-9 h-9 rounded-full border border-[#EDEDED] flex items-center justify-center">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <a href="rapido-help.html" class="flex items-center gap-1.5 border border-[#EDEDED] rounded-full px-3 py-1.5">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1C1C1C" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>
      <span class="text-[14px] font-semibold text-[#1C1C1C]">Help</span>
    </a>
  </div>
  <div class="h-px bg-[#EDEDED] flex-shrink-0"></div>

  <!-- SCROLLABLE CONTENT -->
  <div class="flex-1 overflow-y-auto px-5 pt-4 pb-2" style="-webkit-overflow-scrolling:touch;scrollbar-width:none;">

    <!-- Title + subtitle -->
    <div class="flex items-start gap-3 mb-5">
      <div class="w-11 h-11 rounded-xl bg-[#F0FDF5] flex items-center justify-center flex-shrink-0 mt-0.5">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>
      </div>
      <div>
        <div class="text-[19px] font-bold text-[#1C1C1C] leading-snug">Upload Pesticide or<br>Fertilizer License</div>
        <div class="text-[13px] text-[#909090] mt-0.5">Upload clear photos of all pages</div>
      </div>
    </div>

    <!-- EXAMPLES — with tappable cards -->
    <div class="bg-[#F8F8F8] rounded-2xl p-3.5 mb-5">
      <div class="flex items-center justify-between mb-2.5">
        <div class="text-[13px] font-semibold text-[#606060]">Example licenses</div>
        <div class="text-[9px] text-[#BDBDBD]">Tap to preview</div>
      </div>
      <div class="flex gap-2">
        <div class="example-card" onclick="openPreview('../assets/license-pesticide-form3.png','Pesticide License')">
          <img src="../assets/license-pesticide-form3.png" alt="Pesticide License"/>
          <div class="text-[9px] font-semibold text-[#1C1C1C] mt-1.5 text-center">Pesticide License</div>
        </div>
        <div class="example-card" onclick="openPreview('../assets/license-pesticide-form3-wb.png','Pesticide License')">
          <img src="../assets/license-pesticide-form3-wb.png" alt="Pesticide License"/>
          <div class="text-[9px] font-semibold text-[#1C1C1C] mt-1.5 text-center">Pesticide License</div>
        </div>
        <div class="example-card" onclick="openPreview('../assets/license-fertilizer.png','Fertilizer License')">
          <img src="../assets/license-fertilizer.png" alt="Fertilizer License"/>
          <div class="text-[9px] font-semibold text-[#1C1C1C] mt-1.5 text-center">Fertilizer License</div>
        </div>
      </div>
    </div>

    <!-- YOUR UPLOADS -->
    <div class="text-[15px] font-bold text-[#1C1C1C] mb-2">Your uploads</div>

    <!-- Uploaded thumbnails — bigger with real preview -->
    <div id="thumbRow" class="flex gap-3 flex-wrap mb-3"></div>

    <!-- Upload box -->
    <div id="uploadBox" class="border-2 border-dashed border-[#0E7A4E]/30 bg-[#FAFFFE] rounded-2xl py-6 flex flex-col items-center justify-center">
      <div class="w-14 h-14 rounded-full bg-[#F0FDF5] border border-[#0E7A4E]/10 flex items-center justify-center mb-3">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>
      </div>
      <div class="text-[15px] font-semibold text-[#1C1C1C] mb-1">Upload your license</div>
      <div class="text-[12px] text-[#909090] mb-3">All pages · JPG, PNG or PDF</div>
      <div class="flex gap-2.5">
        <a href="rapido-camera.html" class="upload-btn flex items-center gap-1.5 bg-[#0E7A4E] text-white px-5 py-2.5 rounded-xl text-[14px] font-semibold shadow-sm no-underline">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="12" cy="12" r="3"/><path d="M7 5l1.5-2h7L17 5"/></svg>
          Camera
        </a>
        <button class="upload-btn flex items-center gap-1.5 border border-[#EDEDED] text-[#606060] px-5 py-2.5 rounded-xl text-[14px] font-semibold" onclick="addPage()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#606060" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          Gallery
        </button>
      </div>
    </div>

    <!-- Add more — shows after first upload -->
    <button id="addMoreBtn" class="hidden upload-btn w-full mt-3 flex items-center justify-center gap-2 border-2 border-dashed border-[#0E7A4E]/30 bg-[#FAFFFE] py-3 rounded-xl text-[14px] font-semibold text-[#0E7A4E]" onclick="addPage()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      Add more pages
    </button>

  </div>

  <!-- STICKY CTA + Skip -->
  <div class="flex-shrink-0 bg-white px-5 py-3 border-t border-[#EDEDED]">
    <a href="rapido-aadhaar-upload.html" class="block bg-[#0E7A4E] text-white text-center py-3.5 rounded-xl text-[15px] font-bold uppercase tracking-wider">
      Continue
    </a>
    <a href="home.html" class="block text-center mt-2.5 text-[10.5px] text-[#909090]">
      Skip verification
    </a>
  </div>

</div>

<!-- FULLSCREEN PREVIEW -->
<div id="previewOverlay" class="preview-overlay hidden" onclick="closePreview()">
  <img id="previewImg" src="" alt=""/>
  <div id="previewLabel" class="text-white text-[16px] font-semibold mt-3"></div>
  <div class="text-white/30 text-[12px] mt-1">Tap anywhere to close</div>
</div>

<script>
let pageCount = 0;
const licenseImages = [
  '../assets/license-pesticide-form3.png',
  '../assets/license-pesticide-form3-wb.png',
  '../assets/license-fertilizer.png'
];

function addPage() {
  pageCount++;
  const row = document.getElementById('thumbRow');
  const img = licenseImages[Math.floor(Math.random() * licenseImages.length)];

  const thumb = document.createElement('div');
  thumb.className = 'relative flex-shrink-0';
  thumb.innerHTML = `
    <div class="w-[88px] h-[112px] rounded-xl overflow-hidden bg-white shadow-md border border-[#EDEDED] cursor-pointer" onclick="openPreview('${img}','Uploaded Page ${pageCount}')">
      <img src="${img}" class="w-full h-full object-cover"/>
      <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/70 to-transparent pt-4 pb-1.5 px-2 text-center" style="padding-bottom:env(safe-area-inset-bottom,20px);">
        <span class="text-[8px] font-semibold text-white">Page ${pageCount}</span>
      </div>
    </div>
    <button class="absolute -top-2 -right-2 w-6 h-6 rounded-full bg-white border border-[#EDEDED] flex items-center justify-center shadow-md" onclick="event.stopPropagation();this.parentElement.remove();checkEmpty()">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#E23744" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>`;
  row.appendChild(thumb);

  document.getElementById('uploadBox').classList.add('hidden');
  document.getElementById('addMoreBtn').classList.remove('hidden');
}

function checkEmpty() {
  if (document.getElementById('thumbRow').children.length === 0) {
    document.getElementById('uploadBox').classList.remove('hidden');
    document.getElementById('addMoreBtn').classList.add('hidden');
    pageCount = 0;
  }
}

function openPreview(src, label) {
  document.getElementById('previewImg').src = src;
  document.getElementById('previewLabel').textContent = label;
  document.getElementById('previewOverlay').classList.remove('hidden');
}
function closePreview() {
  document.getElementById('previewOverlay').classList.add('hidden');
}
</script>
<div class="text-center text-white/60 text-xs pb-6"><a href="rapido-shop-photo.html" class="underline">Prev</a> · <a href="rapido-aadhaar-upload.html" class="underline">Next</a> · <a href="../index.html" class="underline">All</a></div>
  <script>if("serviceWorker"in navigator){navigator.serviceWorker.register("/katyayani-partner-app-prototype/sw.js")}</script>
<script>(function(){if(window.innerWidth>=768)return;document.body.style.cssText="background:#fff;margin:0;padding:0;overflow:hidden";var d=document.querySelector(".device");if(d)d.style.cssText="width:100vw;height:100vh;margin:0;border-radius:0;border:none;box-shadow:none;background:#fff;overflow:hidden;position:relative";var s=document.querySelector(".scroll-area");if(s){s.style.height="100vh";s.style.paddingTop="env(safe-area-inset-top,24px)";}})();</script>
</body>
</html>
