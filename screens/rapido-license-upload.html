<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Upload License · Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #1a1a1a; }
  .device { width: 390px; margin: 24px auto; background: #fff; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; display: flex; flex-direction: column; }
</style>
</head>
<body>
<div class="device bg-white">

  <!-- HEADER -->
  <div class="px-4 pt-7 pb-3 flex items-center justify-between flex-shrink-0">
    <a href="rapido-shop-photo.html" class="w-9 h-9 rounded-full border border-[#EDEDED] flex items-center justify-center">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <a href="https://wa.me/919999999999" class="flex items-center gap-1.5 border border-[#EDEDED] rounded-full px-3 py-1.5">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1C1C1C" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
      <span class="text-[12px] font-semibold text-[#1C1C1C]">Help</span>
    </a>
  </div>
  <div class="h-px bg-[#EDEDED] flex-shrink-0"></div>

  <!-- CONTENT — all visible without scroll -->
  <div class="flex-1 flex flex-col px-5 pt-4">

    <!-- Title -->
    <div class="text-[18px] font-bold text-[#1C1C1C] leading-snug">Upload Pesticide or<br>Fertilizer License</div>
    <div class="text-[11px] text-[#909090] mt-1">Clear photo of all pages</div>

    <!-- Reference images — actual license look -->
    <div class="flex gap-2.5 mt-4">
      <div class="flex-1 rounded-xl overflow-hidden border border-[#EDEDED]">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/84/Government_of_India_logo.svg/200px-Government_of_India_logo.svg.png" class="w-full h-[80px] object-cover bg-[#F8F8F8]" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
        <div class="w-full h-[80px] bg-gradient-to-br from-[#F0FDF5] to-[#DCFCE7] items-center justify-center hidden">
          <div class="text-center p-2">
            <div class="text-[8px] font-bold text-[#0E7A4E] uppercase">Form III</div>
            <div class="text-[7px] text-[#0E7A4E]/60">Pesticide</div>
          </div>
        </div>
        <div class="px-2 py-1.5 bg-[#F8F8F8]">
          <div class="text-[8px] font-semibold text-[#1C1C1C]">Pesticide License</div>
        </div>
      </div>
      <div class="flex-1 rounded-xl overflow-hidden border border-[#EDEDED]">
        <div class="w-full h-[80px] bg-gradient-to-br from-[#EBF5FF] to-[#DBEAFE] flex items-center justify-center">
          <div class="text-center p-2">
            <div class="w-6 h-6 mx-auto rounded bg-[#1565C0]/10 flex items-center justify-center mb-1">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1565C0" stroke-width="1.5"><path d="M12 2v20M8 6c0 2 2 4 4 4M16 6c0 2-2 4-4 4"/></svg>
            </div>
            <div class="text-[8px] font-bold text-[#1565C0] uppercase">Fertilizer</div>
            <div class="text-[7px] text-[#1565C0]/60">License</div>
          </div>
        </div>
        <div class="px-2 py-1.5 bg-[#F8F8F8]">
          <div class="text-[8px] font-semibold text-[#1C1C1C]">Fertilizer License</div>
        </div>
      </div>
    </div>

    <!-- Upload area — grows to fill space -->
    <div class="flex-1 flex flex-col mt-4">

      <!-- Uploaded thumbnails -->
      <div id="thumbRow" class="flex gap-2 flex-wrap"></div>

      <!-- Upload box -->
      <div id="uploadBox" class="flex-1 min-h-[120px] border-2 border-dashed border-[#D4D4D4] rounded-2xl flex flex-col items-center justify-center mt-2">
        <div class="w-11 h-11 rounded-full bg-[#F0FDF5] flex items-center justify-center mb-2">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>
        </div>
        <div class="flex gap-3">
          <button class="flex items-center gap-1.5 bg-[#0E7A4E] text-white px-4 py-2 rounded-lg text-[11px] font-semibold" onclick="addPage()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="12" cy="12" r="3"/><path d="M7 5l1.5-2h7L17 5"/></svg>
            Camera
          </button>
          <button class="flex items-center gap-1.5 border border-[#1C1C1C] text-[#1C1C1C] px-4 py-2 rounded-lg text-[11px] font-semibold" onclick="addPage()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1C1C1C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
            Gallery
          </button>
        </div>
        <div class="text-[9px] text-[#BDBDBD] mt-2">JPG, PNG or PDF</div>
      </div>
    </div>
  </div>

  <!-- STICKY CTA + Skip -->
  <div class="flex-shrink-0 bg-white px-5 py-3 border-t border-[#EDEDED]">
    <a href="rapido-aadhaar-upload.html" class="block bg-[#0E7A4E] text-white text-center py-3.5 rounded-xl text-[13px] font-bold uppercase tracking-wider">
      Continue
    </a>
    <a href="rapido-aadhaar-upload.html" class="block text-center mt-2 text-[10px] text-[#909090]">Skip for now</a>
  </div>

</div>

<script>
let pageCount = 0;

function addPage() {
  pageCount++;
  const row = document.getElementById('thumbRow');
  const thumb = document.createElement('div');
  thumb.className = 'relative';
  thumb.innerHTML = `
    <div class="w-16 h-20 rounded-xl border border-[#EDEDED] overflow-hidden bg-white shadow-sm relative">
      <div class="w-full h-full bg-gradient-to-b from-[#FAFAFA] to-[#F0F0F0] p-1">
        <div class="w-full h-full rounded bg-white border border-[#F0F0F0] p-1 flex flex-col">
          <div class="flex gap-0.5 mb-0.5"><div class="w-2 h-2 rounded bg-[#0E7A4E]/10"></div><div class="h-[1.5px] w-6 bg-[#E8E8E8] rounded mt-0.5"></div></div>
          <div class="h-[1.5px] w-full bg-[#E8E8E8] rounded mb-0.5"></div>
          <div class="h-[1.5px] w-3/4 bg-[#E8E8E8] rounded mb-0.5"></div>
          <div class="flex gap-0.5 mt-auto"><div class="w-3 h-4 bg-[#EDEDED] rounded"></div><div class="flex-1"><div class="h-[1.5px] w-full bg-[#E8E8E8] rounded mb-0.5"></div><div class="h-[1.5px] w-2/3 bg-[#E8E8E8] rounded"></div></div></div>
        </div>
      </div>
      <div class="absolute bottom-0 left-0 right-0 bg-black/50 text-center py-[2px]">
        <span class="text-[7px] font-semibold text-white">Page ${pageCount}</span>
      </div>
    </div>
    <button class="absolute -top-1.5 -right-1.5 w-[18px] h-[18px] rounded-full bg-[#1C1C1C] flex items-center justify-center shadow" onclick="this.parentElement.remove()">
      <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>`;
  row.appendChild(thumb);
}
</script>
<div class="text-center text-white/60 text-xs pb-6"><a href="rapido-shop-photo.html" class="underline">Prev</a> · <a href="rapido-aadhaar-upload.html" class="underline">Next</a> · <a href="../index.html" class="underline">All</a></div>
</body>
</html>
