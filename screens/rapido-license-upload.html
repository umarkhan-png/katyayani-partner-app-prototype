<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Upload License · Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #1a1a1a; }
  .device { width: 390px; margin: 24px auto; background: #fff; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; }
  .scroll-area { height: 100%; overflow-y: auto; }
  .scroll-area::-webkit-scrollbar { display: none; }
  .license-opt { transition: all .15s; cursor: pointer; }
  .license-opt.selected { border-color: #0E7A4E !important; background: #F0FDF5 !important; }
  .license-opt.selected .radio-ring { border-color: #0E7A4E; }
  .license-opt.selected .radio-fill { display: block; }
  .radio-ring { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #D4D4D4; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .radio-fill { width: 10px; height: 10px; border-radius: 50%; background: #0E7A4E; display: none; }
</style>
</head>
<body>
<div class="device bg-white">
<div class="scroll-area">

  <!-- HEADER -->
  <div class="px-4 pt-7 pb-3 flex items-center justify-between">
    <a href="rapido-otp.html" class="w-9 h-9 rounded-full border border-[#EDEDED] flex items-center justify-center">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <div class="flex items-center gap-2">
      <button class="w-9 h-9 rounded-full border border-[#EDEDED] flex items-center justify-center">
        <span class="text-[10px] font-bold text-[#1C1C1C]">अ/A</span>
      </button>
      <a href="https://wa.me/919999999999" class="flex items-center gap-1 border border-[#EDEDED] rounded-full px-3 py-1.5">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1C1C1C" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
        <span class="text-[11px] font-semibold">Help</span>
      </a>
    </div>
  </div>
  <div class="h-px bg-[#EDEDED]"></div>

  <!-- VIDEO GUIDE AREA -->
  <div id="videoGuideArea" class="relative bg-gradient-to-b from-[#041E14] to-[#083D28]" style="height: 300px;">
    <div class="absolute top-3 right-3 flex flex-col gap-2 z-10">
      <button class="w-9 h-9 rounded-full bg-black/40 backdrop-blur flex items-center justify-center">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg>
      </button>
      <button class="w-9 h-9 rounded-full bg-black/40 backdrop-blur flex items-center justify-center">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 015.64 5.64L1 10M3.51 15a9 9 0 0014.85 3.36L23 14"/></svg>
      </button>
    </div>

    <!-- Guide: person holding license illustration -->
    <div class="h-full flex flex-col items-center justify-center px-6">
      <div id="licenseIllustration" class="w-28 h-32 rounded-2xl bg-white/10 backdrop-blur border border-white/15 flex flex-col items-center justify-center p-3">
        <div class="w-full bg-white/90 rounded-lg p-2">
          <div class="h-1.5 w-10 bg-[#0E7A4E]/30 rounded mb-1"></div>
          <div class="flex gap-1"><div class="w-5 h-6 bg-[#EDEDED] rounded"></div><div class="flex-1"><div class="h-1 w-full bg-[#EDEDED] rounded mb-0.5"></div><div class="h-1 w-3/4 bg-[#EDEDED] rounded"></div></div></div>
          <div class="mt-1 h-1 w-14 bg-[#0E7A4E]/20 rounded mx-auto"></div>
        </div>
        <div class="text-white/60 text-[8px] font-medium mt-1.5 text-center">Hold license like this</div>
      </div>
      <div id="titleText" class="text-white/90 text-[13px] font-semibold text-center mt-5">Upload Business License</div>
      <div class="text-white/50 text-[10px] mt-1">P1 · Mandatory · At least one required</div>
    </div>
  </div>

  <!-- BOTTOM SHEET — License type selection + upload actions -->
  <div id="bottomSheet" class="bg-white rounded-t-[28px] -mt-5 relative z-10 px-5 pt-5 pb-4">

    <!-- SELECT LICENSE TYPE — Radio selection with CTA -->
    <div class="text-[12px] font-bold text-[#1C1C1C] mb-2">Which license do you have?</div>

    <div id="radioGroup" class="space-y-2 mb-4">
      <button class="license-opt selected w-full border-2 border-[#EDEDED] rounded-xl p-3 flex items-center gap-3 text-left" onclick="selectLic(this)">
        <div class="radio-ring"><div class="radio-fill" style="display:block"></div></div>
        <div class="flex-1">
          <div class="text-[13px] font-semibold text-[#1C1C1C]">Pesticide License</div>
          <div class="text-[10px] text-[#606060]">Form III or Form IV</div>
        </div>
      </button>
      <button class="license-opt w-full border-2 border-[#EDEDED] rounded-xl p-3 flex items-center gap-3 text-left" onclick="selectLic(this)">
        <div class="radio-ring"><div class="radio-fill"></div></div>
        <div class="flex-1">
          <div class="text-[13px] font-semibold text-[#1C1C1C]">Fertilizer License</div>
          <div class="text-[10px] text-[#606060]">State fertilizer department</div>
        </div>
      </button>
    </div>

    <!-- Upload actions — take photo + upload -->
    <a id="ctaPrimary" href="rapido-camera.html" class="flex items-center justify-center gap-2 w-full bg-gradient-to-r from-[#041E14] to-[#083D28] text-white py-3.5 rounded-xl text-[13px] font-bold uppercase tracking-wider mb-2">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="12" cy="12" r="3"/><path d="M7 5l1.5-2h7L17 5"/></svg>
      Take Photo
    </a>
    <button id="ctaSecondary" class="flex items-center justify-center gap-2 w-full border-2 border-[#1C1C1C] text-[#1C1C1C] py-3 rounded-xl text-[12px] font-semibold">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1C1C1C" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
      Upload from phone
    </button>

    <!-- Skip -->
    <div class="mt-3 text-center">
      <a id="skipLink" href="rapido-aadhaar-upload.html" class="text-[11px] font-semibold text-[#0E7A4E] underline">I don't have either — skip for now</a>
    </div>
  </div>

</div>
</div>

<script>
function selectLic(el) {
  document.querySelectorAll('.license-opt').forEach(c => { c.classList.remove('selected'); c.querySelector('.radio-fill').style.display='none'; c.querySelector('.radio-ring').style.borderColor='#D4D4D4'; });
  el.classList.add('selected'); el.querySelector('.radio-fill').style.display='block'; el.querySelector('.radio-ring').style.borderColor='#0E7A4E';
}
</script>
<div class="text-center text-white/60 text-xs pb-6"><a href="rapido-otp.html" class="underline">Prev</a> · <a href="rapido-aadhaar-upload.html" class="underline">Next</a> · <a href="../index.html" class="underline">All</a></div>

<!-- DESIGN CUSTOMIZER -->
<button id="custToggle" onclick="document.getElementById('custPanel').classList.toggle('hidden')" style="position:fixed;bottom:24px;right:24px;width:48px;height:48px;border-radius:50%;background:#0E7A4E;color:#fff;border:none;cursor:pointer;z-index:9999;font-size:20px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.3);">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 15.5A3.5 3.5 0 1012 8.5a3.5 3.5 0 000 7z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
</button>

<div id="custPanel" class="hidden" style="position:fixed;bottom:80px;right:24px;width:320px;max-height:70vh;overflow-y:auto;background:#111;border-radius:16px;padding:16px;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.5);color:#fff;font-family:Poppins,sans-serif;font-size:12px;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <span style="font-weight:700;font-size:14px;">Design Customizer</span>
    <button onclick="document.getElementById('custPanel').classList.add('hidden')" style="background:none;border:none;color:#fff;font-size:18px;cursor:pointer;">✕</button>
  </div>

  <!-- Video Guide Area -->
  <div style="color:#8BC9A5;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;margin:12px 0 6px;">Video Guide Area</div>
  <label style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">Height <span class="cv" id="cv_videoH">300</span>px<input type="range" min="180" max="420" value="300" data-key="videoH" style="width:120px;accent-color:#0E7A4E;" oninput="custUpdate(this)"></label>

  <!-- License Illustration -->
  <div style="color:#8BC9A5;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;margin:12px 0 6px;">License Illustration</div>
  <label style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">Width <span class="cv" id="cv_illusW">112</span>px<input type="range" min="64" max="180" value="112" data-key="illusW" style="width:120px;accent-color:#0E7A4E;" oninput="custUpdate(this)"></label>
  <label style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">Height <span class="cv" id="cv_illusH">128</span>px<input type="range" min="80" max="200" value="128" data-key="illusH" style="width:120px;accent-color:#0E7A4E;" oninput="custUpdate(this)"></label>
  <label style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">Border Radius <span class="cv" id="cv_illusBR">16</span>px<input type="range" min="0" max="40" value="16" data-key="illusBR" style="width:120px;accent-color:#0E7A4E;" oninput="custUpdate(this)"></label>

  <!-- Title Text -->
  <div style="color:#8BC9A5;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;margin:12px 0 6px;">Title Text</div>
  <label style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">Font Size <span class="cv" id="cv_titleFS">13</span>px<input type="range" min="10" max="22" value="13" data-key="titleFS" style="width:120px;accent-color:#0E7A4E;" oninput="custUpdate(this)"></label>

  <!-- Bottom Sheet -->
  <div style="color:#8BC9A5;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;margin:12px 0 6px;">Bottom Sheet</div>
  <label style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">Border Radius <span class="cv" id="cv_sheetBR">28</span>px<input type="range" min="0" max="48" value="28" data-key="sheetBR" style="width:120px;accent-color:#0E7A4E;" oninput="custUpdate(this)"></label>
  <label style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">Padding Top <span class="cv" id="cv_sheetPT">20</span>px<input type="range" min="8" max="40" value="20" data-key="sheetPT" style="width:120px;accent-color:#0E7A4E;" oninput="custUpdate(this)"></label>
  <label style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">Padding Horizontal <span class="cv" id="cv_sheetPX">20</span>px<input type="range" min="8" max="40" value="20" data-key="sheetPX" style="width:120px;accent-color:#0E7A4E;" oninput="custUpdate(this)"></label>

  <!-- Radio Options -->
  <div style="color:#8BC9A5;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;margin:12px 0 6px;">Radio Options</div>
  <label style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">Padding <span class="cv" id="cv_radioP">12</span>px<input type="range" min="6" max="24" value="12" data-key="radioP" style="width:120px;accent-color:#0E7A4E;" oninput="custUpdate(this)"></label>
  <label style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">Border Radius <span class="cv" id="cv_radioBR">12</span>px<input type="range" min="0" max="28" value="12" data-key="radioBR" style="width:120px;accent-color:#0E7A4E;" oninput="custUpdate(this)"></label>
  <label style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">Gap <span class="cv" id="cv_radioGap">8</span>px<input type="range" min="2" max="20" value="8" data-key="radioGap" style="width:120px;accent-color:#0E7A4E;" oninput="custUpdate(this)"></label>

  <!-- CTA Buttons -->
  <div style="color:#8BC9A5;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;margin:12px 0 6px;">CTA Buttons</div>
  <label style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">Padding Y <span class="cv" id="cv_ctaPY">14</span>px<input type="range" min="6" max="24" value="14" data-key="ctaPY" style="width:120px;accent-color:#0E7A4E;" oninput="custUpdate(this)"></label>
  <label style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">Border Radius <span class="cv" id="cv_ctaBR">12</span>px<input type="range" min="0" max="28" value="12" data-key="ctaBR" style="width:120px;accent-color:#0E7A4E;" oninput="custUpdate(this)"></label>
  <label style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">Font Size <span class="cv" id="cv_ctaFS">13</span>px<input type="range" min="10" max="20" value="13" data-key="ctaFS" style="width:120px;accent-color:#0E7A4E;" oninput="custUpdate(this)"></label>

  <!-- Skip Link -->
  <div style="color:#8BC9A5;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;margin:12px 0 6px;">Skip Link</div>
  <label style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">Font Size <span class="cv" id="cv_skipFS">11</span>px<input type="range" min="8" max="18" value="11" data-key="skipFS" style="width:120px;accent-color:#0E7A4E;" oninput="custUpdate(this)"></label>

  <!-- Copy button -->
  <button onclick="copyVals()" style="width:100%;margin-top:14px;padding:10px;background:#0E7A4E;color:#fff;border:none;border-radius:10px;font-weight:600;font-size:12px;cursor:pointer;">Copy Final Values</button>
  <div id="copyMsg" style="text-align:center;color:#8BC9A5;font-size:10px;margin-top:4px;opacity:0;transition:opacity .3s;"></div>
</div>

<script>
(function(){
  const STORAGE_KEY = 'licenseUploadCustom';
  const defaults = {
    videoH:300, illusW:112, illusH:128, illusBR:16, titleFS:13,
    sheetBR:28, sheetPT:20, sheetPX:20,
    radioP:12, radioBR:12, radioGap:8,
    ctaPY:14, ctaBR:12, ctaFS:13, skipFS:11
  };

  let vals = Object.assign({}, defaults);
  try { const s = localStorage.getItem(STORAGE_KEY); if(s) Object.assign(vals, JSON.parse(s)); } catch(e){}

  // Sync sliders to saved values on load
  document.querySelectorAll('#custPanel input[type=range]').forEach(sl => {
    const k = sl.dataset.key;
    if(vals[k] !== undefined) { sl.value = vals[k]; }
    const cv = document.getElementById('cv_' + k);
    if(cv) cv.textContent = sl.value;
  });

  applyAll();

  window.custUpdate = function(sl) {
    const k = sl.dataset.key;
    vals[k] = parseInt(sl.value);
    const cv = document.getElementById('cv_' + k);
    if(cv) cv.textContent = sl.value;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(vals));
    applyAll();
  };

  function applyAll() {
    const v = vals;
    // Video guide area
    const videoEl = document.getElementById('videoGuideArea');
    if(videoEl) videoEl.style.height = v.videoH + 'px';

    // License illustration
    const illus = document.getElementById('licenseIllustration');
    if(illus) { illus.style.width = v.illusW + 'px'; illus.style.height = v.illusH + 'px'; illus.style.borderRadius = v.illusBR + 'px'; }

    // Title text
    const title = document.getElementById('titleText');
    if(title) title.style.fontSize = v.titleFS + 'px';

    // Bottom sheet
    const sheet = document.getElementById('bottomSheet');
    if(sheet) { sheet.style.borderRadius = v.sheetBR + 'px ' + v.sheetBR + 'px 0 0'; sheet.style.paddingTop = v.sheetPT + 'px'; sheet.style.paddingLeft = v.sheetPX + 'px'; sheet.style.paddingRight = v.sheetPX + 'px'; }

    // Radio options
    const radioGroup = document.getElementById('radioGroup');
    if(radioGroup) { radioGroup.style.gap = v.radioGap + 'px'; radioGroup.style.display = 'flex'; radioGroup.style.flexDirection = 'column'; }
    document.querySelectorAll('.license-opt').forEach(opt => { opt.style.padding = v.radioP + 'px'; opt.style.borderRadius = v.radioBR + 'px'; });

    // CTA buttons
    const ctaP = document.getElementById('ctaPrimary');
    const ctaS = document.getElementById('ctaSecondary');
    [ctaP, ctaS].forEach(btn => { if(btn) { btn.style.paddingTop = v.ctaPY + 'px'; btn.style.paddingBottom = v.ctaPY + 'px'; btn.style.borderRadius = v.ctaBR + 'px'; btn.style.fontSize = v.ctaFS + 'px'; }});

    // Skip link
    const skip = document.getElementById('skipLink');
    if(skip) skip.style.fontSize = v.skipFS + 'px';
  }

  window.copyVals = function() {
    const lines = Object.entries(vals).map(([k,v]) => k + ': ' + v + 'px').join('\n');
    navigator.clipboard.writeText(lines).then(() => {
      const msg = document.getElementById('copyMsg');
      msg.textContent = 'Copied!'; msg.style.opacity = '1';
      setTimeout(() => { msg.style.opacity = '0'; }, 1500);
    });
  };
})();
</script>

</body>
</html>
