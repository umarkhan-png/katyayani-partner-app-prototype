<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Upload License · Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #1a1a1a; }
  .device { width: 390px; margin: 24px auto; background: #fff; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; }
  .scroll-area { height: 100%; overflow-y: auto; padding-bottom: 80px; }
  .scroll-area::-webkit-scrollbar { display: none; }
  .lic-card { transition: all .15s; cursor: pointer; }
  .lic-card.selected { border-color: #0E7A4E !important; background: #F0FDF5 !important; }
  .lic-card.selected .lic-name { color: #0E7A4E; }
  .lic-card.selected .lic-check { display: flex; }
  .lic-card .lic-check { display: none; }
  .thumb { position: relative; }
  .thumb-remove { position: absolute; top: -6px; right: -6px; width: 18px; height: 18px; border-radius: 50%; background: #E23744; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,.2); }
  /* Help tooltip */
  .help-tooltip { position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%); background: #1C1C1C; color: #fff; padding: 10px 14px; border-radius: 12px; font-size: 11px; line-height: 1.5; width: 220px; z-index: 50; box-shadow: 0 8px 24px rgba(0,0,0,.3); }
  .help-tooltip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 6px solid transparent; border-top-color: #1C1C1C; }
</style>
</head>
<body>
<div class="device bg-white">
<div class="scroll-area">

  <!-- HEADER -->
  <div class="px-4 pt-7 pb-3 flex items-center justify-between">
    <a href="rapido-shop-photo.html" class="w-9 h-9 rounded-full border border-[#EDEDED] flex items-center justify-center">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <a href="https://wa.me/919999999999" class="flex items-center gap-1.5 border border-[#EDEDED] rounded-full px-3 py-1.5">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1C1C1C" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
      <span class="text-[12px] font-semibold text-[#1C1C1C]">Help</span>
    </a>
  </div>
  <div class="h-px bg-[#EDEDED]"></div>

  <!-- VIDEO GUIDE AREA -->
  <div class="relative bg-gradient-to-b from-[#041E14] to-[#083D28]" style="height: 220px;">
    <div class="absolute top-3 right-3 flex flex-col gap-2 z-10">
      <button class="w-9 h-9 rounded-full bg-black/40 backdrop-blur flex items-center justify-center">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg>
      </button>
      <button class="w-9 h-9 rounded-full bg-black/40 backdrop-blur flex items-center justify-center">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 015.64 5.64L1 10M3.51 15a9 9 0 0014.85 3.36L23 14"/></svg>
      </button>
      <button class="w-9 h-9 rounded-full bg-black/40 backdrop-blur flex items-center justify-center">
        <span class="text-[10px] font-bold text-white">अ/A</span>
      </button>
    </div>

    <div class="h-full flex flex-col items-center justify-center px-6">
      <div class="w-24 h-28 rounded-2xl bg-white/10 backdrop-blur border border-white/15 flex flex-col items-center justify-center p-2.5">
        <div class="w-full bg-white/90 rounded-lg p-1.5">
          <div class="h-1 w-8 bg-[#0E7A4E]/30 rounded mb-1"></div>
          <div class="flex gap-1"><div class="w-4 h-5 bg-[#EDEDED] rounded"></div><div class="flex-1"><div class="h-1 w-full bg-[#EDEDED] rounded mb-0.5"></div><div class="h-1 w-3/4 bg-[#EDEDED] rounded"></div></div></div>
        </div>
        <div class="text-white/50 text-[7px] font-medium mt-1 text-center">Hold license like this</div>
      </div>
      <div class="text-white text-[15px] font-semibold text-center mt-3">Upload Business License</div>
      <div class="text-white/40 text-[10px] mt-1">At least one license required</div>
    </div>
  </div>

  <!-- BOTTOM SHEET -->
  <div class="bg-white rounded-t-[24px] -mt-4 relative z-10 px-5 pt-5 pb-4">

    <!-- License type heading + help -->
    <div class="flex items-center gap-2 mb-3">
      <div class="text-[13px] font-bold text-[#1C1C1C]">Select license type</div>
      <button class="relative w-5 h-5 rounded-full border border-[#D4D4D4] flex items-center justify-center" onclick="toggleHelp()">
        <span class="text-[10px] font-bold text-[#909090]">?</span>
        <div id="helpTip" class="help-tooltip hidden">
          <div class="font-semibold text-[12px] mb-1">Which license to upload?</div>
          <div class="text-white/70 text-[10px] leading-relaxed">
            <b>Pesticide License</b> — Form III (retail) or Form IV (wholesale) issued by state agriculture dept.<br><br>
            <b>Fertilizer License</b> — Issued by state fertilizer department for selling fertilizers.
          </div>
        </div>
      </button>
    </div>

    <!-- 1x2 grid — no icons, clean text cards -->
    <div class="grid grid-cols-2 gap-2.5 mb-5">
      <button class="lic-card border-2 border-[#EDEDED] rounded-xl px-3 py-3.5 text-left relative" onclick="selectLic(this)">
        <div class="lic-name text-[13px] font-semibold text-[#1C1C1C]">Pesticide</div>
        <div class="text-[9px] text-[#909090] mt-0.5">Form III / IV</div>
        <div class="lic-check absolute top-2.5 right-2.5 w-5 h-5 rounded-full bg-[#0E7A4E] items-center justify-center">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="white" stroke-width="3" stroke-linecap="round"/></svg>
        </div>
      </button>
      <button class="lic-card border-2 border-[#EDEDED] rounded-xl px-3 py-3.5 text-left relative" onclick="selectLic(this)">
        <div class="lic-name text-[13px] font-semibold text-[#1C1C1C]">Fertilizer</div>
        <div class="text-[9px] text-[#909090] mt-0.5">State dept.</div>
        <div class="lic-check absolute top-2.5 right-2.5 w-5 h-5 rounded-full bg-[#0E7A4E] items-center justify-center">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="white" stroke-width="3" stroke-linecap="round"/></svg>
        </div>
      </button>
    </div>

    <!-- Upload section — hidden until license selected -->
    <div id="uploadSection" class="hidden">
      <div class="text-[13px] font-bold text-[#1C1C1C] mb-2">Upload license pages</div>
      <div class="text-[10px] text-[#909090] mb-3">You can upload multiple pages</div>

      <!-- Thumbnail row + add more -->
      <div id="thumbRow" class="flex gap-2 flex-wrap mb-3">
        <!-- Thumbnails injected here by JS -->
      </div>

      <!-- Upload actions -->
      <div id="uploadActions" class="flex gap-2">
        <a href="rapido-camera.html" class="flex-1 flex items-center justify-center gap-1.5 border-2 border-[#EDEDED] py-3 rounded-xl text-[11px] font-semibold text-[#1C1C1C]">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1C1C1C" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="12" cy="12" r="3"/><path d="M7 5l1.5-2h7L17 5"/></svg>
          Camera
        </a>
        <button class="flex-1 flex items-center justify-center gap-1.5 border-2 border-[#EDEDED] py-3 rounded-xl text-[11px] font-semibold text-[#1C1C1C]" onclick="addPage()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1C1C1C" stroke-width="1.8"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
          Upload
        </button>
      </div>
    </div>

    <!-- Skip -->
    <div class="mt-5 text-center">
      <a href="rapido-aadhaar-upload.html" class="text-[11px] text-[#0E7A4E] font-semibold">Skip for now</a>
    </div>
  </div>

</div>

<!-- STICKY CTA -->
<div class="absolute bottom-0 left-0 right-0 bg-white px-5 py-3 border-t border-[#EDEDED]">
  <a href="rapido-aadhaar-upload.html" class="block bg-[#0E7A4E] text-white text-center py-3.5 rounded-xl text-[13px] font-bold uppercase tracking-wider">
    Continue
  </a>
</div>
</div>

<script>
let pageCount = 0;

function toggleHelp() {
  document.getElementById('helpTip').classList.toggle('hidden');
}
// Close help on outside click
document.addEventListener('click', function(e) {
  if (!e.target.closest('[onclick="toggleHelp()"]')) {
    document.getElementById('helpTip').classList.add('hidden');
  }
});

function selectLic(el) {
  document.querySelectorAll('.lic-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('uploadSection').classList.remove('hidden');
}

function addPage() {
  pageCount++;
  const thumb = document.createElement('div');
  thumb.className = 'thumb';
  thumb.innerHTML = `
    <div class="w-16 h-20 rounded-lg bg-[#F0FDF5] border border-[#0E7A4E]/20 flex flex-col items-center justify-center relative overflow-hidden">
      <div class="w-full h-full bg-gradient-to-b from-[#0E7A4E]/5 to-[#0E7A4E]/10 flex flex-col items-center justify-center">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>
        <div class="text-[7px] font-semibold text-[#0E7A4E] mt-1">Page ${pageCount}</div>
      </div>
      <div class="thumb-remove" onclick="this.closest('.thumb').remove()">
        <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </div>
    </div>`;
  document.getElementById('thumbRow').appendChild(thumb);
}
</script>
<div class="text-center text-white/60 text-xs pb-6"><a href="rapido-shop-photo.html" class="underline">Prev</a> · <a href="rapido-aadhaar-upload.html" class="underline">Next</a> · <a href="../index.html" class="underline">All</a></div>
</body>
</html>
