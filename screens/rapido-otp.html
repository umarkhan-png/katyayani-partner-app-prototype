<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OTP · Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #1a1a1a; }
  .device { width: 390px; margin: 24px auto; background: #fff; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; }
  .scroll-area { height: 100%; overflow-y: auto; }
  .scroll-area::-webkit-scrollbar { display: none; }
  .otp-box { width: 44px; height: 52px; border: 2px solid #EDEDED; border-radius: 12px; text-align: center; font-size: 20px; font-weight: 700; color: #1C1C1C; outline: none; font-family: 'Poppins', sans-serif; }
  .otp-box:focus { border-color: #0E7A4E; box-shadow: 0 0 0 3px rgba(14,122,78,0.12); }
  .resend-btn { opacity: 0.4; pointer-events: none; }
  .resend-btn.active { opacity: 1; pointer-events: auto; }
</style>
</head>
<body>
<div class="device bg-white">
<div class="scroll-area">

  <div class="px-4 pt-7 pb-3 flex items-center justify-between">
    <a href="rapido-phone.html" class="w-9 h-9 rounded-full border border-[#EDEDED] flex items-center justify-center">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <a href="https://wa.me/919999999999" class="flex items-center gap-1.5 border border-[#EDEDED] rounded-full px-3 py-1.5">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1C1C1C" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
      <span class="text-[12px] font-semibold">Help</span>
    </a>
  </div>
  <div class="h-px bg-[#F0F0F0]"></div>

  <div id="contentArea" class="px-6 pt-6">
    <div id="iconCircle" class="w-20 h-20 rounded-full bg-gradient-to-r from-[#041E14] to-[#083D28] flex items-center justify-center mb-4">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="3"/><path d="M9 8h1M9 11h1M9 14h1"/></svg>
    </div>

    <div id="titleText" class="text-[22px] font-bold text-[#1C1C1C]">Enter OTP</div>
    <div class="text-[12px] text-[#606060] mt-1">Sent to +91 99816 36717 · <a href="rapido-phone.html" class="text-[#0E7A4E] font-semibold">Change</a></div>

    <!-- 6 OTP boxes -->
    <div id="otpGrid" class="mt-6 flex gap-2.5 justify-between">
      <input type="tel" maxlength="1" class="otp-box" autofocus/>
      <input type="tel" maxlength="1" class="otp-box"/>
      <input type="tel" maxlength="1" class="otp-box"/>
      <input type="tel" maxlength="1" class="otp-box"/>
      <input type="tel" maxlength="1" class="otp-box"/>
      <input type="tel" maxlength="1" class="otp-box"/>
    </div>

    <!-- RESEND SECTION — Timer + resend LINKED -->
    <div id="resendBox" class="mt-6 bg-[#F8F8F8] rounded-xl p-3">
      <div class="flex items-center justify-between mb-2.5">
        <span class="text-[11px] text-[#606060] font-medium">Didn't receive OTP?</span>
        <span class="text-[13px] font-bold text-[#1C1C1C]" id="timer">00:28</span>
      </div>
      <div class="text-[9px] text-[#9E9E9E] mb-2" id="resendHint">Resend options will be available after timer ends</div>
      <div class="flex gap-2" id="resendButtons">
        <button class="resend-btn flex-1 flex items-center justify-center gap-1.5 border border-[#EDEDED] rounded-xl py-2.5 text-[11px] font-semibold text-[#1C1C1C] bg-white">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          SMS
        </button>
        <button class="resend-btn flex-1 flex items-center justify-center gap-1.5 border border-[#EDEDED] rounded-xl py-2.5 text-[11px] font-semibold text-[#25D366] bg-white">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#25D366" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
          WhatsApp
        </button>
        <button class="resend-btn flex-1 flex items-center justify-center gap-1.5 border border-[#EDEDED] rounded-xl py-2.5 text-[11px] font-semibold text-[#1C1C1C] bg-white">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.11 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
          Call
        </button>
      </div>
    </div>
  </div>

</div>
</div>

<script>
// OTP auto-focus
document.querySelectorAll('.otp-box').forEach((box, i, boxes) => {
  box.addEventListener('input', function() {
    if (this.value && i < boxes.length - 1) boxes[i+1].focus();
    if (Array.from(boxes).every(b => b.value)) setTimeout(() => window.location.href='rapido-license-upload.html', 600);
  });
  box.addEventListener('keydown', function(e) { if (e.key === 'Backspace' && !this.value && i > 0) boxes[i-1].focus(); });
});

// Timer + resend linked
let sec = 28;
const timerEl = document.getElementById('timer');
const hint = document.getElementById('resendHint');
const btns = document.querySelectorAll('.resend-btn');
const iv = setInterval(() => {
  sec--;
  if (sec <= 0) {
    clearInterval(iv);
    timerEl.textContent = '00:00';
    timerEl.style.color = '#E23744';
    hint.textContent = 'Choose how to resend OTP';
    hint.style.color = '#1C1C1C';
    btns.forEach(b => b.classList.add('active'));
    return;
  }
  timerEl.textContent = '00:' + String(sec).padStart(2, '0');
}, 1000);
</script>
<div class="text-center text-white/60 text-xs pb-6"><a href="rapido-phone.html" class="underline">Prev</a> · <a href="rapido-license-upload.html" class="underline">Next</a> · <a href="../index.html" class="underline">All</a></div>

<!-- Design Customizer -->
<button id="custToggle" onclick="document.getElementById('custPanel').style.display=document.getElementById('custPanel').style.display==='none'?'flex':'none'" style="position:fixed;bottom:24px;right:24px;z-index:9999;width:48px;height:48px;border-radius:50%;background:#0E7A4E;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center">
  <svg width="22" height="22" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.32 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
</button>

<div id="custPanel" style="display:none;position:fixed;bottom:80px;right:24px;z-index:9999;width:320px;max-height:70vh;overflow-y:auto;background:#111;border-radius:16px;padding:16px;flex-direction:column;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,.5);color:#fff;font-size:12px;font-family:'Poppins',sans-serif">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
    <span style="font-weight:700;font-size:14px">OTP Customizer</span>
    <button onclick="document.getElementById('custPanel').style.display='none'" style="background:none;border:none;color:#888;font-size:18px;cursor:pointer">✕</button>
  </div>

  <!-- Icon Circle -->
  <div style="color:#8BC9A5;font-weight:600;margin-top:4px">Icon Circle</div>
  <label style="display:flex;justify-content:space-between;align-items:center">Size <span id="v_iconSize">80</span>px<input type="range" min="40" max="120" value="80" id="s_iconSize" style="width:120px;accent-color:#0E7A4E"></label>
  <label style="display:flex;justify-content:space-between;align-items:center">Bottom gap <span id="v_iconGap">16</span>px<input type="range" min="0" max="40" value="16" id="s_iconGap" style="width:120px;accent-color:#0E7A4E"></label>

  <!-- Title -->
  <div style="color:#8BC9A5;font-weight:600;margin-top:4px">Title</div>
  <label style="display:flex;justify-content:space-between;align-items:center">Font size <span id="v_titleSize">22</span>px<input type="range" min="14" max="36" value="22" id="s_titleSize" style="width:120px;accent-color:#0E7A4E"></label>

  <!-- OTP Boxes -->
  <div style="color:#8BC9A5;font-weight:600;margin-top:4px">OTP Boxes</div>
  <label style="display:flex;justify-content:space-between;align-items:center">Width <span id="v_otpW">44</span>px<input type="range" min="30" max="64" value="44" id="s_otpW" style="width:120px;accent-color:#0E7A4E"></label>
  <label style="display:flex;justify-content:space-between;align-items:center">Height <span id="v_otpH">52</span>px<input type="range" min="36" max="72" value="52" id="s_otpH" style="width:120px;accent-color:#0E7A4E"></label>
  <label style="display:flex;justify-content:space-between;align-items:center">Gap <span id="v_otpGap">10</span>px<input type="range" min="4" max="24" value="10" id="s_otpGap" style="width:120px;accent-color:#0E7A4E"></label>
  <label style="display:flex;justify-content:space-between;align-items:center">Border radius <span id="v_otpRad">12</span>px<input type="range" min="0" max="24" value="12" id="s_otpRad" style="width:120px;accent-color:#0E7A4E"></label>
  <label style="display:flex;justify-content:space-between;align-items:center">Font size <span id="v_otpFont">20</span>px<input type="range" min="14" max="32" value="20" id="s_otpFont" style="width:120px;accent-color:#0E7A4E"></label>

  <!-- Resend Section -->
  <div style="color:#8BC9A5;font-weight:600;margin-top:4px">Resend Section</div>
  <label style="display:flex;justify-content:space-between;align-items:center">Top gap <span id="v_resendGap">24</span>px<input type="range" min="8" max="48" value="24" id="s_resendGap" style="width:120px;accent-color:#0E7A4E"></label>
  <label style="display:flex;justify-content:space-between;align-items:center">Border radius <span id="v_resendRad">12</span>px<input type="range" min="0" max="24" value="12" id="s_resendRad" style="width:120px;accent-color:#0E7A4E"></label>
  <label style="display:flex;justify-content:space-between;align-items:center">Padding <span id="v_resendPad">12</span>px<input type="range" min="4" max="32" value="12" id="s_resendPad" style="width:120px;accent-color:#0E7A4E"></label>

  <!-- Content Area -->
  <div style="color:#8BC9A5;font-weight:600;margin-top:4px">Content Area</div>
  <label style="display:flex;justify-content:space-between;align-items:center">Side padding <span id="v_sidePad">24</span>px<input type="range" min="8" max="48" value="24" id="s_sidePad" style="width:120px;accent-color:#0E7A4E"></label>
  <label style="display:flex;justify-content:space-between;align-items:center">Top padding <span id="v_topPad">24</span>px<input type="range" min="8" max="48" value="24" id="s_topPad" style="width:120px;accent-color:#0E7A4E"></label>

  <button onclick="copyVals()" style="margin-top:8px;width:100%;padding:10px;background:#0E7A4E;color:#fff;border:none;border-radius:10px;font-weight:600;font-size:12px;cursor:pointer">Copy Final Values</button>
</div>

<script>
(function(){
  const KEY = 'otpCustom';
  const els = {
    iconCircle: document.getElementById('iconCircle'),
    titleText: document.getElementById('titleText'),
    otpGrid: document.getElementById('otpGrid'),
    resendBox: document.getElementById('resendBox'),
    contentArea: document.getElementById('contentArea'),
  };
  const boxes = () => document.querySelectorAll('.otp-box');

  const defaults = {
    iconSize:80, iconGap:16,
    titleSize:22,
    otpW:44, otpH:52, otpGap:10, otpRad:12, otpFont:20,
    resendGap:24, resendRad:12, resendPad:12,
    sidePad:24, topPad:24
  };

  function apply(v){
    els.iconCircle.style.width = v.iconSize+'px';
    els.iconCircle.style.height = v.iconSize+'px';
    els.iconCircle.style.marginBottom = v.iconGap+'px';

    els.titleText.style.fontSize = v.titleSize+'px';

    els.otpGrid.style.gap = v.otpGap+'px';
    boxes().forEach(b => {
      b.style.width = v.otpW+'px';
      b.style.height = v.otpH+'px';
      b.style.borderRadius = v.otpRad+'px';
      b.style.fontSize = v.otpFont+'px';
    });

    els.resendBox.style.marginTop = v.resendGap+'px';
    els.resendBox.style.borderRadius = v.resendRad+'px';
    els.resendBox.style.padding = v.resendPad+'px';

    els.contentArea.style.paddingLeft = v.sidePad+'px';
    els.contentArea.style.paddingRight = v.sidePad+'px';
    els.contentArea.style.paddingTop = v.topPad+'px';
  }

  let saved = {};
  try { saved = JSON.parse(localStorage.getItem(KEY)) || {}; } catch(e){}
  const vals = Object.assign({}, defaults, saved);

  // Set slider values and labels
  Object.keys(defaults).forEach(k => {
    const slider = document.getElementById('s_'+k);
    const label = document.getElementById('v_'+k);
    if(slider){ slider.value = vals[k]; }
    if(label){ label.textContent = vals[k]; }
    if(slider){
      slider.addEventListener('input', function(){
        vals[k] = parseInt(this.value);
        document.getElementById('v_'+k).textContent = this.value;
        apply(vals);
        localStorage.setItem(KEY, JSON.stringify(vals));
      });
    }
  });

  apply(vals);

  window.copyVals = function(){
    const lines = Object.keys(vals).map(k => k+': '+vals[k]+'px').join('\n');
    navigator.clipboard.writeText(lines).then(() => {
      const btn = document.querySelector('#custPanel button:last-child');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy Final Values', 1500);
    });
  };
})();
</script>
</body>
</html>
