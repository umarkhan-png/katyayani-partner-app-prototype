<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OTP · Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #1a1a1a; }
  .device { width: 390px; margin: 24px auto; background: #fff; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; }
  .scroll-area { height: 100%; overflow-y: auto; }
  .scroll-area::-webkit-scrollbar { display: none; }
  .otp-box { width: 44px; height: 52px; border: 2px solid #EDEDED; border-radius: 12px; text-align: center; font-size: 20px; font-weight: 700; color: #1C1C1C; outline: none; font-family: 'Poppins', sans-serif; }
  .otp-box:focus { border-color: #0E7A4E; box-shadow: 0 0 0 3px rgba(14,122,78,0.12); }
  .otp-box:first-child { border-color: #1C1C1C; }
</style>
</head>
<body>
<div class="device bg-white">
<div class="scroll-area">

  <!-- HEADER -->
  <div class="px-4 pt-7 pb-3 flex items-center justify-between">
    <a href="rapido-phone.html" class="p-1">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M5 12l6-6M5 12l6 6" stroke="#1C1C1C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <button class="flex items-center gap-1.5 border border-[#EDEDED] rounded-full px-3 py-1.5">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1C1C1C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
      <span class="text-[12px] font-semibold text-[#1C1C1C]">Help</span>
    </button>
  </div>
  <div class="h-px bg-[#F0F0F0]"></div>

  <!-- BODY -->
  <div class="px-6 pt-8">
    <!-- Circular illustration -->
    <div class="w-20 h-20 rounded-full bg-[#FFF8E6] border-4 border-[#FFFBEB] flex items-center justify-center mb-5">
      <div class="text-[32px]">🔐</div>
    </div>

    <!-- Heading with timer — Rapido style -->
    <div class="flex items-center justify-between">
      <div class="text-[22px] font-bold text-[#1C1C1C]">Enter OTP</div>
      <div class="text-[16px] font-semibold text-[#606060]" id="timer">00:28</div>
    </div>

    <!-- 6 OTP boxes — Rapido exact pattern -->
    <div class="mt-6 flex gap-2.5 justify-between">
      <input type="tel" maxlength="1" class="otp-box" autofocus/>
      <input type="tel" maxlength="1" class="otp-box"/>
      <input type="tel" maxlength="1" class="otp-box"/>
      <input type="tel" maxlength="1" class="otp-box"/>
      <input type="tel" maxlength="1" class="otp-box"/>
      <input type="tel" maxlength="1" class="otp-box"/>
    </div>

    <!-- Resend -->
    <div class="mt-6 text-center">
      <button class="text-[12px] text-[#9E9E9E] font-medium">Didn't receive? <span class="text-[#0E7A4E] font-semibold">Resend OTP</span></button>
    </div>
  </div>

</div>
</div>

<script>
// Auto-focus next OTP box
document.querySelectorAll('.otp-box').forEach((box, i, boxes) => {
  box.addEventListener('input', function() {
    if (this.value && i < boxes.length - 1) boxes[i+1].focus();
  });
  box.addEventListener('keydown', function(e) {
    if (e.key === 'Backspace' && !this.value && i > 0) boxes[i-1].focus();
  });
});
// Timer countdown
let sec = 28;
const timerEl = document.getElementById('timer');
const iv = setInterval(() => { sec--; if(sec<=0){clearInterval(iv);timerEl.textContent='00:00';return;} timerEl.textContent='00:'+String(sec).padStart(2,'0'); }, 1000);
// Auto-navigate after all filled
document.querySelectorAll('.otp-box').forEach((box, i, boxes) => {
  box.addEventListener('input', () => {
    const all = Array.from(boxes).every(b => b.value);
    if (all) setTimeout(() => window.location.href='rapido-license-upload.html', 600);
  });
});
</script>
<div class="text-center text-white/60 text-xs pb-6">Rapido Flow · <a href="rapido-phone.html" class="underline">Prev</a> · <a href="rapido-license-upload.html" class="underline">Next</a> · <a href="../index.html" class="underline">All</a></div>
</body>
</html>
