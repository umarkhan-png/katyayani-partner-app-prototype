<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OTP · Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #1a1a1a; }
  .device { width: 390px; margin: 24px auto; background: #fff; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; }
  .scroll-area { height: 100%; overflow-y: auto; }
  .scroll-area::-webkit-scrollbar { display: none; }
  .otp-box { width: 44px; height: 52px; border: 2px solid #EDEDED; border-radius: 12px; text-align: center; font-size: 20px; font-weight: 700; color: #1C1C1C; outline: none; font-family: 'Poppins', sans-serif; }
  .otp-box:focus { border-color: #0E7A4E; box-shadow: 0 0 0 3px rgba(14,122,78,0.12); }
</style>
</head>
<body>
<div class="device bg-white">
<div class="scroll-area">

  <!-- HEADER — Our app back button style -->
  <div class="px-4 pt-7 pb-3 flex items-center justify-between">
    <a href="rapido-phone.html" class="w-9 h-9 rounded-full border border-[#EDEDED] flex items-center justify-center">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <a href="https://wa.me/919999999999" class="flex items-center gap-1.5 border border-[#EDEDED] rounded-full px-3 py-1.5">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1C1C1C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
      <span class="text-[12px] font-semibold text-[#1C1C1C]">Help</span>
    </a>
  </div>
  <div class="h-px bg-[#F0F0F0]"></div>

  <!-- BODY -->
  <div class="px-6 pt-6">
    <!-- Circular illustration — green themed -->
    <div class="w-20 h-20 rounded-full bg-[#F0FDF5] border-4 border-[#DCFCE7] flex items-center justify-center mb-4">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="3"/><path d="M9 9h2M9 12h2M9 15h2"/><circle cx="15" cy="12" r="0.5" fill="#0E7A4E"/></svg>
    </div>

    <!-- Heading with timer -->
    <div class="flex items-center justify-between">
      <div class="text-[22px] font-bold text-[#1C1C1C]">Enter OTP</div>
      <div class="text-[16px] font-semibold text-[#606060]" id="timer">00:28</div>
    </div>
    <div class="text-[12px] text-[#606060] mt-1">Sent to +91 99816 36717 · <a href="rapido-phone.html" class="text-[#0E7A4E] font-semibold">Change</a></div>

    <!-- 6 OTP boxes -->
    <div class="mt-6 flex gap-2.5 justify-between">
      <input type="tel" maxlength="1" class="otp-box" autofocus/>
      <input type="tel" maxlength="1" class="otp-box"/>
      <input type="tel" maxlength="1" class="otp-box"/>
      <input type="tel" maxlength="1" class="otp-box"/>
      <input type="tel" maxlength="1" class="otp-box"/>
      <input type="tel" maxlength="1" class="otp-box"/>
    </div>

    <!-- RESEND OPTIONS — Multiple methods (not just one link) -->
    <div class="mt-6">
      <div class="text-[11px] text-[#9E9E9E] font-medium mb-2">Didn't receive? Resend via</div>
      <div class="flex gap-2">
        <button class="flex-1 flex items-center justify-center gap-1.5 border border-[#EDEDED] rounded-xl py-2.5 text-[11px] font-semibold text-[#1C1C1C]">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1C1C1C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          SMS
        </button>
        <button class="flex-1 flex items-center justify-center gap-1.5 border border-[#EDEDED] rounded-xl py-2.5 text-[11px] font-semibold text-[#25D366]">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#25D366" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
          WhatsApp
        </button>
        <button class="flex-1 flex items-center justify-center gap-1.5 border border-[#EDEDED] rounded-xl py-2.5 text-[11px] font-semibold text-[#1C1C1C]">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1C1C1C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.11 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
          Call
        </button>
      </div>
    </div>
  </div>

</div>
</div>

<script>
document.querySelectorAll('.otp-box').forEach((box, i, boxes) => {
  box.addEventListener('input', function() {
    if (this.value && i < boxes.length - 1) boxes[i+1].focus();
    if (Array.from(boxes).every(b => b.value)) setTimeout(() => window.location.href='rapido-license-upload.html', 600);
  });
  box.addEventListener('keydown', function(e) {
    if (e.key === 'Backspace' && !this.value && i > 0) boxes[i-1].focus();
  });
});
let sec = 28;
const timerEl = document.getElementById('timer');
const iv = setInterval(() => { sec--; if(sec<=0){clearInterval(iv);timerEl.textContent='00:00';return;} timerEl.textContent='00:'+String(sec).padStart(2,'0'); }, 1000);
</script>
<div class="text-center text-white/60 text-xs pb-6">Rapido Flow · <a href="rapido-phone.html" class="underline">Prev</a> · <a href="rapido-license-upload.html" class="underline">Next</a> · <a href="../index.html" class="underline">All</a></div>
</body>
</html>
