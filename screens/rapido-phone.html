<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Phone Number · Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #1a1a1a; }
  .device { width: 390px; margin: 24px auto; background: #fff; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; }
  .scroll-area { height: 100%; overflow-y: auto; }
  .scroll-area::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div class="device bg-white">
<div class="scroll-area">

  <!-- HEADER -->
  <div class="px-4 pt-7 pb-3 flex items-center justify-between">
    <a href="rapido-welcome.html" class="w-9 h-9 rounded-full border border-[#EDEDED] flex items-center justify-center">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <a href="https://wa.me/919999999999" class="flex items-center gap-1.5 border border-[#EDEDED] rounded-full px-3 py-1.5">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1C1C1C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
      <span class="text-[12px] font-semibold text-[#1C1C1C]">Help</span>
    </a>
  </div>
  <div class="h-px bg-[#F0F0F0]"></div>

  <div id="contentArea" class="px-5 pt-5">

    <!-- VIDEO THUMBNAIL — Why Partner with Katyayani -->
    <div class="mb-4 rounded-2xl overflow-hidden" style="box-shadow:0 8px 24px rgba(0,0,0,0.35);background:linear-gradient(145deg,#020F08 0%,#041E14 40%,#083D28 70%,#0E5C37 100%);">

      <!-- Thumbnail frame -->
      <div class="relative" style="height:172px;">

        <!-- Katyayani logo — top left -->
        <div class="absolute top-3 left-3">
          <img src="../assets/katyayani-logo.webp" alt="Katyayani" style="height:20px;filter:brightness(0) invert(1);opacity:0.9;">
        </div>

        <!-- Duration badge — top right -->
        <div class="absolute top-3 right-3 rounded px-1.5 py-0.5" style="background:rgba(0,0,0,0.55);">
          <span style="font-size:10px;font-weight:600;color:#fff;font-family:'Poppins',sans-serif;">2:30</span>
        </div>

        <!-- Presenter silhouette — right side -->
        <div class="absolute right-0 bottom-0 flex items-end" style="width:110px;">
          <svg viewBox="0 0 80 130" width="80" height="130" fill="none">
            <ellipse cx="40" cy="21" rx="14" ry="16" fill="rgba(255,255,255,0.14)"/>
            <path d="M27 17 Q29 4 40 4 Q51 4 53 17 Q55 9 51 7 Q40 0 29 7 Q25 11 27 17Z" fill="rgba(255,255,255,0.10)"/>
            <rect x="37" y="35" width="6" height="7" rx="2" fill="rgba(255,255,255,0.10)"/>
            <path d="M22 50 Q20 78 18 120 L62 120 Q60 78 58 50 Q51 41 40 41 Q29 41 22 50Z" fill="rgba(255,255,255,0.13)"/>
            <path d="M25 50 Q36 60 55 49" stroke="rgba(212,175,55,0.5)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            <path d="M22 54 Q14 67 16 84" stroke="rgba(255,255,255,0.11)" stroke-width="9" stroke-linecap="round"/>
            <path d="M58 54 Q67 65 63 82" stroke="rgba(255,255,255,0.11)" stroke-width="9" stroke-linecap="round"/>
          </svg>
        </div>

        <!-- Text — bottom left -->
        <div class="absolute left-3 bottom-10">
          <div style="font-size:9px;color:#D4AF37;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;font-family:'Poppins',sans-serif;">Watch · 2 min</div>
          <div style="font-size:14px;font-weight:800;color:#fff;line-height:1.25;font-family:'Poppins',sans-serif;">Why Partner with<br>Katyayani?</div>
        </div>

        <!-- Center play button -->
        <div class="absolute inset-0 flex items-center justify-center">
          <button onclick="togglePlay()" style="width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,0.18);border:1.5px solid rgba(255,255,255,0.35);display:flex;align-items:center;justify-content:center;cursor:pointer;">
            <svg id="playIcon" width="19" height="19" viewBox="0 0 24 24" fill="white"><polygon points="6,3 20,12 6,21"/></svg>
            <svg id="pauseIcon" width="19" height="19" viewBox="0 0 24 24" fill="white" style="display:none;"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
          </button>
        </div>

      </div>

      <!-- Controls bar -->
      <div style="display:flex;align-items:center;gap:10px;padding:8px 14px;background:rgba(0,0,0,0.38);">
        <!-- Play/pause -->
        <button onclick="togglePlay()" style="flex-shrink:0;line-height:0;background:none;border:none;cursor:pointer;">
          <svg id="barPlay" width="14" height="14" viewBox="0 0 24 24" fill="white"><polygon points="6,3 20,12 6,21"/></svg>
          <svg id="barPause" width="14" height="14" viewBox="0 0 24 24" fill="white" style="display:none;"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
        </button>
        <!-- Progress bar -->
        <div style="flex:1;height:3px;border-radius:99px;background:rgba(255,255,255,0.18);">
          <div id="pFill" style="height:100%;border-radius:99px;width:0%;background:linear-gradient(to right,#D4AF37,#F0C940);transition:width 0.08s linear;"></div>
        </div>
        <!-- Mute -->
        <button onclick="toggleMute()" style="flex-shrink:0;line-height:0;background:none;border:none;cursor:pointer;">
          <svg id="sndOn" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="white" stroke="none"/><path d="M19.07 4.93a10 10 0 010 14.14"/><path d="M15.54 8.46a5 5 0 010 7.07"/></svg>
          <svg id="sndOff" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" style="display:none;"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="white" stroke="none"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
        </button>
        <!-- Language toggle -->
        <button onclick="toggleLang()" style="flex-shrink:0;display:flex;align-items:center;gap:3px;background:rgba(255,255,255,0.15);border:none;border-radius:99px;padding:4px 9px;cursor:pointer;">
          <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/></svg>
          <span id="langLbl" style="font-size:10px;font-weight:700;color:white;font-family:'Poppins',sans-serif;">HI</span>
          <svg width="7" height="7" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M6 9l6 6 6-6"/></svg>
        </button>
      </div>

    </div>
    <!-- END VIDEO -->

    <div id="titleText" class="text-[22px] font-bold text-[#1C1C1C] leading-tight">Enter your phone<br>number</div>

    <!-- Phone input -->
    <div id="phoneWrap" class="mt-6 flex items-center border-2 border-[#EDEDED] rounded-xl px-4 py-3.5 focus-within:border-[#0E7A4E] focus-within:shadow-[0_0_0_3px_rgba(14,122,78,0.12)]">
      <span class="text-[16px] font-semibold text-[#1C1C1C] mr-3">+91</span>
      <div class="w-px h-6 bg-[#EDEDED] mr-3"></div>
      <input type="tel" class="flex-1 text-[17px] font-semibold text-[#1C1C1C] outline-none placeholder:text-[#BDBDBD] placeholder:font-normal" placeholder="9876543210" maxlength="10" value="9981636717" style="font-family:'Poppins',sans-serif"/>
    </div>

    <!-- OR -->
    <div class="flex items-center gap-3 my-4">
      <div class="flex-1 h-px bg-[#EDEDED]"></div>
      <span class="text-[11px] text-[#9E9E9E] font-medium">OR</span>
      <div class="flex-1 h-px bg-[#EDEDED]"></div>
    </div>

    <!-- Google login -->
    <button class="w-full flex items-center justify-center gap-2.5 border-2 border-[#EDEDED] rounded-xl py-3 text-[13px] font-semibold text-[#1C1C1C]">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 001 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Login with Google
    </button>

    <!-- Referral — simple text toggle, no icon -->
    <div class="mt-4 text-center">
      <button class="text-[12px] font-normal text-[#0E7A4E]" onclick="document.getElementById('refBox').classList.toggle('hidden')">Have a referral code?</button>
    </div>
    <div id="refBox" class="hidden mt-2 flex gap-2">
      <input type="text" class="flex-1 border-2 border-[#EDEDED] rounded-xl px-3 py-2.5 text-[13px] font-semibold uppercase tracking-wider outline-none focus:border-[#0E7A4E]" placeholder="Enter code" style="font-family:'Poppins',sans-serif"/>
      <button class="bg-gradient-to-r from-[#041E14] to-[#083D28] text-white px-4 rounded-xl text-[12px] font-semibold">Apply</button>
    </div>

    <!-- T&C -->
    <div class="mt-5 text-center text-[10px] text-[#9E9E9E]">
      By continuing, you agree to our <a href="#" class="text-[#0E7A4E] font-semibold">Terms</a> & <a href="#" class="text-[#0E7A4E] font-semibold">Privacy Policy</a>
    </div>
  </div>
</div>

<!-- CTA — dark green -->
<div class="absolute bottom-0 left-0 right-0 bg-white px-5 py-3 border-t border-[#EDEDED]">
  <a id="ctaBtn" href="rapido-otp.html" class="block bg-[#0E7A4E] text-white text-center py-3.5 rounded-xl text-[13px] font-bold uppercase tracking-wider">
    Continue
  </a>
</div>
</div>
<div class="text-center text-white/60 text-xs pb-6"><a href="rapido-welcome.html" class="underline">Prev</a> · <a href="rapido-otp.html" class="underline">Next</a> · <a href="../index.html" class="underline">All</a></div>


<script>
var _pl=false,_mu=false,_langs=['HI','EN','MR'],_li=0,_tmr;
function togglePlay(){
  _pl=!_pl;
  document.getElementById('playIcon').style.display=_pl?'none':'';
  document.getElementById('pauseIcon').style.display=_pl?'':'none';
  document.getElementById('barPlay').style.display=_pl?'none':'';
  document.getElementById('barPause').style.display=_pl?'':'none';
  if(_pl){
    _tmr=setInterval(function(){
      var f=document.getElementById('pFill'),w=parseFloat(f.style.width)||0;
      if(w>=100){clearInterval(_tmr);_pl=false;
        document.getElementById('playIcon').style.display='';document.getElementById('pauseIcon').style.display='none';
        document.getElementById('barPlay').style.display='';document.getElementById('barPause').style.display='none';
      }else{f.style.width=(w+0.4)+'%';}
    },60);
  }else{clearInterval(_tmr);}
}
function toggleMute(){
  _mu=!_mu;
  document.getElementById('sndOn').style.display=_mu?'none':'';
  document.getElementById('sndOff').style.display=_mu?'':'none';
}
function toggleLang(){
  _li=(_li+1)%_langs.length;
  document.getElementById('langLbl').textContent=_langs[_li];
}
</script>
</body>
</html>
