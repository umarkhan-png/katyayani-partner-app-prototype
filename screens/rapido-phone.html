<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Phone Number · Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #1a1a1a; }
  .device { width: 390px; margin: 24px auto; background: #fff; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; }
  .scroll-area { height: 100%; overflow-y: auto; }
  .scroll-area::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div class="device bg-white">
<div class="scroll-area">

  <!-- HEADER -->
  <div class="px-4 pt-7 pb-3 flex items-center justify-between">
    <a href="rapido-welcome.html" class="w-9 h-9 rounded-full border border-[#EDEDED] flex items-center justify-center">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <a href="https://wa.me/919999999999" class="flex items-center gap-1.5 border border-[#EDEDED] rounded-full px-3 py-1.5">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1C1C1C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
      <span class="text-[12px] font-semibold text-[#1C1C1C]">Help</span>
    </a>
  </div>
  <div class="h-px bg-[#F0F0F0]"></div>

  <div id="contentArea" class="px-6 pt-6">
    <!-- Icon — dark green themed -->
    <div id="iconCircle" class="w-20 h-20 rounded-full bg-gradient-to-r from-[#041E14] to-[#083D28] flex items-center justify-center mb-4">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="3"/><path d="M12 18h.01"/></svg>
    </div>

    <div id="titleText" class="text-[22px] font-bold text-[#1C1C1C] leading-tight">Enter your phone<br>number to get started</div>

    <!-- Phone input -->
    <div id="phoneWrap" class="mt-6 flex items-center border-2 border-[#EDEDED] rounded-xl px-4 py-3.5 focus-within:border-[#0E7A4E] focus-within:shadow-[0_0_0_3px_rgba(14,122,78,0.12)]">
      <span class="text-[16px] font-semibold text-[#1C1C1C] mr-3">+91</span>
      <div class="w-px h-6 bg-[#EDEDED] mr-3"></div>
      <input type="tel" class="flex-1 text-[17px] font-semibold text-[#1C1C1C] outline-none placeholder:text-[#BDBDBD] placeholder:font-normal" placeholder="9876543210" maxlength="10" value="9981636717" style="font-family:'Poppins',sans-serif"/>
    </div>

    <!-- OR -->
    <div class="flex items-center gap-3 my-4">
      <div class="flex-1 h-px bg-[#EDEDED]"></div>
      <span class="text-[11px] text-[#9E9E9E] font-medium">OR</span>
      <div class="flex-1 h-px bg-[#EDEDED]"></div>
    </div>

    <!-- Google login -->
    <button class="w-full flex items-center justify-center gap-2.5 border-2 border-[#EDEDED] rounded-xl py-3 text-[13px] font-semibold text-[#1C1C1C]">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 001 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Login with Google
    </button>

    <!-- Referral — simple text toggle, no icon -->
    <div class="mt-4 text-center">
      <button class="text-[12px] font-normal text-[#0E7A4E]" onclick="document.getElementById('refBox').classList.toggle('hidden')">Have a referral code?</button>
    </div>
    <div id="refBox" class="hidden mt-2 flex gap-2">
      <input type="text" class="flex-1 border-2 border-[#EDEDED] rounded-xl px-3 py-2.5 text-[13px] font-semibold uppercase tracking-wider outline-none focus:border-[#0E7A4E]" placeholder="Enter code" style="font-family:'Poppins',sans-serif"/>
      <button class="bg-gradient-to-r from-[#041E14] to-[#083D28] text-white px-4 rounded-xl text-[12px] font-semibold">Apply</button>
    </div>

    <!-- T&C -->
    <div class="mt-5 text-center text-[10px] text-[#9E9E9E]">
      By continuing, you agree to our <a href="#" class="text-[#0E7A4E] font-semibold">Terms</a> & <a href="#" class="text-[#0E7A4E] font-semibold">Privacy Policy</a>
    </div>
  </div>
</div>

<!-- CTA — dark green -->
<div class="absolute bottom-0 left-0 right-0 bg-white px-5 py-3 border-t border-[#EDEDED]">
  <a id="ctaBtn" href="rapido-otp.html" class="block bg-gradient-to-r from-[#041E14] to-[#083D28] text-white text-center py-3.5 rounded-xl text-[13px] font-bold uppercase tracking-wider">
    Continue
  </a>
</div>
</div>
<div class="text-center text-white/60 text-xs pb-6"><a href="rapido-welcome.html" class="underline">Prev</a> · <a href="rapido-otp.html" class="underline">Next</a> · <a href="../index.html" class="underline">All</a></div>

<!-- DESIGN CUSTOMIZER -->
<button id="custToggle" onclick="document.getElementById('custPanel').classList.toggle('hidden')" style="position:fixed;bottom:20px;right:20px;z-index:9999;width:48px;height:48px;border-radius:50%;background:#0E7A4E;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.3)">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
</button>
<div id="custPanel" class="hidden" style="position:fixed;bottom:80px;right:20px;z-index:9999;width:320px;max-height:70vh;overflow-y:auto;background:#111;border-radius:14px;padding:18px;box-shadow:0 8px 32px rgba(0,0,0,.5);color:#fff;font-family:'Poppins',sans-serif;font-size:12px">
  <div style="font-size:14px;font-weight:700;margin-bottom:14px;color:#fff">Design Customizer</div>

  <!-- Icon Circle -->
  <div style="color:#8BC9A5;font-weight:600;margin-bottom:6px;margin-top:4px">Icon Circle</div>
  <label style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">Size <span><input type="range" id="c_iconSize" min="48" max="120" value="80" style="accent-color:#0E7A4E;width:120px"> <span id="v_iconSize">80</span>px</span></label>
  <label style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">Bottom gap <span><input type="range" id="c_iconGap" min="4" max="32" value="16" style="accent-color:#0E7A4E;width:120px"> <span id="v_iconGap">16</span>px</span></label>

  <!-- Title -->
  <div style="color:#8BC9A5;font-weight:600;margin-bottom:6px;margin-top:12px">Title</div>
  <label style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">Font size <span><input type="range" id="c_titleSize" min="16" max="32" value="22" style="accent-color:#0E7A4E;width:120px"> <span id="v_titleSize">22</span>px</span></label>

  <!-- Phone Input -->
  <div style="color:#8BC9A5;font-weight:600;margin-bottom:6px;margin-top:12px">Phone Input</div>
  <label style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">Top gap <span><input type="range" id="c_phoneGap" min="8" max="48" value="24" style="accent-color:#0E7A4E;width:120px"> <span id="v_phoneGap">24</span>px</span></label>
  <label style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">Padding Y <span><input type="range" id="c_phonePadY" min="8" max="24" value="14" style="accent-color:#0E7A4E;width:120px"> <span id="v_phonePadY">14</span>px</span></label>
  <label style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">Border radius <span><input type="range" id="c_phoneRad" min="8" max="24" value="12" style="accent-color:#0E7A4E;width:120px"> <span id="v_phoneRad">12</span>px</span></label>

  <!-- CTA Button -->
  <div style="color:#8BC9A5;font-weight:600;margin-bottom:6px;margin-top:12px">CTA Button</div>
  <label style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">Padding Y <span><input type="range" id="c_ctaPadY" min="8" max="24" value="14" style="accent-color:#0E7A4E;width:120px"> <span id="v_ctaPadY">14</span>px</span></label>
  <label style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">Border radius <span><input type="range" id="c_ctaRad" min="8" max="24" value="12" style="accent-color:#0E7A4E;width:120px"> <span id="v_ctaRad">12</span>px</span></label>
  <label style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">Font size <span><input type="range" id="c_ctaFont" min="10" max="18" value="13" style="accent-color:#0E7A4E;width:120px"> <span id="v_ctaFont">13</span>px</span></label>

  <!-- Content Area -->
  <div style="color:#8BC9A5;font-weight:600;margin-bottom:6px;margin-top:12px">Content Area</div>
  <label style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">Side padding <span><input type="range" id="c_contentPadX" min="12" max="40" value="24" style="accent-color:#0E7A4E;width:120px"> <span id="v_contentPadX">24</span>px</span></label>
  <label style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">Top padding <span><input type="range" id="c_contentPadT" min="8" max="48" value="24" style="accent-color:#0E7A4E;width:120px"> <span id="v_contentPadT">24</span>px</span></label>

  <!-- Save -->
  <button id="custSaveBtn" style="margin-top:14px;width:100%;padding:10px;background:#0E7A4E;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Poppins',sans-serif">Save</button>
</div>

<script>
(function(){
  const KEY = 'phoneCustom';
  const controls = [
    { id:'c_iconSize',    vid:'v_iconSize',    def:80 },
    { id:'c_iconGap',     vid:'v_iconGap',     def:16 },
    { id:'c_titleSize',   vid:'v_titleSize',   def:22 },
    { id:'c_phoneGap',    vid:'v_phoneGap',    def:24 },
    { id:'c_phonePadY',   vid:'v_phonePadY',   def:14 },
    { id:'c_phoneRad',    vid:'v_phoneRad',    def:12 },
    { id:'c_ctaPadY',     vid:'v_ctaPadY',     def:14 },
    { id:'c_ctaRad',      vid:'v_ctaRad',      def:12 },
    { id:'c_ctaFont',     vid:'v_ctaFont',     def:13 },
    { id:'c_contentPadX', vid:'v_contentPadX', def:24 },
    { id:'c_contentPadT', vid:'v_contentPadT', def:24 },
  ];

  function val(id){ return parseInt(document.getElementById(id).value); }

  function apply(){
    var ic = document.getElementById('iconCircle');
    var tt = document.getElementById('titleText');
    var pw = document.getElementById('phoneWrap');
    var ct = document.getElementById('ctaBtn');
    var ca = document.getElementById('contentArea');

    var s = val('c_iconSize');
    ic.style.width = s+'px'; ic.style.height = s+'px';
    ic.style.marginBottom = val('c_iconGap')+'px';

    tt.style.fontSize = val('c_titleSize')+'px';

    pw.style.marginTop = val('c_phoneGap')+'px';
    pw.style.paddingTop = val('c_phonePadY')+'px';
    pw.style.paddingBottom = val('c_phonePadY')+'px';
    pw.style.borderRadius = val('c_phoneRad')+'px';

    ct.style.paddingTop = val('c_ctaPadY')+'px';
    ct.style.paddingBottom = val('c_ctaPadY')+'px';
    ct.style.borderRadius = val('c_ctaRad')+'px';
    ct.style.fontSize = val('c_ctaFont')+'px';

    ca.style.paddingLeft = val('c_contentPadX')+'px';
    ca.style.paddingRight = val('c_contentPadX')+'px';
    ca.style.paddingTop = val('c_contentPadT')+'px';

    controls.forEach(function(c){ document.getElementById(c.vid).textContent = document.getElementById(c.id).value; });
  }

  // bind sliders
  controls.forEach(function(c){
    document.getElementById(c.id).addEventListener('input', apply);
  });

  // save
  document.getElementById('custSaveBtn').addEventListener('click', function(){
    var data = {};
    controls.forEach(function(c){ data[c.id] = val(c.id); });
    localStorage.setItem(KEY, JSON.stringify(data));
    var btn = document.getElementById('custSaveBtn');
    btn.textContent = 'Saved!';
    setTimeout(function(){ btn.textContent = 'Save'; }, 1200);
  });

  // restore
  try {
    var saved = JSON.parse(localStorage.getItem(KEY));
    if(saved){
      controls.forEach(function(c){
        if(saved[c.id] !== undefined) document.getElementById(c.id).value = saved[c.id];
      });
      apply();
    }
  } catch(e){}
})();
</script>

</body>
</html>
