var _pl=false,_mu=false,_tmr;
function togglePlay(){
  _pl=!_pl;
  document.getElementById('playIcon').style.display=_pl?'none':'';
  document.getElementById('pauseIcon').style.display=_pl?'':'none';
  document.getElementById('barPlay').style.display=_pl?'none':'';
  document.getElementById('barPause').style.display=_pl?'':'none';
  if(_pl){
    _tmr=setInterval(function(){
      var f=document.getElementById('pFill'),w=parseFloat(f.style.width)||0;
      if(w>=100){clearInterval(_tmr);_pl=false;
        document.getElementById('playIcon').style.display='';document.getElementById('pauseIcon').style.display='none';
        document.getElementById('barPlay').style.display='';document.getElementById('barPause').style.display='none';
      }else{f.style.width=(w+0.4)+'%';document.getElementById('pFillFs').style.width=f.style.width;}
    },60);
  }else{clearInterval(_tmr);}
}
function toggleMute(){
  _mu=!_mu;
  document.getElementById('sndOn').style.display=_mu?'none':'';
  document.getElementById('sndOff').style.display=_mu?'':'none';
  document.getElementById('sndOnFs').style.display=_mu?'none':'';
  document.getElementById('sndOffFs').style.display=_mu?'':'none';
}
function openLangModal(){
  var o=document.getElementById('langOverlay'),s=document.getElementById('langSheet');
  o.style.display='block'; s.style.display='block';
  requestAnimationFrame(function(){ s.style.transform='translateY(0)'; });
}
function closeLangModal(){
  var s=document.getElementById('langSheet');
  s.style.transform='translateY(100%)';
  setTimeout(function(){
    document.getElementById('langOverlay').style.display='none';
    s.style.display='none';
  },280);
}
function openFullscreen(){
  var fs=document.getElementById('fsOverlay');
  fs.style.display='block';
  // sync progress
  document.getElementById('pFillFs').style.width=document.getElementById('pFill').style.width;
  // sync mute icons
  document.getElementById('sndOnFs').style.display=_mu?'none':'';
  document.getElementById('sndOffFs').style.display=_mu?'':'none';
  // sync play icons
  document.getElementById('fsPlay').style.display=_pl?'none':'';
  document.getElementById('fsPause').style.display=_pl?'':'none';
}
function closeFullscreen(){
  document.getElementById('fsOverlay').style.display='none';
}
function pickLang(btn,code){
  document.querySelectorAll('.lang-opt').forEach(function(b){
    b.style.border='1.5px solid #EDEDED'; b.style.background='#fff';
  });
  btn.style.border='1.5px solid #0E7A4E'; btn.style.background='#F0FDF5';
  document.getElementById('langLbl').textContent=code;
  document.getElementById('langLblFs').textContent=code;
  setTimeout(closeLangModal,180);
}
</script>
</body>
</html>
