<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tell Us About Yourself · Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #1a1a1a; }
  .device { width: 390px; margin: 24px auto; background: #fff; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; }
  .scroll-area { height: 100%; overflow-y: auto; padding-bottom: 90px; }
  .scroll-area::-webkit-scrollbar { display: none; }
  .form-input { width: 100%; padding: 12px 14px; border: 1.5px solid #EDEDED; border-radius: 12px; font-size: 14px; font-weight: 500; color: #1C1C1C; outline: none; background: #fff; font-family: 'Poppins', sans-serif; }
  .form-input::placeholder { color: #9E9E9E; font-weight: 400; }
  .form-input:focus { border-color: #0E7A4E; box-shadow: 0 0 0 3px rgba(14,122,78,0.12); }
  .role-card { transition: all .15s; cursor: pointer; }
  .role-card.selected { border-color: #0E7A4E; background: #F0FDF5; }
  .role-card.selected .check { display: flex; }
  .role-card .check { display: none; }
</style>
</head>
<body>
<div class="device bg-white">
<div class="scroll-area">

  <!-- HEADER -->
  <div class="px-4 pt-7 pb-3 flex items-center justify-between">
    <a href="rapido-otp.html" class="w-9 h-9 rounded-full border border-[#EDEDED] flex items-center justify-center">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <a href="https://wa.me/919999999999" class="flex items-center gap-1.5 border border-[#EDEDED] rounded-full px-3 py-1.5">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1C1C1C" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
      <span class="text-[12px] font-semibold text-[#1C1C1C]">Help</span>
    </a>
  </div>
  <div class="h-px bg-[#F0F0F0]"></div>

  <div class="px-6 pt-5">
    <!-- Icon -->
    <div class="w-16 h-16 rounded-2xl bg-[#F0FDF5] border border-[#0E7A4E]/15 flex items-center justify-center mb-4">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </div>

    <div class="text-[22px] font-bold text-[#1C1C1C] leading-tight">Tell us about<br>yourself</div>

    <!-- NAME ROW -->
    <div class="mt-5 grid grid-cols-2 gap-3">
      <div>
        <label class="text-[10px] font-semibold text-[#606060] uppercase tracking-wider">First name</label>
        <input type="text" class="form-input mt-1.5" placeholder="First name"/>
      </div>
      <div>
        <label class="text-[10px] font-semibold text-[#606060] uppercase tracking-wider">Last name</label>
        <input type="text" class="form-input mt-1.5" placeholder="Last name"/>
      </div>
    </div>

    <!-- SHOP NAME -->
    <div class="mt-4">
      <label class="text-[10px] font-semibold text-[#606060] uppercase tracking-wider">Shop name</label>
      <input type="text" class="form-input mt-1.5" placeholder="e.g. Maheshwari Krishi Kendra"/>
    </div>

    <!-- ROLE -->
    <div class="mt-5">
      <label class="text-[10px] font-semibold text-[#606060] uppercase tracking-wider">I am a</label>

      <div class="mt-2 grid grid-cols-3 gap-2">
        <!-- Retailer -->
        <button class="role-card selected border-2 border-[#EDEDED] rounded-2xl p-3 text-center relative" onclick="selectRole(this)">
          <div class="w-11 h-11 mx-auto rounded-xl bg-white border border-[#EDEDED] flex items-center justify-center">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-6 9 6v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><path d="M9 22V12h6v10"/></svg>
          </div>
          <div class="text-[11px] font-semibold text-[#1C1C1C] mt-1.5 leading-tight">Retailer</div>
          <div class="text-[8px] text-[#606060] mt-0.5">Run a shop</div>
          <div class="check absolute top-1.5 right-1.5 w-4 h-4 rounded-full bg-[#0E7A4E] items-center justify-center">
            <svg width="9" height="9" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </button>

        <!-- Distributor -->
        <button class="role-card border-2 border-[#EDEDED] rounded-2xl p-3 text-center relative" onclick="selectRole(this)">
          <div class="w-11 h-11 mx-auto rounded-xl bg-white border border-[#EDEDED] flex items-center justify-center">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="1"/><path d="M5 11V5a2 2 0 012-2h10a2 2 0 012 2v6M9 21v-4h6v4M9 7h6"/></svg>
          </div>
          <div class="text-[11px] font-semibold text-[#1C1C1C] mt-1.5 leading-tight">Distributor</div>
          <div class="text-[8px] text-[#606060] mt-0.5">Supply chain</div>
          <div class="check absolute top-1.5 right-1.5 w-4 h-4 rounded-full bg-[#0E7A4E] items-center justify-center">
            <svg width="9" height="9" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </button>

        <!-- Farmer -->
        <button class="role-card border-2 border-[#EDEDED] rounded-2xl p-3 text-center relative" onclick="selectRole(this)">
          <div class="w-11 h-11 mx-auto rounded-xl bg-white border border-[#EDEDED] flex items-center justify-center">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M8 6c0 2 2 4 4 4M16 6c0 2-2 4-4 4M6 10c0 2 3 4 6 4M18 10c0 2-3 4-6 4"/></svg>
          </div>
          <div class="text-[11px] font-semibold text-[#1C1C1C] mt-1.5 leading-tight">Farmer</div>
          <div class="text-[8px] text-[#606060] mt-0.5">Grow crops</div>
          <div class="check absolute top-1.5 right-1.5 w-4 h-4 rounded-full bg-[#0E7A4E] items-center justify-center">
            <svg width="9" height="9" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </button>
      </div>
    </div>

    <div class="h-4"></div>
  </div>

</div>

<!-- STICKY CTA -->
<div class="absolute bottom-0 left-0 right-0 bg-white border-t border-[#EDEDED] px-5 py-3">
  <a href="rapido-signup-success.html" class="block bg-[#0E7A4E] text-white text-center py-3.5 rounded-xl text-[13px] font-bold uppercase tracking-wider">
    Sign Up
  </a>
</div>
</div>

<script>
function selectRole(el) {
  document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
}
</script>

<div class="text-center text-white/60 text-xs pb-6"><a href="rapido-otp.html" class="underline">Prev</a> · <a href="rapido-signup-success.html" class="underline">Next</a> · <a href="../index.html" class="underline">All</a></div>
</body>
</html>
