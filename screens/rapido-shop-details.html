<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shop Details · Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #1a1a1a; }
  .device { width: 390px; margin: 24px auto; background: #fff; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; }
  .scroll-area { height: 100%; overflow-y: auto; padding-bottom: 90px; }
  .scroll-area::-webkit-scrollbar { display: none; }
  .input { width: 100%; border: 1.5px solid #EDEDED; border-radius: 12px; padding: 12px 14px; font-size: 14px; font-weight: 500; color: #1C1C1C; outline: none; background: #fff; font-family: 'Poppins', sans-serif; }
  .input:focus { border-color: #0E7A4E; box-shadow: 0 0 0 3px rgba(14,122,78,0.12); }
  .input::placeholder { color: #9E9E9E; font-weight: 400; }
  .label { font-size: 10px; font-weight: 600; color: #606060; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
  .opt-badge { font-size: 9px; font-weight: 500; color: #9E9E9E; text-transform: none; letter-spacing: 0; background: #F5F5F5; border-radius: 4px; padding: 1px 6px; }
  .auto-badge { font-size: 9px; font-weight: 600; color: #0E7A4E; text-transform: none; letter-spacing: 0; background: #E8F5E9; border-radius: 4px; padding: 1px 6px; }
  .slide-in { animation: slideIn .2s ease-out both; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="device bg-white">
<div class="scroll-area">

  <!-- HEADER -->
  <div class="px-4 pt-7 pb-4 flex items-center justify-between">
    <a href="rapido-profile.html" class="w-9 h-9 rounded-full border border-[#EDEDED] flex items-center justify-center">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <a href="rapido-help.html" class="flex items-center gap-1.5 border border-[#EDEDED] rounded-full px-3 py-1.5">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1C1C1C" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>
      <span class="text-[12px] font-semibold text-[#1C1C1C]">Help</span>
    </a>
  </div>
  <div class="h-px bg-[#EDEDED]"></div>

  <div class="px-5 pt-4">

    <!-- Title -->
    <div class="text-[22px] font-bold text-[#1C1C1C] leading-tight">Shop Details</div>
    <div class="text-[12px] text-[#707070] mt-1.5 mb-5">Tell us about your shop.</div>

    <!-- SHOP NAME -->
    <div class="mb-3">
      <div class="label">Shop Name <span style="color:#E53935;">*</span></div>
      <input class="input" placeholder="e.g. Maheshwari Krishi Kendra"/>
    </div>

    <!-- SHOP ADDRESS HEADING -->
    <div class="text-[13px] font-bold text-[#1C1C1C] mb-2">Shop Address</div>

    <!-- AUTO-FILL BUTTON -->
    <button id="locBtn" onclick="detectLocation()" class="flex items-center gap-2 rounded-lg px-3 py-2 border border-[#BFDDCF] mb-3" style="background:#F4FBF7;">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
      <span class="text-[12px] font-semibold text-[#0E7A4E]">Auto-fill Address</span>
    </button>

    <!-- PINCODE -->
    <div class="mb-3">
      <div class="label">Pincode <span style="color:#E53935;">*</span></div>
      <div class="relative">
        <input id="f-pincode" class="input" placeholder="Enter 6-digit pincode" maxlength="6" type="tel" oninput="handlePincode(this)" style="padding-right:40px;"/>
        <div id="pinLoader" class="hidden absolute right-3 top-1/2 -translate-y-1/2">
          <svg class="animate-spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2.5"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
        </div>
        <div id="pinCheck" class="hidden absolute right-3 top-1/2 -translate-y-1/2">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="#0E7A4E"/><path d="M8 12l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
    </div>

    <!-- FIELDS REVEALED AFTER PINCODE -->
    <div id="afterPincode" style="display:none;">

      <!-- City/Tehsil/PO — editable -->
      <div class="mb-3 slide-in">
        <div class="label">City / Tehsil / Post Office <span style="color:#E53935;">*</span></div>
        <input id="f-city" class="input" placeholder="City or tehsil"/>
      </div>

      <!-- District + State — readonly -->
      <div class="grid grid-cols-2 gap-3 mb-3 slide-in" style="animation-delay:.06s;">
        <div>
          <div class="label">District</div>
          <div class="relative">
            <input id="f-district" class="input" placeholder="District" readonly style="background:#F8F8F8;color:#606060;padding-right:32px;"/>
            <svg class="absolute right-3 top-1/2 -translate-y-1/2" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2.5"><path d="M5 12l5 5L20 7"/></svg>
          </div>
        </div>
        <div>
          <div class="label">State</div>
          <div class="relative">
            <input id="f-state" class="input" placeholder="State" readonly style="background:#F8F8F8;color:#606060;padding-right:32px;"/>
            <svg class="absolute right-3 top-1/2 -translate-y-1/2" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2.5"><path d="M5 12l5 5L20 7"/></svg>
          </div>
        </div>
      </div>

      <!-- Shop Number / Building -->
      <div class="mb-3 slide-in" style="animation-delay:.10s;">
        <div class="label">Shop Number / Building Name <span class="opt-badge">Optional</span></div>
        <input id="f-building" class="input" placeholder="e.g. Shop 12, Krishna Complex"/>
      </div>

      <!-- Village / Area / Street — Optional -->
      <div class="mb-3 slide-in" style="animation-delay:.14s;">
        <div class="label">Village / Area / Street <span class="opt-badge">Optional</span></div>
        <input id="f-area" class="input" placeholder="Colony, sector, village name…"/>
      </div>

      <!-- Landmark — Optional -->
      <div class="mb-3 slide-in" style="animation-delay:.18s;">
        <div class="label">Landmark <span class="opt-badge">Optional</span></div>
        <input id="f-landmark" class="input" placeholder="e.g. Near Geeta Bhawan, opp. SBI ATM…"/>
      </div>

    </div>

    <div class="h-4"></div>
  </div>

  <!-- Toast -->
  <div id="locToast" class="absolute left-1/2 bottom-24 -translate-x-1/2 flex items-center gap-2 bg-[#1C1C1C] text-white px-3.5 py-2 rounded-full text-[11.5px] font-semibold shadow-lg whitespace-nowrap opacity-0 pointer-events-none transition-all duration-300" style="transform:translate(-50%,10px);">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#7FD0A3" stroke-width="3"><path d="M5 12l5 5L20 7"/></svg>
    <span>Location detected · fields auto-filled</span>
  </div>

</div>

<!-- STICKY CTA -->
<div class="absolute bottom-0 left-0 right-0 bg-white px-4 py-3 border-t border-[#EDEDED]">
  <a href="rapido-license-upload.html" class="block bg-[#0E7A4E] text-white text-center py-3.5 rounded-xl text-[13px] font-bold uppercase tracking-wider">
    Save &amp; Continue
  </a>
</div>
</div>
<div class="text-center text-white/60 text-xs pb-6">New Flow · <a href="rapido-signup-success.html" class="underline">Prev</a> · <a href="rapido-license-upload.html" class="underline">Next</a> · <a href="../index.html" class="underline">All</a></div>

<script>
var PINDB = {
  '452001':['Indore','Indore','Madhya Pradesh'],
  '452002':['Indore','Indore','Madhya Pradesh'],
  '452003':['Indore','Indore','Madhya Pradesh'],
  '411001':['Pune','Pune','Maharashtra'],
  '400001':['Mumbai','Mumbai','Maharashtra'],
  '110001':['New Delhi','Central Delhi','Delhi'],
  '302001':['Jaipur','Jaipur','Rajasthan'],
  '226001':['Lucknow','Lucknow','Uttar Pradesh'],
  '380001':['Ahmedabad','Ahmedabad','Gujarat'],
  '500001':['Hyderabad','Hyderabad','Telangana'],
  '600001':['Chennai','Chennai','Tamil Nadu'],
  '700001':['Kolkata','Kolkata','West Bengal'],
};

function showToast(msg) {
  var t = document.getElementById('locToast');
  t.querySelector('span').textContent = msg;
  t.style.opacity = '1';
  t.style.transform = 'translate(-50%,0)';
  clearTimeout(window.__toastT);
  window.__toastT = setTimeout(function() {
    t.style.opacity = '0';
    t.style.transform = 'translate(-50%,10px)';
  }, 2500);
}

function revealFields(pin) {
  var data = PINDB[pin];
  document.getElementById('f-city').value     = data ? data[0] : '';
  document.getElementById('f-district').value = data ? data[1] : '';
  document.getElementById('f-state').value    = data ? data[2] : '';

  var after = document.getElementById('afterPincode');
  after.style.display = 'block';
  after.querySelectorAll('.slide-in').forEach(function(el, i) {
    el.classList.remove('slide-in');
    void el.offsetWidth;
    el.classList.add('slide-in');
  });

  document.getElementById('pinLoader').classList.add('hidden');
  document.getElementById('pinCheck').classList.remove('hidden');
}

function handlePincode(el) {
  var val = el.value.replace(/\D/g,'').slice(0,6);
  el.value = val;

  if (val.length === 6) {
    document.getElementById('pinLoader').classList.remove('hidden');
    document.getElementById('pinCheck').classList.add('hidden');
    document.getElementById('afterPincode').style.display = 'none';
    setTimeout(function() { revealFields(val); }, 600);
  } else {
    document.getElementById('pinLoader').classList.add('hidden');
    document.getElementById('pinCheck').classList.add('hidden');
    document.getElementById('afterPincode').style.display = 'none';
  }
}

function detectLocation() {
  var btn = document.getElementById('locBtn');
  btn.innerHTML =
    '<svg class="animate-spin" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>' +
    '<span class="text-[12px] font-semibold text-[#0E7A4E]">Detecting…</span>';

  setTimeout(function() {
    var pin = '452001';
    var el = document.getElementById('f-pincode');
    el.value = pin;
    revealFields(pin);
    showToast('Location detected · fields auto-filled');

    btn.innerHTML =
      '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2.5"><path d="M5 12l5 5L20 7"/></svg>' +
      '<span class="text-[12px] font-semibold text-[#0E7A4E]">Address detected</span>';
  }, 1200);
}
</script>
</body>
</html>
