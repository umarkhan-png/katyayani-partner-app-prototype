<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shop Details &middot; Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #1a1a1a; }
  .device { width: 390px; margin: 24px auto; background: #fff; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; }
  .scroll-area { height: 100%; overflow-y: auto; padding-bottom: 90px; }
  .scroll-area::-webkit-scrollbar { display: none; }
  .brand-font { font-family: 'Poppins', sans-serif; font-weight: 700; letter-spacing: -0.02em; }
  .input { width: 100%; border: 1.5px solid #EDEDED; border-radius: 12px; padding: 12px 14px; font-size: 14px; font-weight: 500; color: #1C1C1C; outline: none; background: #fff; }
  .input::placeholder { color: #9E9E9E; font-weight: 400; }
  .input:focus { border-color: #0E7A4E; box-shadow: 0 0 0 3px rgba(14,122,78,0.12); }
  .input.readonly { background: #F8F8F8; color: #606060; }
  .label { font-size: 10px; font-weight: 600; color: #606060; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
</style>
</head>
<body>
<div class="device bg-white">
<div class="scroll-area">

  <!-- HEADER -->
  <div class="px-4 pt-7 pb-3 flex items-center gap-3 bg-white border-b border-[#EDEDED]">
    <a href="rapido-profile.html" class="w-9 h-9 rounded-full border border-[#EDEDED] flex items-center justify-center">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <div class="flex-1">
      <div class="brand-font text-[18px] text-[#1C1C1C]">Shop Details</div>
    </div>
    <a href="rapido-signup-success.html" class="text-[11px] font-semibold text-[#0E7A4E]">Skip</a>
  </div>

  <!-- FORM -->
  <div class="px-4 pt-5 space-y-3.5">

    <div>
      <div class="label">Shop Name</div>
      <input class="input" placeholder="e.g. Maheshwari Krishi Kendra" value="Maheshwari Krishi Kendra"/>
    </div>

    <div>
      <div class="label">Shop Number / Building Name</div>
      <input class="input" placeholder="Shop 12, Krishna Complex" value="Shop 12, Krishna Complex"/>
    </div>

    <div>
      <div class="label">Village / Area</div>
      <input class="input" placeholder="Sapna Sangeeta" value="Sapna Sangeeta"/>
    </div>

    <div>
      <div class="label">Landmark / Nearby Place</div>
      <input class="input" placeholder="Near Geeta Bhawan"/>
    </div>

    <div>
      <div class="label">City / Tehsil / Post Office</div>
      <input class="input" placeholder="Enter your city, tehsil or PO" value="Sapna Sangeeta"/>
    </div>

    <div>
      <div class="flex items-center justify-between mb-1.5">
        <span class="label" style="margin-bottom:0">Pincode</span>
        <button class="flex items-center gap-1 text-[10px] font-semibold text-[#0E7A4E]">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/></svg>
          Use my location
        </button>
      </div>
      <input class="input" value="452001" maxlength="6"/>
    </div>

    <div class="grid grid-cols-2 gap-3">
      <div>
        <div class="label">District</div>
        <input class="input readonly" value="Indore" readonly/>
      </div>
      <div>
        <div class="label">State</div>
        <input class="input readonly" value="Madhya Pradesh" readonly/>
      </div>
    </div>

  </div>

  <div class="h-4"></div>
</div>

<!-- STICKY CTA -->
<div class="absolute bottom-0 left-0 right-0 bg-white border-t border-[#EDEDED] px-4 py-3">
  <a href="rapido-signup-success.html" class="block bg-[#0E7A4E] text-white text-center py-3 rounded-xl text-[13px] font-semibold uppercase tracking-wider">
    Save &amp; Continue
  </a>
</div>

</div>
<div class="text-center text-white/60 text-xs pb-6">New Flow · <a href="rapido-profile.html" class="underline">Prev</a> · <a href="rapido-signup-success.html" class="underline">Next</a> · <a href="../index.html" class="underline">All</a></div>
</body>
</html>
