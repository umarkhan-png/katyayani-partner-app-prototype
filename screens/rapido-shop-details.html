<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shop Details · Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #1a1a1a; }
  .device { width: 390px; margin: 24px auto; background: #fff; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; }
  .scroll-area { height: 100%; overflow-y: auto; padding-bottom: 90px; }
  .scroll-area::-webkit-scrollbar { display: none; }
  .input { width: 100%; border: 1.5px solid #EDEDED; border-radius: 12px; padding: 12px 14px; font-size: 14px; font-weight: 500; color: #1C1C1C; outline: none; background: #fff; font-family: 'Poppins', sans-serif; }
  .input:focus { border-color: #0E7A4E; box-shadow: 0 0 0 3px rgba(14,122,78,0.12); }
  .input::placeholder { color: #9E9E9E; font-weight: 400; }
  .input.readonly { background: #F8F8F8; color: #606060; }
  .label { font-size: 10px; font-weight: 600; color: #606060; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
  .upload-box { border: 2px dashed #D4D4D4; border-radius: 16px; padding: 16px; text-align: center; cursor: pointer; transition: all .15s; }
  .upload-box:hover { border-color: #0E7A4E; background: #F0FDF5; }
</style>
</head>
<body>
<div class="device bg-white">
<div class="scroll-area">

  <!-- HEADER -->
  <div class="px-4 pt-7 pb-4 flex items-center justify-between">
    <a href="rapido-profile.html" class="w-9 h-9 rounded-full border border-[#EDEDED] flex items-center justify-center">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <a href="rapido-help.html" class="flex items-center gap-1.5 border border-[#EDEDED] rounded-full px-3 py-1.5">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1C1C1C" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
      <span class="text-[12px] font-semibold text-[#1C1C1C]">Help</span>
    </a>
  </div>
  <div class="h-px bg-[#EDEDED]"></div>

  <div id="cust-content-area" class="px-5 pt-4">

    <!-- Title -->
    <div class="text-[22px] font-bold text-[#1C1C1C] leading-tight">Shop Details</div>
    <div class="text-[12px] text-[#707070] mt-1.5 mb-5">Tell us about your shop.</div>

    <!-- SHOP NAME -->
    <div class="mb-3">
      <div class="label cust-label">Shop Name</div>
      <input class="input cust-input" placeholder="e.g. Maheshwari Krishi Kendra"/>
    </div>

    <!-- SHOP ADDRESS HEADING -->
    <div class="flex items-center justify-between mb-3">
      <div class="text-[13px] font-bold text-[#1C1C1C]">Shop Address</div>
      <button id="locBtn" class="flex items-center gap-1.5 text-[11px] font-semibold text-[#0E7A4E]" onclick="detectLocation()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
        Auto-fill
      </button>
    </div>

    <!-- ADDRESS FIELDS -->
    <div class="mb-3">
      <div class="label cust-label">Pincode</div>
      <input id="f-building" class="input cust-input" placeholder="Enter 6-digit pincode" maxlength="6" type="tel"/>
    </div>

    <div class="mb-3" style="display:none;">
      <div class="label cust-label">Village / Area / Street</div>
      <input id="f-area" class="input cust-input" placeholder="Sapna Sangeeta Road"/>
    </div>

    <div class="mb-3" style="display:none;">
      <div class="label cust-label">Landmark</div>
      <input id="f-landmark" class="input cust-input" placeholder="Near Geeta Bhawan"/>
    </div>

    <div class="mb-3" style="display:none;">
      <div class="label cust-label">City / Tehsil / Post Office</div>
      <input id="f-city" class="input cust-input" placeholder="Enter city or tehsil"/>
    </div>

    <div class="mb-3" style="display:none;">
      <div class="label cust-label">Pincode</div>
      <input id="f-pincode" class="input cust-input" placeholder="Enter pincode" maxlength="6" type="tel"/>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-3" style="display:none;">
      <div>
        <div class="label cust-label">District</div>
        <input id="f-district" class="input cust-input" placeholder="District" readonly style="background:#F8F8F8;color:#606060;"/>
      </div>
      <div>
        <div class="label cust-label">State</div>
        <input id="f-state" class="input cust-input" placeholder="State" readonly style="background:#F8F8F8;color:#606060;"/>
      </div>
    </div>

    <div class="h-4"></div>
  </div>

  <!-- Toast: lightweight 'location detected' feedback -->
  <div id="locToast" class="absolute left-1/2 bottom-24 -translate-x-1/2 flex items-center gap-2 bg-[#1C1C1C] text-white px-3.5 py-2 rounded-full text-[11.5px] font-semibold shadow-lg whitespace-nowrap opacity-0 pointer-events-none transition-all duration-300" style="transform: translate(-50%, 10px);">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#7FD0A3" stroke-width="3"><path d="M5 12l5 5L20 7"/></svg>
    <span>Location detected · fields auto-filled</span>
  </div>

<script>
function showLocToast() {
  const t = document.getElementById('locToast');
  t.style.opacity = '1';
  t.style.transform = 'translate(-50%, 0)';
  clearTimeout(window.__locToastT);
  window.__locToastT = setTimeout(() => {
    t.style.opacity = '0';
    t.style.transform = 'translate(-50%, 10px)';
  }, 2500);
}

function detectLocation() {
  const btn = document.getElementById('locBtn');
  btn.innerHTML = '<svg class="animate-spin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg> Detecting...';

  setTimeout(function() {
    // Auto-fill fields
    document.getElementById('f-building').value = 'Shop 12, Krishna Complex';
    document.getElementById('f-area').value = 'Sapna Sangeeta Road';
    document.getElementById('f-landmark').value = 'Near Geeta Bhawan';
    document.getElementById('f-city').value = 'Indore';
    document.getElementById('f-pincode').value = '452001';
    document.getElementById('f-district').value = 'Indore';
    document.getElementById('f-state').value = 'Madhya Pradesh';

    // Lightweight feedback
    showLocToast();

    // Update button
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2.5"><path d="M5 12l5 5L20 7"/></svg> Detected';
  }, 1100);
}
</script>
</div>

<!-- STICKY CTA -->
<div class="absolute bottom-0 left-0 right-0 bg-white px-4 py-3 border-t border-[#EDEDED]">
  <a id="cust-cta-btn" href="rapido-signup-success.html" class="block bg-[#0E7A4E] text-white text-center py-3.5 rounded-xl text-[13px] font-bold uppercase tracking-wider">
    Save & Continue
  </a>
</div>
</div>
<div class="text-center text-white/60 text-xs pb-6">New Flow · <a href="rapido-profile.html" class="underline">Prev</a> · <a href="rapido-signup-success.html" class="underline">Next</a> · <a href="../index.html" class="underline">All</a></div>


</body>
</html>
