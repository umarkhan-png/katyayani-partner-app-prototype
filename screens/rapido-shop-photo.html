<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="manifest" href="/katyayani-partner-app-prototype/manifest.json">
  <meta name="theme-color" content="#0E7A4E">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KT Partner">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Shop Details · Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #fff; margin: 0; padding: 0; overflow: hidden; }
  .device { width: 100%; background: #fff; overflow: hidden; position: relative; height: 100vh; }
  .scroll-area { height: 100vh; overflow-y: auto; padding-bottom: calc(90px + env(safe-area-inset-bottom, 20px)); }
  .scroll-area::-webkit-scrollbar { display: none; }
  .input { width: 100%; border: 1.5px solid #EDEDED; border-radius: 10px; padding: 12px 14px; font-size: 14px; font-weight: 500; color: #1C1C1C; outline: none; background: #fff; font-family: 'Poppins', sans-serif; }
  .input:focus { border-color: #0E7A4E; box-shadow: 0 0 0 3px rgba(14,122,78,0.12); }
  .input::placeholder { color: #9E9E9E; font-weight: 400; }
  .input.readonly { background: #F8F8F8; color: #606060; }
  .label { font-size: 10px; font-weight: 600; color: #606060; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
  .upload-box { border: 2px dashed #D4D4D4; border-radius: 10px; padding: 16px; text-align: center; cursor: pointer; transition: all .15s; }
  .upload-box:hover { border-color: #0E7A4E; background: #F0FDF5; }
  @media screen and (max-width: 499px) {
    .device { width: 100vw !important; height: 100vh !important; margin: 0 !important;
              border-radius: 0 !important; border: none !important; }
    .scroll-area { height: 100vh !important; }
  }

  @media screen and (min-width: 500px) {
    html, body { background: #1a1a1a; overflow: auto; }
    .device { width: 390px; height: 780px; margin: 24px auto; border-radius: 36px; border: 8px solid #111; box-shadow: 0 30px 80px rgba(0,0,0,.4); }
    .scroll-area { height: 780px; }
  }
</style>
<style>
@media screen and (max-width: 499px) {
  .scroll-area { padding-top: env(safe-area-inset-top, 24px) !important; }
  .device { box-sizing: border-box; }
}
</style>
</head>
<body>
<div class="device bg-white">
<div class="scroll-area">

  <!-- HEADER -->
  <div class="px-4 pt-7 pb-4 flex items-center justify-between">
    <a href="rapido-signup-success.html" class="w-9 h-9 rounded-full border border-[#EDEDED] flex items-center justify-center">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <a href="rapido-help.html" class="flex items-center gap-1.5 border border-[#EDEDED] rounded-full px-3 py-1.5">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1C1C1C" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>
      <span class="text-[14px] font-semibold text-[#1C1C1C]">Help</span>
    </a>
  </div>
  <div class="h-px bg-[#EDEDED]"></div>

  <div id="cust-content-area" class="px-5 pt-4">

    <!-- Title -->
    <div class="text-[24px] font-bold text-[#1C1C1C] leading-tight">Shop Details</div>
    <div class="text-[14px] text-[#707070] mt-1.5 mb-5">Tell us about your shop.</div>

    <!-- SHOP NAME -->
    <div class="mb-3">
      <div class="label cust-label">Shop Name</div>
      <input class="input cust-input" placeholder="e.g. Maheshwari Krishi Kendra"/>
    </div>

    <!-- SHOP ADDRESS HEADING -->
    <div class="flex items-center justify-between mb-3">
      <div class="text-[15px] font-bold text-[#1C1C1C]">Shop Address</div>
      <button id="locBtn" class="flex items-center gap-1.5 text-[13px] font-semibold text-[#0E7A4E]" onclick="detectLocation()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
        Auto-fill
      </button>
    </div>

    <!-- ADDRESS FIELDS -->
    <div class="mb-3">
      <div class="label cust-label">Shop Number / Building</div>
      <input id="f-building" class="input cust-input" placeholder="Shop 12, Krishna Complex"/>
    </div>

    <div class="mb-3">
      <div class="label cust-label">Village / Area / Street</div>
      <input id="f-area" class="input cust-input" placeholder="Sapna Sangeeta Road"/>
    </div>

    <div class="mb-3">
      <div class="label cust-label">Landmark</div>
      <input id="f-landmark" class="input cust-input" placeholder="Near Geeta Bhawan"/>
    </div>

    <div class="mb-3">
      <div class="label cust-label">City / Tehsil / Post Office</div>
      <input id="f-city" class="input cust-input" placeholder="Enter city or tehsil"/>
    </div>

    <div class="mb-3">
      <div class="label cust-label">Pincode</div>
      <input id="f-pincode" class="input cust-input" placeholder="Enter pincode" maxlength="6" type="tel"/>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-3">
      <div>
        <div class="label cust-label">District</div>
        <input id="f-district" class="input cust-input" placeholder="District" readonly style="background:#F8F8F8;color:#606060;"/>
      </div>
      <div>
        <div class="label cust-label">State</div>
        <input id="f-state" class="input cust-input" placeholder="State" readonly style="background:#F8F8F8;color:#606060;"/>
      </div>
    </div>

    <div class="h-4"></div>
  </div>

  <!-- Toast: lightweight 'location detected' feedback -->
  <div id="locToast" class="absolute left-1/2 bottom-24 -translate-x-1/2 flex items-center gap-2 bg-[#1C1C1C] text-white px-3.5 py-2 rounded-full text-[12px] font-semibold shadow-lg whitespace-nowrap opacity-0 pointer-events-none transition-all duration-300" style="transform: translate(-50%, 10px);">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#7FD0A3" stroke-width="3"><path d="M5 12l5 5L20 7"/></svg>
    <span>Location detected · fields auto-filled</span>
  </div>

<script>
function showLocToast() {
  const t = document.getElementById('locToast');
  t.style.opacity = '1';
  t.style.transform = 'translate(-50%, 0)';
  clearTimeout(window.__locToastT);
  window.__locToastT = setTimeout(() => {
    t.style.opacity = '0';
    t.style.transform = 'translate(-50%, 10px)';
  }, 2500);
}

function detectLocation() {
  const btn = document.getElementById('locBtn');
  btn.innerHTML = '<svg class="animate-spin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg> Detecting...';

  setTimeout(function() {
    // Auto-fill fields
    document.getElementById('f-building').value = 'Shop 12, Krishna Complex';
    document.getElementById('f-area').value = 'Sapna Sangeeta Road';
    document.getElementById('f-landmark').value = 'Near Geeta Bhawan';
    document.getElementById('f-city').value = 'Indore';
    document.getElementById('f-pincode').value = '452001';
    document.getElementById('f-district').value = 'Indore';
    document.getElementById('f-state').value = 'Madhya Pradesh';

    // Lightweight feedback
    showLocToast();

    // Update button
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2.5"><path d="M5 12l5 5L20 7"/></svg> Detected';
  }, 1100);
}
</script>
</div>

<!-- STICKY CTA -->
<div class="absolute bottom-0 left-0 right-0 bg-white px-4 py-3 border-t border-[#EDEDED]" style="padding-bottom:calc(env(safe-area-inset-bottom,0px) + 20px);">
  <a id="cust-cta-btn" href="rapido-home.html" class="block bg-[#0E7A4E] text-white text-center py-3.5 rounded-[10px] text-[15px] font-bold uppercase tracking-wider">
    Save & Continue
  </a>
</div>
</div>
<div class="text-center text-white/60 text-xs pb-6">New Flow · <a href="rapido-signup-success.html" class="underline">Prev</a> · <a href="rapido-home.html" class="underline">Next</a> · <a href="../index.html" class="underline">All</a></div>


  <script>if("serviceWorker"in navigator){navigator.serviceWorker.register("/katyayani-partner-app-prototype/sw.js")}</script>
<script>(function(){if(window.innerWidth>=768)return;document.body.style.cssText="background:#fff;margin:0;padding:0;overflow:hidden";var d=document.querySelector(".device");if(d)d.style.cssText="width:100vw;height:100vh;margin:0;border-radius:0;border:none;box-shadow:none;background:#fff;overflow:hidden;position:relative";var s=document.querySelector(".scroll-area");if(s){s.style.height="100vh";s.style.paddingTop="env(safe-area-inset-top,24px)";}})();</script>
</body>
</html>
