<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shop Details · Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #1a1a1a; }
  .device { width: 390px; margin: 24px auto; background: #fff; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; }
  .scroll-area { height: 100%; overflow-y: auto; padding-bottom: 90px; }
  .scroll-area::-webkit-scrollbar { display: none; }
  .input { width: 100%; border: 1.5px solid #EDEDED; border-radius: 12px; padding: 12px 14px; font-size: 14px; font-weight: 500; color: #1C1C1C; outline: none; background: #fff; font-family: 'Poppins', sans-serif; }
  .input:focus { border-color: #0E7A4E; box-shadow: 0 0 0 3px rgba(14,122,78,0.12); }
  .input::placeholder { color: #9E9E9E; font-weight: 400; }
  .input.readonly { background: #F8F8F8; color: #606060; }
  .label { font-size: 10px; font-weight: 600; color: #606060; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
  .upload-box { border: 2px dashed #D4D4D4; border-radius: 16px; padding: 16px; text-align: center; cursor: pointer; transition: all .15s; }
  .upload-box:hover { border-color: #0E7A4E; background: #F0FDF5; }
</style>
</head>
<body>
<div class="device bg-white">
<div class="scroll-area">

  <!-- HEADER -->
  <div class="px-4 pt-7 pb-3 flex items-center justify-between sticky top-0 bg-white z-20 border-b border-[#EDEDED]">
    <a href="rapido-signup-success.html" class="w-9 h-9 rounded-full border border-[#EDEDED] flex items-center justify-center">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <div id="cust-header-title" class="text-[16px] font-bold text-[#1C1C1C]">Shop Details</div>
    <a href="https://wa.me/919999999999" class="flex items-center gap-1.5 border border-[#EDEDED] rounded-full px-3 py-1.5">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1C1C1C" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
      <span class="text-[12px] font-semibold text-[#1C1C1C]">Help</span>
    </a>
  </div>

  <div id="cust-content-area" class="px-4 pt-4">

    <!-- SHOP NAME -->
    <div class="mb-3">
      <div class="label cust-label">Shop Name</div>
      <input class="input cust-input" placeholder="e.g. Maheshwari Krishi Kendra"/>
    </div>

    <!-- AUTO-FILL LOCATION -->
    <div class="bg-[#F0FDF5] border border-[#0E7A4E]/15 rounded-xl p-3 mb-3 flex items-center gap-3">
      <div class="w-9 h-9 rounded-full bg-[#0E7A4E]/10 flex items-center justify-center flex-shrink-0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      </div>
      <div class="flex-1 min-w-0">
        <div class="text-[11px] font-semibold text-[#1C1C1C]">Auto-fill address</div>
        <div class="text-[9px] text-[#606060]">Use GPS to fill address fields below</div>
      </div>
      <button class="bg-[#0E7A4E] text-white text-[10px] font-semibold px-3 py-1.5 rounded-lg flex-shrink-0">
        Detect
      </button>
    </div>

    <!-- ADDRESS SECTION -->
    <div class="mb-3">
      <div class="label cust-label">Shop Number / Building</div>
      <input class="input cust-input" placeholder="Shop 12, Krishna Complex" value="Shop 12, Krishna Complex"/>
    </div>

    <div class="mb-3">
      <div class="label cust-label">Village / Area / Street</div>
      <input class="input cust-input" placeholder="Sapna Sangeeta Road" value="Sapna Sangeeta"/>
    </div>

    <div class="mb-3">
      <div class="label cust-label">Landmark</div>
      <input class="input cust-input" placeholder="Near Geeta Bhawan"/>
    </div>

    <div class="mb-3">
      <div class="label cust-label">City / Tehsil / Post Office</div>
      <input class="input cust-input" placeholder="Enter city or tehsil" value="Indore"/>
    </div>

    <div class="mb-3">
      <div class="label cust-label">Pincode</div>
      <input class="input cust-input" value="452001" maxlength="6" type="tel"/>
    </div>

    <div id="cust-district-grid" class="grid grid-cols-2 gap-3 mb-3">
      <div>
        <div class="label cust-label">District</div>
        <input class="input cust-input readonly" value="Indore" readonly/>
      </div>
      <div>
        <div class="label cust-label">State</div>
        <input class="input cust-input readonly" value="Madhya Pradesh" readonly/>
      </div>
    </div>

    <div class="h-4"></div>
  </div>
</div>

<!-- STICKY CTA -->
<div class="absolute bottom-0 left-0 right-0 bg-white px-4 py-3 border-t border-[#EDEDED]">
  <a id="cust-cta-btn" href="rapido-license-upload.html" class="block bg-[#0E7A4E] text-white text-center py-3.5 rounded-xl text-[13px] font-bold uppercase tracking-wider">
    Save & Continue
  </a>
</div>
</div>
<div class="text-center text-white/60 text-xs pb-6">New Flow · <a href="rapido-signup-success.html" class="underline">Prev</a> · <a href="rapido-license-upload.html" class="underline">Next</a> · <a href="../index.html" class="underline">All</a></div>


</body>
</html>
