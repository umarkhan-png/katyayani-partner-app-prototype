<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shop Photo · Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #1a1a1a; }
  .device { width: 390px; margin: 24px auto; background: #fff; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; }
  .scroll-area { height: 100%; overflow-y: auto; padding-bottom: 90px; }
  .scroll-area::-webkit-scrollbar { display: none; }
  .input { width: 100%; border: 2px solid #EDEDED; border-radius: 12px; padding: 14px 16px; font-size: 15px; font-weight: 600; color: #1C1C1C; outline: none; background: #fff; font-family: 'Poppins', sans-serif; }
  .input:focus { border-color: #0E7A4E; }
  .input::placeholder { color: #BDBDBD; font-weight: 400; }
  .upload-box { border: 2px dashed #D4D4D4; border-radius: 16px; padding: 16px; text-align: center; cursor: pointer; transition: all .15s; }
  .upload-box:hover { border-color: #0E7A4E; background: #F0FDF5; }
</style>
</head>
<body>
<div class="device bg-white">
<div class="scroll-area">

  <!-- HEADER — Rapido centered title pattern -->
  <div class="px-4 pt-7 pb-3 flex items-center justify-between">
    <a href="rapido-aadhaar-upload.html" class="p-1">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M5 12l6-6M5 12l6 6" stroke="#1C1C1C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <div class="text-[16px] font-bold text-[#1C1C1C]">Shop Details</div>
    <button class="flex items-center gap-1 border border-[#EDEDED] rounded-full px-3 py-1.5">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1C1C1C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
      <span class="text-[11px] font-semibold">Help</span>
    </button>
  </div>
  <div class="h-px bg-[#F0F0F0]"></div>

  <div class="px-5 pt-5">

    <!-- SHOP NAME — Rapido simple form pattern -->
    <div class="text-[13px] font-medium text-[#606060] mb-1.5">Shop name</div>
    <input class="input mb-4" placeholder="e.g. Maheshwari Krishi Kendra"/>

    <!-- SHOP NUMBER PLATE PHOTO — like Rapido vehicle number plate -->
    <div class="text-[13px] font-medium text-[#606060] mb-1.5">Upload shop photos</div>
    <div class="grid grid-cols-2 gap-2.5 mb-4">
      <div class="upload-box">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#9E9E9E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mx-auto"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <div class="text-[10px] text-[#606060] mt-1.5 font-medium">Shop front with<br>name board</div>
      </div>
      <div class="upload-box">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#9E9E9E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mx-auto"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <div class="text-[10px] text-[#606060] mt-1.5 font-medium">Inside view with<br>products</div>
      </div>
    </div>

    <!-- PINCODE — simple input -->
    <div class="text-[13px] font-medium text-[#606060] mb-1.5">Pincode</div>
    <input class="input mb-4" placeholder="Enter 6-digit pincode" type="tel" maxlength="6"/>

    <!-- REFERENCE IMAGE — like Rapido's number plate reference -->
    <div class="bg-[#F8F8F8] rounded-2xl p-4">
      <div class="flex items-start gap-3">
        <div class="w-10 h-10 rounded-xl bg-[#0E7A4E]/10 flex items-center justify-center flex-shrink-0">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h0"/></svg>
        </div>
        <div>
          <div class="text-[11px] font-semibold text-[#1C1C1C]">Tips for good photos</div>
          <div class="text-[10px] text-[#606060] mt-1 leading-relaxed">
            • Shop board must be clearly visible<br>
            • Take photo in daylight<br>
            • Show product shelves in inside photo
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- STICKY CTA -->
<div class="absolute bottom-0 left-0 right-0 bg-white px-5 py-3 border-t border-[#EDEDED]">
  <a href="rapido-complete.html" class="block bg-[#0C831F] text-white text-center py-3.5 rounded-full text-[14px] font-bold">
    Submit
  </a>
</div>
</div>
<div class="text-center text-white/60 text-xs pb-6">Rapido Flow · <a href="rapido-aadhaar-upload.html" class="underline">Prev</a> · <a href="rapido-complete.html" class="underline">Next</a> · <a href="../index.html" class="underline">All</a></div>
</body>
</html>
