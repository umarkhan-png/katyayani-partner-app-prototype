<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #fff; margin: 0; padding: 0; overflow: hidden; }
  .device { width: 100%; background: #fff; overflow: hidden; position: relative; height: 100vh; display: flex; flex-direction: column; }
  .lang-tile { transition: all .12s; }
  .lang-tile:active { background: #F0FDF5; border-color: #0E7A4E; }

  /* Speech bubble shapes — Rapido exact */
  .bubble {
    position: relative;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  .bubble-aa {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.06) 100%);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 18px 18px 4px 18px;
  }
  .bubble-a {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.08) 100%);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 18px 18px 18px 4px;
  }

  .sparkle-dot { animation: sparkleAnim 2.5s ease-in-out infinite; }
  @keyframes sparkleAnim { 0%,100% { opacity: 0.3; } 50% { opacity: 0.8; } }
  .bubble-aa { animation: floatLeft 3s ease-in-out infinite; }
  .bubble-a { animation: floatRight 3s ease-in-out infinite; }
  @keyframes floatLeft { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-6px) rotate(-2deg); } }
  @keyframes floatRight { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-8px) rotate(2deg); } }
    .device { width: 100vw !important; height: 100vh !important; margin: 0 !important;
              border-radius: 0 !important; border: none !important; }
    .scroll-area { height: 100vh !important; }
  }

  @media screen and (min-width: 500px) {
    html, body { background: #1a1a1a; overflow: auto; }
    .device { width: 390px; height: 780px; margin: 24px auto; border-radius: 36px; border: 8px solid #111; box-shadow: 0 30px 80px rgba(0,0,0,.4); }
    .scroll-area { height: 780px; }
  }
</style>
<style>
@media screen and (max-width: 499px) {
  .scroll-area { padding-top: env(safe-area-inset-top, 44px) !important; }
  .device { box-sizing: border-box; }
}
</style>
</head>
