<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="manifest" href="/katyayani-partner-app-prototype/manifest.json">
  <meta name="theme-color" content="#0E7A4E">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KT Partner">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Welcome · Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #fff; margin: 0; padding: 0; overflow: hidden; }
  .device { width: 100%; background: #062A1B; overflow: hidden; position: relative; height: 100vh; display: flex; flex-direction: column; }
  .lang-tile { transition: all .12s; }
  .lang-tile:active { background: #F0FDF5; border-color: #0E7A4E; }

  /* Speech bubble shapes — Rapido exact */
  .bubble {
    position: relative;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  .bubble-aa {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.06) 100%);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 18px 18px 4px 18px;
  }
  .bubble-a {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.08) 100%);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 18px 18px 18px 4px;
  }

  .sparkle-dot { animation: sparkleAnim 2.5s ease-in-out infinite; }
  @keyframes sparkleAnim { 0%,100% { opacity: 0.3; } 50% { opacity: 0.8; } }
  .bubble-aa { animation: floatLeft 3s ease-in-out infinite; }
  .bubble-a { animation: floatRight 3s ease-in-out infinite; }
  @keyframes floatLeft { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-6px) rotate(-2deg); } }
  @keyframes floatRight { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-8px) rotate(2deg); } }
  @media screen and (max-width: 499px) {
    .device { width: 100vw !important; height: 100vh !important; margin: 0 !important;
              border-radius: 0 !important; border: none !important; }
    .scroll-area { height: 100vh !important; }
  }

  @media screen and (min-width: 500px) {
    html, body { background: #1a1a1a; overflow: auto; }
    .device { width: 390px; height: 780px; margin: 24px auto; border-radius: 36px; border: 8px solid #111; box-shadow: 0 30px 80px rgba(0,0,0,.4); }
    .scroll-area { height: 780px; }
  }
</style>
<style>
@media screen and (max-width: 499px) {
  .scroll-area { padding-top: env(safe-area-inset-top, 24px) !important; }
  .device { box-sizing: border-box; }
}
</style>
</head>
<body>
<div class="device">

  <!-- DARK TOP — grows to fill space above white card -->
  <div id="darkTop" class="relative overflow-hidden" style="flex: 1 0 220px; background: linear-gradient(180deg, #021710 0%, #062A1B 40%, #083D28 80%, #0A4A30 100%); display:flex; flex-direction:column;">

    <!-- Logo (left) + Help (right) -->
    <div id="helpRow" class="flex items-center justify-between px-5 flex-shrink-0" style="padding-top: calc(env(safe-area-inset-top,0px) + 20px);">
      <img src="../assets/katyayani-logo-white.png" alt="Katyayani" style="height:71px;width:auto">
      <a href="https://wa.me/919999999999" class="flex items-center gap-1.5 bg-white/10 backdrop-blur border border-white/15 rounded-full px-4 py-2">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>
        <span class="text-white text-[13px] font-semibold">Help</span>
      </a>
    </div>

    <!-- Center group: Welcome + bubbles + brand — vertically centered in remaining space -->
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;padding-bottom:130px">

      <!-- 1. Welcome watermark -->
      <div id="welcomeWrap" class="text-center">
        <div id="welcomeText" class="text-[40px] font-black leading-none tracking-tight" style="color:rgba(255,255,255,0.16)">Welcome</div>
      </div>

      <!-- 2. Illustration — bubbles -->
      <div id="illusWrap" class="relative mx-auto" style="margin-top:16px; width: 140px; height: 80px;">
        <div class="sparkle-dot absolute top-0 left-0 text-white/40 text-[13px]">+</div>
        <div id="bubbleAa" class="bubble bubble-aa absolute bottom-0 left-1" style="z-index: 2; width: 50px; height: 50px; border-radius: 13px 13px 3px 13px;">
          <span id="aaText" class="text-[24px] font-bold text-white/80">आ</span>
        </div>
        <div id="bubbleA" class="bubble bubble-a absolute top-0 right-1" style="z-index: 3; width: 56px; height: 56px; border-radius: 13px 13px 13px 3px;">
          <span id="aText" class="text-[28px] font-bold text-white/90">A</span>
        </div>
        <div class="sparkle-dot absolute bottom-1 right-2 text-white/30 text-[14px]" style="animation-delay: 1s;">✦</div>
      </div>

      <!-- 3. Katyayani Partner -->
      <div id="brandWrap" class="text-center" style="margin-top:16px;">
        <div id="brandText" class="text-[22px] font-bold text-white">Katyayani Partner</div>
      </div>

    </div>
  </div>

  <!-- LANGUAGE SECTION — white bottom sheet -->
  <div id="langSection" class="bg-white relative z-10 flex flex-col px-5 pt-5" style="border-radius:24px 24px 0 0;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 20px);margin-top:-75px;overflow-y:auto;flex-shrink:0">
    <div id="langTitle" class="text-center text-[18px] font-bold text-[#1C1C1C] mb-4">Select App Language</div>

    <!-- 10 languages -->
    <div id="langGrid" class="grid grid-cols-2 gap-2">
      <div onclick="selectLang('English','English')" class="lang-tile bg-white border-[1.5px] border-[#EDEDED] rounded-xl px-3.5 flex flex-col justify-center text-left relative cursor-pointer" style="height:65px"><svg class="absolute top-1/2 -translate-y-1/2 right-3 opacity-30" width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#1C1C1C" stroke-width="2.5" stroke-linecap="round"/></svg><div style="font-size:17px;font-weight:600;color:#1C1C1C;line-height:1.2">English</div><div style="font-size:9px;color:#909090;margin-top:2px">English</div></div>
      <div onclick="selectLang('Hinglish','English + Hindi')" class="lang-tile bg-white border-[1.5px] border-[#EDEDED] rounded-xl px-3.5 flex flex-col justify-center text-left relative cursor-pointer" style="height:65px"><svg class="absolute top-1/2 -translate-y-1/2 right-3 opacity-30" width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#1C1C1C" stroke-width="2.5" stroke-linecap="round"/></svg><div style="font-size:17px;font-weight:600;color:#1C1C1C;line-height:1.2">Hinglish</div><div style="font-size:9px;color:#909090;margin-top:2px">English + Hindi</div></div>
      <div onclick="selectLang('हिन्दी','Hindi')" class="lang-tile bg-white border-[1.5px] border-[#EDEDED] rounded-xl px-3.5 flex flex-col justify-center text-left relative cursor-pointer" style="height:65px"><svg class="absolute top-1/2 -translate-y-1/2 right-3 opacity-30" width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#1C1C1C" stroke-width="2.5" stroke-linecap="round"/></svg><div style="font-size:17px;font-weight:600;color:#1C1C1C;line-height:1.2">हिन्दी</div><div style="font-size:9px;color:#909090;margin-top:2px">Hindi</div></div>
      <div onclick="selectLang('मराठी','Marathi')" class="lang-tile bg-white border-[1.5px] border-[#EDEDED] rounded-xl px-3.5 flex flex-col justify-center text-left relative cursor-pointer" style="height:65px"><svg class="absolute top-1/2 -translate-y-1/2 right-3 opacity-30" width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#1C1C1C" stroke-width="2.5" stroke-linecap="round"/></svg><div style="font-size:17px;font-weight:600;color:#1C1C1C;line-height:1.2">मराठी</div><div style="font-size:9px;color:#909090;margin-top:2px">Marathi</div></div>
      <div onclick="selectLang('ગુજરાતી','Gujarati')" class="lang-tile bg-white border-[1.5px] border-[#EDEDED] rounded-xl px-3.5 flex flex-col justify-center text-left relative cursor-pointer" style="height:65px"><svg class="absolute top-1/2 -translate-y-1/2 right-3 opacity-30" width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#1C1C1C" stroke-width="2.5" stroke-linecap="round"/></svg><div style="font-size:17px;font-weight:600;color:#1C1C1C;line-height:1.2">ગુજરાતી</div><div style="font-size:9px;color:#909090;margin-top:2px">Gujarati</div></div>
      <div onclick="selectLang('తెలుగు','Telugu')" class="lang-tile bg-white border-[1.5px] border-[#EDEDED] rounded-xl px-3.5 flex flex-col justify-center text-left relative cursor-pointer" style="height:65px"><svg class="absolute top-1/2 -translate-y-1/2 right-3 opacity-30" width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#1C1C1C" stroke-width="2.5" stroke-linecap="round"/></svg><div style="font-size:17px;font-weight:600;color:#1C1C1C;line-height:1.2">తెలుగు</div><div style="font-size:9px;color:#909090;margin-top:2px">Telugu</div></div>
      <div onclick="selectLang('தமிழ்','Tamil')" class="lang-tile bg-white border-[1.5px] border-[#EDEDED] rounded-xl px-3.5 flex flex-col justify-center text-left relative cursor-pointer" style="height:65px"><svg class="absolute top-1/2 -translate-y-1/2 right-3 opacity-30" width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#1C1C1C" stroke-width="2.5" stroke-linecap="round"/></svg><div style="font-size:17px;font-weight:600;color:#1C1C1C;line-height:1.2">தமிழ்</div><div style="font-size:9px;color:#909090;margin-top:2px">Tamil</div></div>
      <div onclick="selectLang('ಕನ್ನಡ','Kannada')" class="lang-tile bg-white border-[1.5px] border-[#EDEDED] rounded-xl px-3.5 flex flex-col justify-center text-left relative cursor-pointer" style="height:65px"><svg class="absolute top-1/2 -translate-y-1/2 right-3 opacity-30" width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#1C1C1C" stroke-width="2.5" stroke-linecap="round"/></svg><div style="font-size:17px;font-weight:600;color:#1C1C1C;line-height:1.2">ಕನ್ನಡ</div><div style="font-size:9px;color:#909090;margin-top:2px">Kannada</div></div>
      <div onclick="selectLang('മലയാളം','Malayalam')" class="lang-tile bg-white border-[1.5px] border-[#EDEDED] rounded-xl px-3.5 flex flex-col justify-center text-left relative cursor-pointer" style="height:65px"><svg class="absolute top-1/2 -translate-y-1/2 right-3 opacity-30" width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#1C1C1C" stroke-width="2.5" stroke-linecap="round"/></svg><div style="font-size:17px;font-weight:600;color:#1C1C1C;line-height:1.2">മലയാളം</div><div style="font-size:9px;color:#909090;margin-top:2px">Malayalam</div></div>
      <div onclick="selectLang('বাংলা','Bengali')" class="lang-tile bg-white border-[1.5px] border-[#EDEDED] rounded-xl px-3.5 flex flex-col justify-center text-left relative cursor-pointer" style="height:65px"><svg class="absolute top-1/2 -translate-y-1/2 right-3 opacity-30" width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#1C1C1C" stroke-width="2.5" stroke-linecap="round"/></svg><div style="font-size:17px;font-weight:600;color:#1C1C1C;line-height:1.2">বাংলা</div><div style="font-size:9px;color:#909090;margin-top:2px">Bengali</div></div>
    </div>
  </div>


</div>
<div class="text-center text-white/60 text-xs pb-6"><a href="rapido-phone.html" class="underline">Next</a> · <a href="../index.html" class="underline">All</a></div>

  <script>
  function selectLang(name, sub) {
    if (name) localStorage.setItem('kk-lang', name);
    window.location.href = 'rapido-phone.html';
  }
  </script>

  <script>if("serviceWorker"in navigator){navigator.serviceWorker.register("/katyayani-partner-app-prototype/sw.js")}</script>
<script>(function(){if(window.innerWidth>=768)return;document.body.style.cssText="background:#fff;margin:0;padding:0;overflow:hidden";var d=document.querySelector(".device");if(d)d.style.cssText="width:100vw;height:100vh;margin:0;border-radius:0;border:none;box-shadow:none;background:#062A1B;overflow:hidden;position:relative";var s=document.querySelector(".scroll-area");if(s){s.style.height="100vh";s.style.paddingTop="env(safe-area-inset-top,24px)";}})();</script>
</body>
</html>
