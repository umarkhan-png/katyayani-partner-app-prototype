<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Welcome · Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #1a1a1a; }
  .device { width: 390px; margin: 24px auto; background: #fff; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; }
  .scroll-area { height: 100%; overflow-y: auto; }
  .scroll-area::-webkit-scrollbar { display: none; }
  .lang-tile { transition: all .12s; }
  .lang-tile:active { background: #F0FDF5; border-color: #0E7A4E; }
  .float-bubble { animation: floatY 3s ease-in-out infinite; }
  @keyframes floatY { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  .sparkle { animation: sparkle 2s ease-in-out infinite; }
  @keyframes sparkle { 0%,100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.3); } }
</style>
</head>
<body>
<div class="device">
<div class="scroll-area">

  <!-- DARK TOP — Rapido initial style: floating आ and A bubbles + welcome text + gesture -->
  <div class="relative overflow-hidden" style="min-height: 330px; background: linear-gradient(180deg, #041E14 0%, #083D28 60%, #0A4A30 100%);">

    <!-- Help button -->
    <div class="absolute top-6 right-4 z-10">

    <div class="absolute top-4 left-0 right-0 text-center pointer-events-none">
      <div class="text-[80px] font-black text-white/[0.05] leading-none">हिन्दी</div>
    </div>

    <!-- Floating आ bubble — Rapido exact -->
    <div class="float-bubble absolute top-16 left-5">
      <div class="w-16 h-16 rounded-2xl bg-white/10 backdrop-blur-sm border border-white/15 flex items-center justify-center shadow-lg" style="animation-delay: 0s;">
        <span class="text-[32px] text-white/90 font-bold" style="font-family: 'Poppins', sans-serif;">आ</span>
      </div>
    </div>

    <!-- Floating A bubble — Rapido exact -->
    <div class="float-bubble absolute top-12 right-12" style="animation-delay: 1s;">
      <div class="w-[72px] h-[72px] rounded-2xl bg-white/10 backdrop-blur-sm border border-white/15 flex items-center justify-center shadow-lg">
        <span class="text-[36px] text-white/90 font-bold">A</span>
      </div>
    </div>

    <!-- Sparkle decorations -->
    <div class="sparkle absolute top-28 left-20">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 2l2 7h7l-5.5 4 2 7L12 16l-5.5 4 2-7L3 9h7z"/></svg>
    </div>
    <div class="sparkle absolute top-20 right-6" style="animation-delay: 1.5s;">

    </div>
    <div class="sparkle absolute bottom-28 left-10" style="animation-delay: 0.7s;">

    </div>

    <!-- WELCOME TEXT + GESTURE — directly on dark bg, no phone frame -->
    <div class="relative z-10 text-center mt-28 px-8">
      <div class="text-[#8BC9A5] text-[13px] font-medium">Namaste</div>
      <div class="text-[22px] font-bold text-white leading-tight mt-1">Katyayani Partner<br>mein aapka swagat hai</div>

    </div>
  </div>
