<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #1a1a1a; }
  .device { width: 390px; margin: 24px auto; background: #fff; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; display: flex; flex-direction: column; }
  .lang-tile { transition: all .12s; }
  .lang-tile:active { background: #F0FDF5; border-color: #0E7A4E; }

  /* Speech bubble shapes — Rapido exact */
  .bubble {
    position: relative;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  .bubble-aa {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.06) 100%);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 18px 18px 4px 18px;
  }
  .bubble-a {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.08) 100%);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 18px 18px 18px 4px;
  }

  .sparkle-dot { animation: sparkleAnim 2.5s ease-in-out infinite; }
  @keyframes sparkleAnim { 0%,100% { opacity: 0.3; } 50% { opacity: 0.8; } }
  .bubble-aa { animation: floatLeft 3s ease-in-out infinite; }
  .bubble-a { animation: floatRight 3s ease-in-out infinite; }
  @keyframes floatLeft { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-6px) rotate(-2deg); } }
  @keyframes floatRight { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-8px) rotate(2deg); } }
</style>
</head>

<div class="device">

  <!-- DARK TOP — Rapido exact layout from screenshot -->
