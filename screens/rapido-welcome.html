<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Welcome · Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #1a1a1a; }
  .device { width: 390px; margin: 24px auto; background: #fff; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; }
  .lang-tile { transition: all .12s; }
  .lang-tile:active { background: #F0FDF5; border-color: #0E7A4E; }
  .float-bubble { animation: floatY 3s ease-in-out infinite; }
  @keyframes floatY { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  .sparkle { animation: sparkle 2s ease-in-out infinite; }
  @keyframes sparkle { 0%,100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.3); } }
</style>
</head>
<body>
<div class="device flex flex-col">

  <!-- DARK TOP — compact to give more room to language grid -->
  <div class="relative overflow-hidden flex-shrink-0" style="height: 280px; background: linear-gradient(180deg, #041E14 0%, #083D28 60%, #0A4A30 100%);">

    <!-- Help button -->
    <div class="absolute top-5 right-4 z-10">
      <a href="https://wa.me/919999999999" class="flex items-center gap-1.5 bg-white/10 backdrop-blur border border-white/20 rounded-full px-3 py-1.5">

      <div class="text-[72px] font-black text-white/[0.05] leading-none">हिन्दी</div>
    </div>

    <!-- Floating आ bubble -->
    <div class="float-bubble absolute top-16 left-5">
      <div class="w-14 h-14 rounded-2xl bg-white/10 backdrop-blur-sm border border-white/15 flex items-center justify-center">
        <span class="text-[28px] text-white/90 font-bold">आ</span>
      </div>
    </div>

    <!-- Floating A bubble -->
    <div class="float-bubble absolute top-14 right-12" style="animation-delay: 1s;">
      <div class="w-16 h-16 rounded-2xl bg-white/10 backdrop-blur-sm border border-white/15 flex items-center justify-center">
        <span class="text-[32px] text-white/90 font-bold">A</span>
      </div>
    </div>

    <!-- Sparkles -->
    <div class="sparkle absolute top-28 left-20"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 2l2 7h7l-5.5 4 2 7L12 16l-5.5 4 2-7L3 9h7z"/></svg></div>
    <div class="sparkle absolute top-20 right-6" style="animation-delay:1.5s"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 2l2 7h7l-5.5 4 2 7L12 16l-5.5 4 2-7L3 9h7z"/></svg></div>

      <div class="text-[20px] font-bold text-white leading-tight mt-1">Katyayani Partner<br>mein aapka swagat hai</div>
    </div>
  </div>
