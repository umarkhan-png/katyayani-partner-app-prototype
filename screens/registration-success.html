<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Welcome &middot; Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #1a1a1a; }
  .device { width: 390px; margin: 24px auto; background: #fff; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; }
  .brand-font { font-family: 'Poppins', sans-serif; font-weight: 700; letter-spacing: -0.02em; }

  .check-circle { animation: popIn .6s cubic-bezier(.34,1.56,.64,1) both; }
  @keyframes popIn { 0% { transform: scale(0) rotate(-30deg); opacity: 0; } 60% { transform: scale(1.15) rotate(0deg); opacity: 1; } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }

  .check-tick { opacity: 0; animation: tickIn .35s .55s cubic-bezier(.34,1.56,.64,1) forwards; }
  @keyframes tickIn { 0% { opacity: 0; transform: scale(0.3); } 60% { transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }

  .ring-pulse { animation: ringPulse 2s ease-out infinite; }
  @keyframes ringPulse { 0% { transform: scale(0.85); opacity: .5; } 100% { transform: scale(2.1); opacity: 0; } }

  .sparkle { position: absolute; opacity: 0; animation: sparkle 1.4s .8s ease-out forwards; }
  @keyframes sparkle { 0% { opacity: 0; transform: scale(0) translate(0,0); } 50% { opacity: 1; } 100% { opacity: 0; transform: scale(1.2) translate(var(--dx), var(--dy)); } }

  .greet-1 { opacity: 0; animation: fadeUp .5s 1s ease-out forwards; }
  .greet-2 { opacity: 0; animation: fadeUp .5s 1.25s ease-out forwards; }
  .greet-3 { opacity: 0; animation: fadeUp .5s 1.5s ease-out forwards; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="device bg-white">
<div class="h-full flex flex-col items-center justify-center px-8 text-center relative">

  <!-- Animated check with sparkles -->
  <div class="relative w-28 h-28 mb-7 flex items-center justify-center">
    <div class="absolute inset-0 rounded-full bg-[#0E7A4E]/20 ring-pulse"></div>
    <div class="absolute inset-0 rounded-full bg-[#0E7A4E]/15 ring-pulse" style="animation-delay:.5s"></div>

    <!-- Sparkles -->
    <div class="sparkle" style="top:-4px;left:50%;--dx:0px;--dy:-14px;color:#FFE08A">✦</div>
    <div class="sparkle" style="top:50%;right:-4px;--dx:14px;--dy:0px;color:#3BA86C;animation-delay:.95s">✦</div>
    <div class="sparkle" style="bottom:-4px;left:50%;--dx:0px;--dy:14px;color:#FFE08A;animation-delay:1.05s">✦</div>
    <div class="sparkle" style="top:50%;left:-4px;--dx:-14px;--dy:0px;color:#3BA86C;animation-delay:.9s">✦</div>
    <div class="sparkle" style="top:8%;left:8%;--dx:-12px;--dy:-12px;color:#D4A537;animation-delay:1s">✦</div>
    <div class="sparkle" style="top:8%;right:8%;--dx:12px;--dy:-12px;color:#D4A537;animation-delay:1.1s">✦</div>

    <div class="check-circle relative w-24 h-24 rounded-full flex items-center justify-center" style="background: linear-gradient(135deg,#0E7A4E,#0C831F); box-shadow: 0 18px 40px -8px rgba(14,122,78,.55);">
      <svg class="check-tick" width="48" height="48" viewBox="0 0 24 24" fill="none">
        <path d="M5 12.5l5 5L19 7.5" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
  </div>

  <!-- Localized greeting -->
  <div class="greet-1 text-[14px] font-semibold text-[#0E7A4E] tracking-wide" id="greeting">Namaste</div>
  <div class="greet-2 brand-font text-[28px] text-[#1C1C1C] mt-1" id="userName">Umar Khan</div>
  <div class="greet-3 text-[12px] text-[#606060] font-medium mt-3 leading-snug max-w-[260px]">You're now part of the Katyayani family</div>


</div>
</div>

<script>
  const greetings = {
    'English':   'Welcome',
    'Hinglish':  'Welcome',
    'हिंदी':      'नमस्ते',
    'मराठी':     'नमस्कार',
    'ગુજરાતી':   'નમસ્તે',
    'ਪੰਜਾਬੀ':    'ਸਤ ਸ੍ਰੀ ਅਕਾਲ',
    'తెలుగు':    'నమస్కారం',
    'தமிழ்':     'வணக்கம்',
    'ಕನ್ನಡ':     'ನಮಸ್ಕಾರ',
    'മലയാളം':   'നമസ്കാരം',
    'ଓଡ଼ିଆ':     'ନମସ୍କାର',
    'বাংলা':     'নমস্কার',
  };

  const lang = localStorage.getItem('kk-lang') || 'English';
  document.getElementById('greeting').textContent = greetings[lang] || greetings['English'];

  setTimeout(() => { window.location.href = 'shop-details.html'; }, 3000);
</script>

<div class="text-center text-white/60 text-xs pb-6">Welcome &middot; <a href="profile-setup.html" class="underline">Profile</a> &middot; <a href="shop-details.html" class="underline">Shop</a> &middot; <a href="../index.html" class="underline">All</a></div>
</body>
</html>
