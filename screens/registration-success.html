<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Welcome &middot; Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #1a1a1a; }
  .device { width: 390px; margin: 24px auto; background: #fff; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; }
  .brand-font { font-family: 'Poppins', sans-serif; font-weight: 700; letter-spacing: -0.02em; }

  .check-circle { animation: popIn .55s cubic-bezier(.34,1.56,.64,1) both; }
  @keyframes popIn { 0% { transform: scale(0); } 60% { transform: scale(1.15); } 100% { transform: scale(1); } }

  .ring-pulse { animation: ringPulse 1.8s ease-out infinite; }
  @keyframes ringPulse { 0% { transform: scale(0.8); opacity: .55; } 100% { transform: scale(2); opacity: 0; } }

  .tick-path { stroke-dasharray: 30; stroke-dashoffset: 30; animation: drawTick .45s .45s ease-out forwards; }
  @keyframes drawTick { to { stroke-dashoffset: 0; } }

  .greet-1 { opacity: 0; animation: fadeUp .5s .9s ease-out forwards; }
  .greet-2 { opacity: 0; animation: fadeUp .5s 1.15s ease-out forwards; }
  .greet-3 { opacity: 0; animation: fadeUp .5s 1.4s ease-out forwards; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .progress-bar { animation: progressFill 3s linear forwards; }
  @keyframes progressFill { from { width: 0%; } to { width: 100%; } }
</style>
</head>
<body>
<div class="device bg-white">
<div class="h-full flex flex-col items-center justify-center px-8 text-center relative">

  <!-- Animated check -->
  <div class="relative w-24 h-24 mb-7">
    <div class="absolute inset-0 rounded-full bg-[#0E7A4E]/20 ring-pulse"></div>
    <div class="absolute inset-0 rounded-full bg-[#0E7A4E]/15 ring-pulse" style="animation-delay:.4s"></div>
    <div class="check-circle relative w-24 h-24 rounded-full flex items-center justify-center" style="background: linear-gradient(135deg,#0E7A4E,#0C831F); box-shadow: 0 16px 40px -8px rgba(14,122,78,.5);">
      <svg width="44" height="44" viewBox="0 0 64 64" fill="none">
        <path class="tick-path" d="M18 33 L28 43 L46 22" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
  </div>

  <!-- Localized greeting -->
  <div class="greet-1 text-[14px] font-semibold text-[#0E7A4E] tracking-wide" id="greeting">Namaste</div>
  <div class="greet-2 brand-font text-[28px] text-[#1C1C1C] mt-1" id="userName">Umar Khan</div>
  <div class="greet-3 text-[12px] text-[#606060] font-medium mt-3 leading-snug max-w-[260px]">You're now part of the Katyayani family</div>

  <!-- Auto-redirect progress -->
  <div class="absolute bottom-12 left-1/2 -translate-x-1/2 w-32 h-0.5 bg-[#EDEDED] rounded-full overflow-hidden">
    <div class="h-full bg-[#0E7A4E] progress-bar"></div>
  </div>

</div>
</div>

<script>
  const greetings = {
    'English':   'Welcome',
    'Hinglish':  'Welcome',
    'हिंदी':      'नमस्ते',
    'मराठी':     'नमस्कार',
    'ગુજરાતી':   'નમસ્તે',
    'ਪੰਜਾਬੀ':    'ਸਤ ਸ੍ਰੀ ਅਕਾਲ',
    'తెలుగు':    'నమస్కారం',
    'தமிழ்':     'வணக்கம்',
    'ಕನ್ನಡ':     'ನಮಸ್ಕಾರ',
    'മലയാളം':   'നമസ്കാരം',
    'ଓଡ଼ିଆ':     'ନମସ୍କାର',
    'বাংলা':     'নমস্কার',
  };

  const lang = localStorage.getItem('kk-lang') || 'English';
  document.getElementById('greeting').textContent = greetings[lang] || greetings['English'];

  setTimeout(() => { window.location.href = 'shop-details.html'; }, 3000);
</script>

<div class="text-center text-white/60 text-xs pb-6">Welcome &middot; <a href="profile-setup.html" class="underline">Profile</a> &middot; <a href="shop-details.html" class="underline">Shop</a> &middot; <a href="../index.html" class="underline">All</a></div>
</body>
</html>
