var activeCrop = 'rice';
var activeFilter = 'all';
var pendingFilter = 'all';

/* ---- CROPS ---- */
function renderCrops() {
  var html = '';
  Object.keys(CROPS).forEach(function(key) {
    var c = CROPS[key];
    var isActive = key === activeCrop;
    var borderStyle = isActive ? 'border:2px solid #0E7A4E' : 'border:1px solid #EDEDED';
    var labelStyle = isActive ? 'color:#0E7A4E;font-weight:600' : 'color:#1C1C1C;font-weight:500';
    html += '<button onclick="selectCrop(\'' + key + '\')" style="display:flex;flex-direction:column;align-items:center;min-width:68px;background:none;border:none;cursor:pointer;padding:0">'
      + '<div style="width:60px;height:60px;border-radius:16px;' + borderStyle + ';overflow:hidden;position:relative">'
      + '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px;background:' + c.bg + '">' + c.emoji + '</div>'
      + '</div>'
      + '<div style="font-size:12px;' + labelStyle + ';margin-top:6px;font-family:Poppins,sans-serif">' + c.label + '</div>'
      + '</button>';
  });
  document.getElementById('crop-selector').innerHTML = html;
}

function selectCrop(key) {
  activeCrop = key;
  renderCrops();
  renderDiseases();
}

/* ---- DISEASES ---- */
function renderDiseases() {
  var crop = CROPS[activeCrop];
  var list = activeFilter === 'all' ? crop.diseases : crop.diseases.filter(function(d){return d.type === activeFilter;});
  document.getElementById('list-title').textContent = 'Common ' + crop.label + ' Problems';
  document.getElementById('list-count').textContent = list.length + ' of ' + crop.total;

  if (!list.length) {
    document.getElementById('disease-list').innerHTML = '<div style="text-align:center;padding:32px 0;color:#606060;font-size:13px">No problems found for this filter.</div>';
    return;
  }

  var html = '';
  list.forEach(function(d, i) {
    var tc = TYPE_COLOR[d.type] || '#606060';
    var typeLabel = d.type.charAt(0).toUpperCase() + d.type.slice(1);
    html += '<a href="categories.html" style="display:flex;align-items:center;gap:12px;background:white;border:1px solid #EDEDED;border-radius:16px;padding:12px;text-decoration:none">'
      + '<div id="dbox-' + activeCrop + '-' + i + '" style="width:48px;height:48px;border-radius:12px;overflow:hidden;flex-shrink:0;background:#F0FDF5;display:flex;align-items:center;justify-content:center;font-size:22px">'
      + '<img id="dimg-' + activeCrop + '-' + i + '" src="" alt="' + d.name + '" style="width:100%;height:100%;object-fit:cover;display:none" onerror="this.style.display=\'none\'">'
      + '<span id="dfb-' + activeCrop + '-' + i + '">' + d.fb + '</span>'
      + '</div>'
      + '<div style="flex:1;min-width:0">'
      + '<div style="font-size:15px;font-weight:600;color:#1C1C1C">' + d.name + '</div>'
      + '<div style="font-size:12px;color:#606060;margin-top:2px">' + d.desc + '</div>'
      + '<div style="display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap">'
      + '<span style="font-size:9px;font-weight:600;color:#0C831F;background:#F0FDF5;border:1px solid rgba(14,122,78,0.3);padding:2px 6px;border-radius:4px">' + d.products + ' products</span>'
      + '<span style="font-size:9px;font-weight:600;color:' + tc + '">Margin ' + d.margin + '</span>'
      + '<span style="font-size:9px;font-weight:500;color:' + tc + ';background:' + tc + '1A;padding:2px 6px;border-radius:4px">' + typeLabel + '</span>'
      + '</div>'
      + '</div>'
      + '<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#9E9E9E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>'
      + '</a>';
  });
  document.getElementById('disease-list').innerHTML = html;

  list.forEach(function(d, i) { loadWikiImage(d.wiki, activeCrop, i); });
}

/* ---- WIKI IMAGE ---- */
function loadWikiImage(page, cropKey, idx) {
  var imgEl = document.getElementById('dimg-' + cropKey + '-' + idx);
  var fbEl  = document.getElementById('dfb-'  + cropKey + '-' + idx);
  if (!imgEl) return;
  fetch('https://en.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(page))
    .then(function(r){return r.json();})
    .then(function(data){
      if (data.thumbnail && data.thumbnail.source) {
        imgEl.src = data.thumbnail.source;
        imgEl.style.display = 'block';
        if (fbEl) fbEl.style.display = 'none';
      }
    })
    .catch(function(){});
}

/* ---- FILTER CHIPS ---- */
function renderFilterChips() {
  var html = '';
  FILTER_TYPES.forEach(function(f) {
    var isActive = f.key === pendingFilter;
    var style = isActive
      ? 'padding:6px 14px;border:1.5px solid #0C831F;border-radius:50px;font-size:13px;font-weight:600;color:white;background:#0C831F;cursor:pointer;font-family:Poppins,sans-serif'
      : 'padding:6px 14px;border:1.5px solid #EDEDED;border-radius:50px;font-size:13px;font-weight:500;color:#606060;background:white;cursor:pointer;font-family:Poppins,sans-serif';
    html += '<button onclick="togglePendingFilter(\'' + f.key + '\')" style="' + style + '">' + f.label + '</button>';
  });
  document.getElementById('filter-chips').innerHTML = html;
}

function togglePendingFilter(key) { pendingFilter = key; renderFilterChips(); }

function openFilter() {
  pendingFilter = activeFilter;
  renderFilterChips();
  document.getElementById('filter-backdrop').style.display = 'block';
  document.getElementById('filter-sheet').style.transform = 'translateY(0)';
}

function closeFilter() {
  document.getElementById('filter-backdrop').style.display = 'none';
  document.getElementById('filter-sheet').style.transform = 'translateY(100%)';
}

function applyFilter() {
  activeFilter = pendingFilter;
  document.getElementById('filter-badge').style.display = activeFilter !== 'all' ? 'block' : 'none';
  closeFilter();
  renderDiseases();
}

function resetFilter() { pendingFilter = 'all'; renderFilterChips(); }

/* ---- INIT ---- */
renderCrops();
renderDiseases();
renderFilterChips();
</script>
