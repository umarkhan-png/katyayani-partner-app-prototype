<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shop Details · Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #1a1a1a; }
  .device { width: 390px; margin: 24px auto; background: #fff; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; }
  .scroll-area { height: 100%; overflow-y: auto; padding-bottom: 90px; }
  .scroll-area::-webkit-scrollbar { display: none; }
  .input { width: 100%; border: 1.5px solid #EDEDED; border-radius: 12px; padding: 12px 14px; font-size: 14px; font-weight: 500; color: #1C1C1C; outline: none; background: #fff; transition: border-color .15s, box-shadow .15s; }
  .input::placeholder { color: #BDBDBD; font-weight: 400; }
  .input:focus { border-color: #0E7A4E; box-shadow: 0 0 0 3px rgba(14,122,78,0.12); }
  .input.filled { border-color: #0E7A4E; background: #FAFFFE; }
  .input.auto { background: #F8F8F8; color: #606060; border-color: #EDEDED; }
  .label { font-size: 10px; font-weight: 700; color: #606060; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .opt-badge { font-size: 9px; font-weight: 500; color: #9E9E9E; text-transform: none; letter-spacing: 0; background: #F5F5F5; border-radius: 4px; padding: 1px 6px; }
  .slide-in { animation: slideIn .22s ease-out both; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="device bg-white">
<div class="scroll-area">

  <!-- HEADER -->
  <div class="px-4 pt-7 pb-3 flex items-center gap-3 bg-white border-b border-[#EDEDED]">
    <a href="profile-setup.html" class="w-9 h-9 rounded-full border border-[#EDEDED] flex items-center justify-center flex-shrink-0">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <div class="flex-1">
      <div class="text-[18px] font-extrabold text-[#1C1C1C] leading-tight">Shop Details</div>
      <div class="text-[11px] text-[#9E9E9E] font-normal mt-0.5">Fill your shop address for deliveries</div>
    </div>
    <a href="home.html" class="text-[11px] font-semibold text-[#0E7A4E]">Skip</a>
  </div>

  <div class="px-4 pt-5 space-y-4">

    <!-- Shop Name -->
    <div>
      <div class="label">Shop Name</div>
      <input class="input filled" placeholder="e.g. Maheshwari Krishi Kendra" value="Maheshwari Krishi Kendra"/>
    </div>

    <!-- Shop Number -->
    <div>
      <div class="label">Shop No. / Building Name</div>
      <input class="input filled" placeholder="e.g. Shop 12, Krishna Complex" value="Shop 12, Krishna Complex"/>
    </div>

    <!-- DIVIDER -->
    <div class="flex items-center gap-2 pt-1">
      <div class="flex-1 h-px bg-[#F0F0F0]"></div>
      <span class="text-[10px] font-semibold text-[#BDBDBD] uppercase tracking-wider">Shop Address</span>
      <div class="flex-1 h-px bg-[#F0F0F0]"></div>
    </div>

    <!-- AUTO-FILL — PROMINENT -->
    <button id="autoFillBtn" onclick="simulateAutoFill()" class="w-full flex items-center gap-3 rounded-2xl px-4 py-3.5 border-2 border-[#0E7A4E] text-left" style="background:linear-gradient(135deg,#F0FDF5 0%,#E6F7EF 100%);">
      <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0" style="background:linear-gradient(135deg,#0E7A4E,#083D28);">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
        </svg>
      </div>
      <div class="flex-1">
        <div class="text-[13px] font-bold text-[#0E7A4E]">Auto-fill using GPS</div>
        <div class="text-[11px] text-[#606060] font-normal mt-0.5">Detect pincode, district &amp; state automatically</div>
      </div>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2.5" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg>
    </button>

    <!-- OR -->
    <div class="flex items-center gap-3">
      <div class="flex-1 h-px bg-[#EDEDED]"></div>
      <span class="text-[11px] text-[#BDBDBD] font-medium">or enter manually</span>
      <div class="flex-1 h-px bg-[#EDEDED]"></div>
    </div>

    <!-- PINCODE — only field visible initially -->
    <div>
      <div class="label">Pincode</div>
      <div class="relative">
        <input id="pincodeInput" class="input" type="tel" maxlength="6" placeholder="Enter 6-digit pincode"
               oninput="handlePincode(this)" style="padding-right:44px;"/>
        <div id="pincodeLoader" class="hidden absolute right-3 top-1/2 -translate-y-1/2">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2.5" stroke-linecap="round" class="animate-spin"><path d="M12 2v4M12 18v4M4.9 4.9l2.8 2.8M16.3 16.3l2.8 2.8M2 12h4M18 12h4M4.9 19.1l2.8-2.8M16.3 7.7l2.8-2.8"/></svg>
        </div>
        <div id="pincodeCheck" class="hidden absolute right-3 top-1/2 -translate-y-1/2">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="#0E7A4E"/><path d="M8 12l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
    </div>

    <!-- FIELDS AFTER PINCODE — hidden until 6 digits entered -->
    <div id="afterPincode" style="display:none;" class="space-y-4">

      <!-- District + State — auto-filled read-only -->
      <div class="grid grid-cols-2 gap-3 slide-in">
        <div>
          <div class="label">
            District
            <span style="font-size:9px;background:#E8F5E9;color:#0E7A4E;border-radius:4px;padding:1px 6px;font-weight:600;text-transform:none;letter-spacing:0;">Auto-filled</span>
          </div>
          <div class="relative">
            <input id="districtInput" class="input auto" readonly placeholder="District"/>
            <svg class="absolute right-3 top-1/2 -translate-y-1/2" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2.5"><path d="M5 12l5 5L20 7"/></svg>
          </div>
        </div>
        <div>
          <div class="label">
            State
            <span style="font-size:9px;background:#E8F5E9;color:#0E7A4E;border-radius:4px;padding:1px 6px;font-weight:600;text-transform:none;letter-spacing:0;">Auto-filled</span>
          </div>
          <div class="relative">
            <input id="stateInput" class="input auto" readonly placeholder="State"/>
            <svg class="absolute right-3 top-1/2 -translate-y-1/2" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2.5"><path d="M5 12l5 5L20 7"/></svg>
          </div>
        </div>
      </div>

      <!-- Village / Area — Optional -->
      <div class="slide-in" style="animation-delay:.06s">
        <div class="label">Village / Area <span class="opt-badge">Optional</span></div>
        <input class="input" placeholder="Colony, sector, village name…"/>
      </div>

      <!-- City / Tehsil — Optional -->
      <div class="slide-in" style="animation-delay:.1s">
        <div class="label">City / Tehsil / Post Office <span class="opt-badge">Optional</span></div>
        <input class="input" placeholder="e.g. Mhow, Depalpur, Sanwer…"/>
      </div>

      <!-- Landmark — Optional -->
      <div class="slide-in" style="animation-delay:.14s">
        <div class="label">Landmark <span class="opt-badge">Optional</span></div>
        <input class="input" placeholder="e.g. Near Geeta Bhawan, opp. SBI ATM…"/>
      </div>

    </div>

  </div>

  <div class="h-4"></div>
</div>

<!-- STICKY CTA -->
<div class="absolute bottom-0 left-0 right-0 bg-white border-t border-[#EDEDED] px-4 py-3">
  <a href="kyc.html" class="block bg-gradient-to-r from-[#041E14] to-[#0E7A4E] text-white text-center py-3.5 rounded-xl text-[13px] font-bold uppercase tracking-wider">
    Save &amp; Continue
  </a>
</div>

</div>
<div class="text-center text-white/60 text-xs pb-6">
  <a href="profile-setup.html" class="underline">Prev</a> · <a href="kyc.html" class="underline">Next</a> · <a href="../index.html" class="underline">All</a>
</div>

<script>
// Pincode → district/state lookup (demo data)
var PINDB = {
  '452001': ['Indore','Madhya Pradesh'],
  '452002': ['Indore','Madhya Pradesh'],
  '452003': ['Indore','Madhya Pradesh'],
  '411001': ['Pune','Maharashtra'],
  '400001': ['Mumbai','Maharashtra'],
  '110001': ['Central Delhi','Delhi'],
  '302001': ['Jaipur','Rajasthan'],
  '226001': ['Lucknow','Uttar Pradesh'],
  '380001': ['Ahmedabad','Gujarat'],
  '500001': ['Hyderabad','Telangana'],
  '600001': ['Chennai','Tamil Nadu'],
  '700001': ['Kolkata','West Bengal'],
};

function handlePincode(el) {
  var val = el.value.replace(/\D/g,'').slice(0,6);
  el.value = val;
  var loader = document.getElementById('pincodeLoader');
  var check  = document.getElementById('pincodeCheck');
  var after  = document.getElementById('afterPincode');

  if (val.length === 6) {
    el.classList.add('filled');
    loader.classList.remove('hidden');
    check.classList.add('hidden');
    after.style.display = 'none';

    setTimeout(function() {
      loader.classList.add('hidden');
      var data = PINDB[val];
      if (data) {
        document.getElementById('districtInput').value = data[0];
        document.getElementById('stateInput').value    = data[1];
      } else {
        // Unknown pincode — show empty auto fields for manual entry
        document.getElementById('districtInput').value = '';
        document.getElementById('stateInput').value    = '';
      }
      check.classList.remove('hidden');
      after.style.display = 'block';
      // re-trigger slide animations
      after.querySelectorAll('.slide-in').forEach(function(el,i){
        el.style.animationDelay = (i*0.06)+'s';
        el.classList.remove('slide-in');
        void el.offsetWidth;
        el.classList.add('slide-in');
      });
    }, 700);
  } else {
    el.classList.remove('filled');
    loader.classList.add('hidden');
    check.classList.add('hidden');
    after.style.display = 'none';
  }
}

function simulateAutoFill() {
  var pin = '452001';
  var el  = document.getElementById('pincodeInput');
  el.value = pin;
  handlePincode(el);
  document.getElementById('autoFillBtn').innerHTML =
    '<div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0" style="background:linear-gradient(135deg,#0E7A4E,#083D28);">' +
    '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
    '</div>' +
    '<div class="flex-1"><div class="text-[13px] font-bold text-[#0E7A4E]">Location detected</div>' +
    '<div class="text-[11px] text-[#606060] font-normal mt-0.5">Indore, Madhya Pradesh · 452001</div></div>';
}
</script>
</body>
</html>
