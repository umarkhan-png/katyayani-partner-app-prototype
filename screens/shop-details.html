<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shop Details &middot; Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #1a1a1a; }
  .device { width: 390px; margin: 24px auto; background: #fff; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; }
  .scroll-area { height: 100%; overflow-y: auto; padding-bottom: 90px; }
  .scroll-area::-webkit-scrollbar { display: none; }
  .brand-font { font-family: 'Poppins', sans-serif; font-weight: 700; letter-spacing: -0.02em; }
  .input { width: 100%; border: 1.5px solid #EDEDED; border-radius: 12px; padding: 12px 14px; font-size: 14px; font-weight: 500; color: #1C1C1C; outline: none; background: #fff; }
  .input::placeholder { color: #9E9E9E; font-weight: 400; }
  .input:focus { border-color: #0E7A4E; box-shadow: 0 0 0 3px rgba(14,122,78,0.12); }
  .input.readonly { background: #F8F8F8; color: #606060; }
  .label { font-size: 10px; font-weight: 600; color: #606060; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
  .map-tile { background-image: url('https://tile.openstreetmap.org/14/11643/7128.png'); background-size: cover; background-position: center; }
  .pulse-pin { animation: pulsePin 2s ease-in-out infinite; }
  @keyframes pulsePin { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.08); opacity: .85; } }
  .pin-ripple { animation: ripple 2s ease-out infinite; }
  @keyframes ripple { 0% { transform: scale(0.6); opacity: .6; } 100% { transform: scale(2.2); opacity: 0; } }
</style>
</head>
<body>
<div class="device bg-white">
<div class="scroll-area">

  <!-- HEADER -->
  <div class="px-4 pt-7 pb-3 flex items-center gap-3 bg-white border-b border-[#EDEDED]">
    <a href="profile-setup.html" class="w-9 h-9 rounded-full border border-[#EDEDED] flex items-center justify-center">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <div class="flex-1">
      <div class="brand-font text-[18px] text-[#1C1C1C]">Shop Details</div>
      <div class="text-[10px] text-[#606060]">Step 2 of 4</div>
    </div>
  </div>

  <!-- PROGRESS BAR -->
  <div class="h-1 bg-[#EDEDED]">
    <div class="h-full bg-[#0E7A4E]" style="width: 50%"></div>
  </div>

  <!-- REAL MAP -->
  <div class="mx-4 mt-4 h-[150px] map-tile rounded-2xl relative overflow-hidden border border-[#EDEDED]">
    <!-- Slight overlay to soften map -->
    <div class="absolute inset-0" style="background: linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.15) 100%);"></div>

    <!-- Centered pin -->
    <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2">
      <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-12 h-12 rounded-full bg-[#0E7A4E]/30 pin-ripple"></div>
      <div class="relative pulse-pin">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="#0E7A4E" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="filter: drop-shadow(0 2px 4px rgba(0,0,0,.4));"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3" fill="#fff" stroke="#0E7A4E"/></svg>
      </div>
    </div>

    <!-- Use Current Location button -->
    <button class="absolute bottom-3 left-1/2 -translate-x-1/2 bg-white text-[#0E7A4E] text-[11px] font-semibold px-4 py-2 rounded-full shadow-lg flex items-center gap-2 border border-[#0E7A4E]/20">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/></svg>
      Use my current location
    </button>

    <!-- Drag hint -->
    <div class="absolute top-2 left-1/2 -translate-x-1/2 bg-black/60 backdrop-blur text-white text-[9px] font-medium px-2.5 py-1 rounded-full">
      Drag map to adjust pin
    </div>
  </div>

  <!-- FORM -->
  <div class="px-4 pt-4 space-y-3.5">

    <div>
      <div class="label">Shop Name</div>
      <input class="input" placeholder="e.g. Maheshwari Krishi Kendra" value="Maheshwari Krishi Kendra"/>
    </div>

    <div>
      <div class="label">Pincode</div>
      <input class="input" value="452001" maxlength="6"/>
    </div>

    <!-- City + State combined card -->
    <div class="bg-[#F0FDF5] border border-[#0E7A4E]/30 rounded-xl p-3 flex items-center gap-3">
      <div class="w-9 h-9 rounded-full bg-white border border-[#0E7A4E]/30 flex items-center justify-center flex-shrink-0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0C831F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      </div>
      <div class="flex-1 leading-tight">
        <div class="text-[9px] font-semibold text-[#0C831F] uppercase tracking-wider">Auto-detected</div>
        <div class="text-[13px] font-semibold text-[#1C1C1C] mt-0.5">Indore &middot; Madhya Pradesh</div>
      </div>
      <button class="text-[10px] font-semibold text-[#0E7A4E]">Change</button>
    </div>

    <div>
      <div class="label">Full Address</div>
      <textarea class="input" rows="3" placeholder="Building, Street, Area">Sapna Sangeeta Road, Near Geeta Bhawan, Indore</textarea>
    </div>

    <div>
      <div class="label">Landmark <span class="text-[#9E9E9E] normal-case font-normal">(optional)</span></div>
      <input class="input" placeholder="Nearby landmark"/>
    </div>

  </div>

  <div class="h-4"></div>
</div>

<!-- STICKY CTA -->
<div class="absolute bottom-0 left-0 right-0 bg-white border-t border-[#EDEDED] px-4 py-3">
  <a href="kyc.html" class="block bg-[#0C831F] text-white text-center py-3 rounded-xl text-[13px] font-semibold uppercase tracking-wider">
    Save &amp; Continue
  </a>
</div>

</div>
<div class="text-center text-white/60 text-xs pb-6">Shop Details &middot; <a href="profile-setup.html" class="underline">Profile</a> &middot; <a href="kyc.html" class="underline">KYC</a> &middot; <a href="../index.html" class="underline">All</a></div>
</body>
</html>
