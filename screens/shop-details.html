<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shop Details &middot; Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
  html, body { background: #1a1a1a; }
  .device { width: 390px; margin: 24px auto; background: #fff; border-radius: 36px; box-shadow: 0 30px 80px rgba(0,0,0,.4); overflow: hidden; position: relative; border: 8px solid #111; height: 780px; }
  .scroll-area { height: 100%; overflow-y: auto; padding-bottom: 90px; }
  .scroll-area::-webkit-scrollbar { display: none; }
  .brand-font { font-family: 'Poppins', sans-serif; font-weight: 700; letter-spacing: -0.02em; }
  .input { width: 100%; border: 1.5px solid #EDEDED; border-radius: 12px; padding: 12px 14px; font-size: 14px; font-weight: 500; color: #1C1C1C; outline: none; background: #fff; }
  .input::placeholder { color: #9E9E9E; font-weight: 400; }
  .input:focus { border-color: #0E7A4E; box-shadow: 0 0 0 3px rgba(14,122,78,0.12); }
  .label { font-size: 10px; font-weight: 600; color: #606060; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
</style>
</head>
<body>
<div class="device bg-white">
<div class="scroll-area">

  <!-- HEADER -->
  <div class="px-4 pt-7 pb-3 flex items-center gap-3 bg-white border-b border-[#EDEDED]">
    <a href="profile-setup.html" class="w-9 h-9 rounded-full border border-[#EDEDED] flex items-center justify-center">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <div class="flex-1">
      <div class="brand-font text-[18px] text-[#1C1C1C]">Shop Details</div>
      <div class="text-[10px] text-[#606060]">Step 2 of 4</div>
    </div>
  </div>

  <!-- PROGRESS BAR -->
  <div class="h-1 bg-[#EDEDED]">
    <div class="h-full bg-[#0E7A4E]" style="width: 50%"></div>
  </div>

  <!-- MAP -->
  <div class="mx-4 mt-4 h-[140px] bg-gradient-to-br from-[#D8F3E3] to-[#A8E0C0] rounded-2xl relative overflow-hidden">
    <div class="absolute inset-0 opacity-20" style="background-image:linear-gradient(45deg,transparent 48%,#fff 49%,#fff 51%,transparent 52%);background-size:30px 30px"></div>
    <div class="absolute inset-0 flex items-center justify-center">
      <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
    </div>
    <button class="absolute bottom-3 right-3 bg-white text-[#0E7A4E] text-[11px] font-semibold px-3 py-1.5 rounded-lg shadow flex items-center gap-1.5">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#0E7A4E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg>
      Use Current
    </button>
  </div>

  <!-- FORM -->
  <div class="px-4 pt-4 space-y-3.5">

    <div>
      <div class="label">Shop / Business Name</div>
      <input class="input" placeholder="e.g. Maheshwari Krishi Kendra" value="Maheshwari Krishi Kendra"/>
    </div>

    <div>
      <div class="label">Pincode</div>
      <input class="input" value="452001" maxlength="6"/>
      <div class="flex items-center gap-1 text-[10px] text-[#0C831F] font-semibold mt-1">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#0C831F" stroke-width="2"/><path d="M8 12l3 3 5-6" stroke="#0C831F" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Indore, Madhya Pradesh
      </div>
    </div>

    <div>
      <div class="label">Full Address</div>
      <textarea class="input" rows="3" placeholder="Building, Street, Area">Sapna Sangeeta Road, Near Geeta Bhawan, Indore</textarea>
    </div>

    <div>
      <div class="label">Landmark (Optional)</div>
      <input class="input" placeholder="Nearby landmark"/>
    </div>

  </div>

  <div class="h-4"></div>
</div>

<!-- STICKY CTA -->
<div class="absolute bottom-0 left-0 right-0 bg-white border-t border-[#EDEDED] px-4 py-3">
  <a href="kyc.html" class="block bg-[#0C831F] text-white text-center py-3 rounded-xl text-[13px] font-semibold uppercase tracking-wider">
    Save &amp; Continue
  </a>
</div>

</div>
<div class="text-center text-white/60 text-xs pb-6">Shop Details &middot; <a href="profile-setup.html" class="underline">Profile</a> &middot; <a href="kyc.html" class="underline">KYC</a> &middot; <a href="../index.html" class="underline">All</a></div>
</body>
</html>
