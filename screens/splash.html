<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="manifest" href="/katyayani-partner-app-prototype/manifest.json">
  <meta name="theme-color" content="#0E7A4E">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KT Partner">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Splash &middot; Katyayani Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Poppins', sans-serif !important; -webkit-font-smoothing: antialiased; }
  html, body { background: #fff; margin: 0; padding: 0; overflow: hidden; }
  .device { width: 100%; overflow: hidden; position: relative; height: 100vh; }
  .brand-font { font-family: 'Poppins', sans-serif; font-weight: 700; letter-spacing: -0.02em; }
  /* Same gradient as login.html .hero-top */
  .splash-bg { background: radial-gradient(ellipse at center, #0E5A3A 0%, #0A4A30 25%, #083D28 55%, #062A1B 80%, #021710 100%); position: relative; }
  .splash-bg::before {
    content:''; position:absolute; inset:0;
    background-image: radial-gradient(circle at 20% 20%, rgba(255,255,255,.06) 0, transparent 40%),
                      radial-gradient(circle at 80% 80%, rgba(212,165,55,.08) 0, transparent 40%);
    pointer-events:none;
  }
  /* Logo entrance */
  .logo-fade { animation: logoIn 1s ease-out forwards; opacity: 0; transform: scale(.92); }
  @keyframes logoIn { to { opacity: 1; transform: scale(1); } }
  .logo-fade.delay-1 { animation-delay: .15s; }
  .logo-fade.delay-2 { animation-delay: .35s; }
  .logo-fade.delay-3 { animation-delay: .55s; }
  /* Progress bar */
  .loading-bar { position: relative; height: 2px; background: rgba(255,255,255,.12); border-radius: 999px; overflow: hidden; }
  .loading-bar::after {
    content:''; position:absolute; inset-y:0; left: -40%; width: 40%;
    background: linear-gradient(90deg, transparent, #D4A537, transparent);
    animation: loading 1.8s ease-in-out infinite;
    top: 0; bottom: 0;
  }
  @keyframes loading { 0% { left: -40%; } 100% { left: 100%; } }
  @media screen and (max-width: 499px) {
    .device { width: 100vw !important; height: 100vh !important; margin: 0 !important;
              border-radius: 0 !important; border: none !important; }
    .scroll-area { height: 100vh !important; }
  }

  @media screen and (min-width: 500px) {
    html, body { background: #1a1a1a; overflow: auto; }
    .device { width: 390px; height: 780px; margin: 24px auto; border-radius: 36px; border: 8px solid #111; box-shadow: 0 30px 80px rgba(0,0,0,.4); }
    .scroll-area { height: 780px; }
  }
</style>
<style>
@media screen and (max-width: 499px) {
  .scroll-area { padding-top: env(safe-area-inset-top, 24px) !important; }
  .device { box-sizing: border-box; }
}
</style>
</head>
<body>
<div class="device splash-bg">
  <!-- Subtle decorative dot pattern -->
  <div class="absolute inset-0 opacity-[0.04]" style="background-image:radial-gradient(#fff 1.2px,transparent 1.2px);background-size:26px 26px"></div>

  <!-- Top trust chip -->
  <div class="relative z-10 pt-10 text-center logo-fade">
    <span class="inline-flex items-center gap-1.5 bg-white/10 border border-white/20 text-white text-[12px] font-semibold px-3 py-1.5 rounded-full uppercase tracking-[1.5px]">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.77 5.82 22 7 14.14l-5-4.87 6.91-1.01z" fill="#D4A537"/></svg>
      India's Trusted Agri Partner
    </span>
  </div>

  <!-- Center — Katyayani brand mark + Partner App label -->
  <div class="relative z-10 h-full flex flex-col items-center justify-center -mt-8 px-8">
    <!-- Actual Katyayani logo — no white background, soft glow halo makes the green pill pop on dark emerald bg -->
    <div class="logo-fade delay-1 text-center">
      <img src="../assets/katyayani-logo.webp" alt="Katyayani" class="w-56 mx-auto" style="filter: drop-shadow(0 0 24px rgba(255,255,255,.22)) drop-shadow(0 4px 16px rgba(0,0,0,.35));">
    </div>

    <!-- Simple Partner App text below logo -->
    <div class="logo-fade delay-2 mt-4 text-center">
      <div class="text-[18px] font-medium text-white/90">Partner App</div>
    </div>
  </div>

  <!-- Bottom loader + footer -->
  <div class="absolute bottom-8 left-0 right-0 px-10 text-center">
    <div class="loading-bar mb-3"></div>
    <div class="text-[12px] text-white/70 font-medium">50,000+ Krishi Partners · 22 states</div>
    <div class="text-[9px] text-white/45 mt-2">Version 2.4.1 · Made in Bhopal</div>
  </div>

  <!-- Full-screen tap-to-continue -->
  <a href="rapido-welcome.html" class="absolute inset-0 z-20"></a>
</div>

<div class="text-center text-white/60 text-xs pb-6">Splash · <a href="rapido-welcome.html" class="underline">Language + Welcome</a> · <a href="../index.html" class="underline">All</a></div>

<script>
  // Auto-advance after 2.5 seconds (can tap anywhere to skip)
  setTimeout(function(){ window.location.href = 'rapido-welcome.html'; }, 2500);
</script>
  <script>if("serviceWorker"in navigator){navigator.serviceWorker.register("/katyayani-partner-app-prototype/sw.js")}</script>
<script>(function(){if(window.innerWidth>=768)return;document.body.style.cssText="background:#042919;margin:0;padding:0;overflow:hidden";var d=document.querySelector(".device");if(d)d.style.cssText="width:100vw;height:100vh;margin:0;border-radius:0;border:none;box-shadow:none;overflow:hidden;position:relative";var s=document.querySelector(".scroll-area");if(s){s.style.height="100vh";s.style.paddingTop="env(safe-area-inset-top,24px)";}})();</script>
</body>
</html>
