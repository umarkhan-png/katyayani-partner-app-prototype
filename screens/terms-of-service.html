<!DOCTYPE html><html><head><meta charset="UTF-8">  <link rel="manifest" href="/katyayani-partner-app-prototype/manifest.json">
  <meta name="theme-color" content="#0E7A4E">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KT Partner">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Terms of Service</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"><script src="https://cdn.tailwindcss.com"></script><style>*{font-family:'Poppins',sans-serif}body{background:#1a1a1a}.device{width: 100%;background:#fff;overflow:hidden;position:relative;height: 100vh}.scroll-area{height: 100vh;overflow:hidden;display:flex;flex-direction:column}.brand-font{font-family:'Poppins',sans-serif;font-weight:700;letter-spacing:-0.02em}
  @media screen and (max-width: 499px) {
    .device { width: 100vw !important; height: 100vh !important; margin: 0 !important;
              border-radius: 0 !important; border: none !important; }
    .scroll-area { height: 100vh !important; }
  }

  @media screen and (min-width: 500px) {
    html, body { background: #1a1a1a; overflow: auto; }
    .device { width: 390px; height: 780px; margin: 24px auto; border-radius: 36px; border: 8px solid #111; box-shadow: 0 30px 80px rgba(0,0,0,.4); }
    .scroll-area { height: 780px; }
  }
</style><style>
@media screen and (max-width: 499px) {
  .scroll-area { padding-top: env(safe-area-inset-top, 24px) !important; }
  .device { box-sizing: border-box; }
}
</style>
</head><body><div class="device bg-white"><div class="scroll-area">

<!-- Standard page header -->
<div class="px-4 pt-7 pb-3 flex items-center gap-4 bg-white border-b border-[#EDEDED]"><a href="settings.html" class="w-9 h-9 rounded-full border border-[#EDEDED] flex items-center justify-center flex-shrink-0">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#1C1C1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
</a><div class="brand-font text-[20px]">Terms of Service</div></div>

<!-- Loading shimmer (hidden once iframe loads) -->
<div id="tosLoader" class="px-4 py-5 flex items-center gap-2 text-[12px] text-[#9E9E9E]">
  <svg class="animate-spin" width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#EDEDED" stroke-width="3"/><path d="M21 12a9 9 0 00-9-9" stroke="#0E7A4E" stroke-width="3" stroke-linecap="round"/></svg>
  Loading katyayaniorganics.com…
</div>

<!-- Website rendered inside the app (in-app webview) -->
<iframe id="tosFrame" src="https://www.katyayaniorganics.com/terms-and-conditions/"
  class="flex-1 w-full border-0" style="background:#fff"
  onload="var l=document.getElementById('tosLoader'); if(l) l.style.display='none';"></iframe>

</div></div>
</body></html>
